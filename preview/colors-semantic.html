<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Couleurs Sémantiques</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    body {
      padding: 20px;
      background: white;
    }
    .status-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    .status-card {
      padding: 16px;
      border-radius: var(--radius-lg);
      text-align: center;
      box-shadow: var(--shadow-sm);
    }
    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: var(--radius-full);
      margin: 0 auto 8px;
    }
    .status-label {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .status-count {
      font-size: 20px;
      font-weight: 800;
      font-family: var(--font-mono);
    }
    
    .semantic-row {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      margin-bottom: 8px;
    }
    .semantic-swatch {
      aspect-ratio: 1.5;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      box-shadow: var(--shadow-xs);
    }
  </style>
</head>
<body>
  <div class="status-grid">
    <div class="status-card" style="background: var(--success-50); color: var(--success-700);">
      <div class="status-dot" style="background: var(--success-500);"></div>
      <div class="status-label">Disponible</div>
      <div class="status-count">24</div>
    </div>
    <div class="status-card" style="background: var(--primary-50); color: var(--primary-700);">
      <div class="status-dot" style="background: var(--primary-500);"></div>
      <div class="status-label">En mission</div>
      <div class="status-count">18</div>
    </div>
    <div class="status-card" style="background: var(--error-50); color: var(--error-700);">
      <div class="status-dot" style="background: var(--error-500);"></div>
      <div class="status-label">Absent</div>
      <div class="status-count">5</div>
    </div>
    <div class="status-card" style="background: var(--neutral-50); color: var(--neutral-700);">
      <div class="status-dot" style="background: var(--neutral-400);"></div>
      <div class="status-label">Hors ligne</div>
      <div class="status-count">3</div>
    </div>
  </div>
  
  <div class="semantic-row">
    <div class="semantic-swatch" style="background: var(--success-700); color: white;">700</div>
    <div class="semantic-swatch" style="background: var(--success-600); color: white;">600</div>
    <div class="semantic-swatch" style="background: var(--success-500); color: white;">500</div>
    <div class="semantic-swatch" style="background: var(--success-400); color: white;">400</div>
    <div class="semantic-swatch" style="background: var(--success-300); color: black;">300</div>
    <div class="semantic-swatch" style="background: var(--success-100); color: black;">100</div>
  </div>
  
  <div class="semantic-row">
    <div class="semantic-swatch" style="background: var(--warning-700); color: white;">700</div>
    <div class="semantic-swatch" style="background: var(--warning-600); color: white;">600</div>
    <div class="semantic-swatch" style="background: var(--warning-500); color: white;">500</div>
    <div class="semantic-swatch" style="background: var(--warning-400); color: black;">400</div>
    <div class="semantic-swatch" style="background: var(--warning-300); color: black;">300</div>
    <div class="semantic-swatch" style="background: var(--warning-100); color: black;">100</div>
  </div>
  
  <div class="semantic-row">
    <div class="semantic-swatch" style="background: var(--error-700); color: white;">700</div>
    <div class="semantic-swatch" style="background: var(--error-600); color: white;">600</div>
    <div class="semantic-swatch" style="background: var(--error-500); color: white;">500</div>
    <div class="semantic-swatch" style="background: var(--error-400); color: white;">400</div>
    <div class="semantic-swatch" style="background: var(--error-300); color: black;">300</div>
    <div class="semantic-swatch" style="background: var(--error-100); color: black;">100</div>
  </div>
  
  <div class="semantic-row">
    <div class="semantic-swatch" style="background: var(--info-700); color: white;">700</div>
    <div class="semantic-swatch" style="background: var(--info-600); color: white;">600</div>
    <div class="semantic-swatch" style="background: var(--info-500); color: white;">500</div>
    <div class="semantic-swatch" style="background: var(--info-400); color: black;">400</div>
    <div class="semantic-swatch" style="background: var(--info-300); color: black;">300</div>
    <div class="semantic-swatch" style="background: var(--info-100); color: black;">100</div>
  </div>
</body>
</html>
