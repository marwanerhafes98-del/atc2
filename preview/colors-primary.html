<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Couleurs Primaires</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    body {
      padding: 20px;
      background: white;
    }
    .swatch-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 12px;
    }
    .swatch {
      aspect-ratio: 1;
      border-radius: var(--radius-md);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      box-shadow: var(--shadow-sm);
      position: relative;
    }
    .swatch-label {
      position: absolute;
      bottom: 8px;
      font-size: 10px;
      font-weight: 700;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }
    .light-text { color: white; }
    .dark-text { color: var(--neutral-900); }
    
    .primary-900 { background: var(--primary-900); }
    .primary-800 { background: var(--primary-800); }
    .primary-700 { background: var(--primary-700); }
    .primary-600 { background: var(--primary-600); }
    .primary-500 { background: var(--primary-500); }
    .primary-400 { background: var(--primary-400); }
    .primary-300 { background: var(--primary-300); }
    .primary-200 { background: var(--primary-200); }
    .primary-100 { background: var(--primary-100); }
    .primary-50 { background: var(--primary-50); }
    
    .accent-dark { background: var(--accent-gold-dark); }
    .accent { background: var(--accent-gold); }
    .accent-light { background: var(--accent-gold-light); }
  </style>
</head>
<body>
  <div class="swatch-grid">
    <div class="swatch primary-900 light-text"><span class="swatch-label">900</span></div>
    <div class="swatch primary-800 light-text"><span class="swatch-label">800</span></div>
    <div class="swatch primary-700 light-text"><span class="swatch-label">700</span></div>
    <div class="swatch primary-600 light-text"><span class="swatch-label">600★</span></div>
    <div class="swatch primary-500 light-text"><span class="swatch-label">500</span></div>
    <div class="swatch primary-400 light-text"><span class="swatch-label">400</span></div>
    <div class="swatch primary-300 dark-text"><span class="swatch-label">300</span></div>
    <div class="swatch primary-200 dark-text"><span class="swatch-label">200</span></div>
    <div class="swatch primary-100 dark-text"><span class="swatch-label">100</span></div>
    <div class="swatch primary-50 dark-text"><span class="swatch-label">50</span></div>
  </div>
  
  <div style="height: 16px;"></div>
  
  <div class="swatch-grid" style="grid-template-columns: repeat(3, 1fr);">
    <div class="swatch accent-dark dark-text"><span class="swatch-label">Or foncé</span></div>
    <div class="swatch accent dark-text"><span class="swatch-label">Or</span></div>
    <div class="swatch accent-light dark-text"><span class="swatch-label">Or clair</span></div>
  </div>
</body>
</html>
