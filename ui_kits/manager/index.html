<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RTM MANAGER</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%237C3AED'/><rect x='6' y='20' width='5' height='9' rx='1.5' fill='white' opacity='.7'/><rect x='14' y='14' width='5' height='15' rx='1.5' fill='white'/><rect x='22' y='8' width='5' height='21' rx='1.5' fill='white' opacity='.9'/><rect x='5' y='29.5' width='23' height='1.5' rx='.75' fill='white' opacity='.35'/></svg>">
  <link rel="stylesheet" href="../../colors_and_type.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Geo Zoning deps -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    * { box-sizing:border-box; }
    body { margin:0; padding:0; font-family:var(--font-sans); background:var(--neutral-100); }
    #root { min-height:100vh; }

    /* ── LOGIN ── */
    .login-page { min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(160deg, #001A40, #003580); padding:24px; }
    .login-box { background:white; border-radius:16px; padding:40px 36px; width:100%; max-width:400px; box-shadow:0 24px 64px rgba(0,0,0,0.25); }
    .login-brand { text-align:center; margin-bottom:32px; }
    .login-brand-icon { width:64px; height:64px; background:var(--primary-600); border-radius:16px; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; }
    .login-brand-title { font-size:22px; font-weight:800; color:var(--neutral-900); margin-bottom:4px; }
    .login-brand-sub { font-size:13px; color:var(--neutral-500); font-weight:500; text-transform:uppercase; letter-spacing:1.5px; }
    .login-label { font-size:12px; font-weight:700; color:var(--neutral-600); text-transform:uppercase; letter-spacing:0.5px; display:block; margin-bottom:7px; }
    .login-input { width:100%; height:48px; padding:0 16px; border:1.5px solid var(--neutral-200); border-radius:10px; font-size:15px; font-family:var(--font-sans); color:var(--neutral-900); margin-bottom:14px; transition:all 150ms; }
    .login-input:focus { outline:none; border-color:var(--primary-600); box-shadow:0 0 0 3px var(--primary-100); }
    .login-btn { width:100%; height:50px; background:var(--primary-600); color:white; border:none; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; margin-top:4px; box-shadow:0 4px 16px rgba(0,82,204,0.35); transition:all 150ms; }
    .login-btn:active { transform:scale(0.98); }
    .login-error { background:#FEE2E2; color:#991B1B; padding:10px 14px; border-radius:8px; font-size:13px; font-weight:600; margin-bottom:14px; }
    .login-hint { font-size:12px; color:var(--neutral-400); text-align:center; margin-top:14px; }
    .remember-row { display:flex; align-items:center; gap:9px; margin:2px 0 14px; }
    .remember-row input[type=checkbox] { width:16px; height:16px; accent-color:var(--primary-600); cursor:pointer; flex-shrink:0; }
    .remember-row label { font-size:13px; color:var(--neutral-600); cursor:pointer; user-select:none; }

    /* ── LAYOUT ── */
    .app-layout { display:flex; min-height:100vh; }

    /* ── SIDEBAR ── */
    .sidebar { width:240px; background:white; border-right:1px solid var(--neutral-200); display:flex; flex-direction:column; position:sticky; top:0; height:100vh; flex-shrink:0; }
    .sidebar-brand { padding:20px 16px 16px; border-bottom:1px solid var(--neutral-100); }
    .sidebar-brand-row { display:flex; align-items:center; gap:10px; margin-bottom:4px; }
    .sidebar-brand-icon { width:34px; height:34px; background:var(--primary-600); border-radius:8px; display:flex; align-items:center; justify-content:center; color:white; }
    .sidebar-brand-name { font-weight:800; font-size:14px; color:var(--neutral-900); letter-spacing:0.3px; }
    .sidebar-brand-role { font-size:11px; color:var(--primary-600); font-weight:700; text-transform:uppercase; letter-spacing:1px; margin-left:44px; }
    .sidebar-nav { flex:1; padding:12px 8px; overflow-y:auto; }
    .nav-group-label { font-size:10px; font-weight:700; color:var(--neutral-400); text-transform:uppercase; letter-spacing:1px; padding:8px 10px 4px; }
    .nav-btn { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:8px; color:var(--neutral-600); font-size:13px; font-weight:500; cursor:pointer; transition:all 150ms; border:none; background:transparent; width:100%; text-align:left; margin-bottom:2px; }
    .nav-btn:hover { background:var(--neutral-50); color:var(--neutral-900); }
    .nav-btn.active { background:var(--primary-50); color:var(--primary-700); font-weight:700; }
    .nav-badge { margin-left:auto; background:var(--error-500); color:white; font-size:9px; font-weight:700; padding:2px 6px; border-radius:99px; }
    .nav-badge-green { background:#16A34A; }
    .sidebar-footer { padding:12px 16px; border-top:1px solid var(--neutral-100); }
    .sidebar-user { display:flex; align-items:center; gap:10px; }
    .sidebar-avatar { width:34px; height:34px; border-radius:99px; background:var(--primary-600); color:white; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; flex-shrink:0; }
    .sidebar-user-info { flex:1; min-width:0; }
    .sidebar-user-name { font-size:13px; font-weight:600; color:var(--neutral-900); }
    .sidebar-user-email { font-size:11px; color:var(--neutral-500); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .sidebar-logout { background:none; border:none; cursor:pointer; color:var(--neutral-400); padding:4px; border-radius:6px; }
    .sidebar-logout:hover { color:var(--error-600); background:var(--error-50); }

    /* ── MAIN ── */
    .main-area { flex:1; overflow-y:auto; display:flex; flex-direction:column; }
    .topbar { height:60px; background:white; border-bottom:1px solid var(--neutral-200); display:flex; align-items:center; justify-content:space-between; padding:0 28px; position:sticky; top:0; z-index:40; }
    .topbar-title { font-size:19px; font-weight:700; color:var(--neutral-900); }
    .topbar-right { display:flex; align-items:center; gap:10px; }
    .topbar-live { display:flex; align-items:center; gap:6px; font-size:12px; font-weight:600; color:#16A34A; background:#DCFCE7; padding:5px 10px; border-radius:99px; }
    .live-dot { width:8px; height:8px; border-radius:99px; background:#22C55E; animation:pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .topbar-refresh { height:36px; padding:0 14px; border:1.5px solid var(--neutral-200); border-radius:8px; background:white; color:var(--neutral-600); font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:6px; font-family:var(--font-sans); transition:all 150ms; }
    .topbar-refresh:hover { border-color:var(--primary-400); color:var(--primary-600); }
    .content { padding:24px 28px; }

    /* ── KPI CARDS ── */
    .kpi-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(210px, 1fr)); gap:14px; margin-bottom:20px; }
    .kpi-card { background:white; border-radius:12px; padding:16px 18px; border:1px solid var(--neutral-100); box-shadow:0 1px 4px rgba(0,0,0,0.05); }
    .kpi-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
    .kpi-label { font-size:11px; font-weight:700; color:var(--neutral-500); text-transform:uppercase; letter-spacing:0.5px; }
    .kpi-icon { width:34px; height:34px; border-radius:8px; display:flex; align-items:center; justify-content:center; }
    .kpi-val { font-size:30px; font-weight:800; color:var(--neutral-900); font-family:var(--font-mono); line-height:1; margin-bottom:4px; }
    .kpi-sub { font-size:12px; color:var(--neutral-500); }
    .prog-bar { height:5px; background:var(--neutral-100); border-radius:3px; overflow:hidden; margin-top:8px; }
    .prog-fill { height:100%; border-radius:3px; transition:width 0.5s ease; }

    /* ── ANALYTICS FILTERS ── */
    .analytics-filters { display:flex; align-items:center; gap:10px; margin-bottom:20px; flex-wrap:wrap; background:white; border:1px solid var(--neutral-100); border-radius:12px; padding:14px 18px; box-shadow:0 1px 4px rgba(0,0,0,0.04); }
    .af-label { font-size:12px; font-weight:700; color:var(--neutral-500); text-transform:uppercase; letter-spacing:0.5px; white-space:nowrap; }
    .af-select { height:36px; padding:0 12px; border:1.5px solid var(--neutral-200); border-radius:8px; font-size:13px; font-weight:600; font-family:var(--font-sans); color:var(--neutral-800); background:white; cursor:pointer; min-width:170px; transition:border-color 150ms; }
    .af-select:focus { outline:none; border-color:var(--primary-500); }
    .af-select.active-filter { border-color:var(--primary-500); background:var(--primary-50); color:var(--primary-700); }
    .af-divider { width:1px; height:24px; background:var(--neutral-200); margin:0 4px; }
    .af-spacer { flex:1; }

    /* ── SECTION HEADER ── */
    .section-hd { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
    .section-title { font-size:15px; font-weight:700; color:var(--neutral-900); }
    .section-sub { font-size:12px; color:var(--neutral-500); margin-top:2px; }

    /* ── TABLE CARD ── */
    .table-card { background:white; border-radius:12px; border:1px solid var(--neutral-100); box-shadow:0 1px 4px rgba(0,0,0,0.05); overflow:hidden; margin-bottom:20px; }
    .table-toolbar { padding:14px 20px; border-bottom:1px solid var(--neutral-100); display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
    .table-toolbar-title { font-size:14px; font-weight:700; color:var(--neutral-900); }
    .table-toolbar-sub { font-size:12px; color:var(--neutral-500); margin-top:2px; }
    .table-search { position:relative; }
    .table-search input { height:36px; padding:0 12px 0 36px; border:1.5px solid var(--neutral-200); border-radius:8px; font-size:13px; font-family:var(--font-sans); background:var(--neutral-50); width:220px; }
    .table-search input:focus { outline:none; border-color:var(--primary-400); background:white; }
    .table-search-icon { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--neutral-400); }
    .tbl { width:100%; border-collapse:collapse; }
    .tbl thead { background:var(--neutral-50); }
    .tbl th { padding:10px 16px; text-align:left; font-size:11px; font-weight:700; color:var(--neutral-500); text-transform:uppercase; letter-spacing:0.6px; border-bottom:1px solid var(--neutral-200); white-space:nowrap; }
    .tbl td { padding:12px 16px; border-bottom:1px solid var(--neutral-100); font-size:13px; color:var(--neutral-700); vertical-align:middle; }
    .tbl tbody tr:last-child td { border-bottom:none; }
    .tbl tbody tr:hover td { background:var(--neutral-50); }

    /* ── BADGES ── */
    .badge { display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius:99px; font-size:11px; font-weight:700; }
    .badge-live { background:#DCFCE7; color:#15803D; }
    .badge-live .bdot { background:#22C55E; width:6px; height:6px; border-radius:99px; animation:pulse 1.5s infinite; }
    .badge-offline { background:var(--neutral-100); color:var(--neutral-500); }
    .badge-offline .bdot { background:var(--neutral-400); width:6px; height:6px; border-radius:99px; }
    .badge-system { background:#EFF6FF; color:#1D4ED8; }
    .badge-self { background:#F3E8FF; color:#7C3AED; }

    /* ── AVATAR ── */
    .av { width:32px; height:32px; border-radius:99px; color:white; display:inline-flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; flex-shrink:0; }

    /* ── BUTTONS ── */
    .btn { height:36px; padding:0 16px; border-radius:8px; font-size:13px; font-weight:600; border:none; cursor:pointer; display:inline-flex; align-items:center; gap:6px; font-family:var(--font-sans); transition:all 150ms; }
    .btn-primary { background:var(--primary-600); color:white; box-shadow:0 2px 8px rgba(0,82,204,0.25); }
    .btn-primary:hover { background:var(--primary-700); }
    .btn-success { background:#16A34A; color:white; box-shadow:0 2px 8px rgba(22,163,74,0.25); }
    .btn-success:hover { background:#15803D; }
    .btn-danger { background:white; color:var(--error-600); border:1.5px solid var(--error-200); }
    .btn-danger:hover { background:var(--error-50); }
    .btn-sm { height:30px; padding:0 11px; font-size:12px; }
    .btn-ghost { background:transparent; color:var(--neutral-500); border:1.5px solid var(--neutral-200); }
    .btn-ghost:hover { background:var(--neutral-50); }

    /* ── MODAL ── */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:100; display:flex; align-items:center; justify-content:center; padding:20px; }
    .modal { background:white; border-radius:16px; width:100%; max-width:440px; box-shadow:0 24px 64px rgba(0,0,0,0.2); animation:fadeIn 0.15s ease; }
    @keyframes fadeIn { from{opacity:0;transform:scale(0.97)} to{opacity:1;transform:scale(1)} }
    .modal-hd { padding:20px 24px 16px; border-bottom:1px solid var(--neutral-100); display:flex; align-items:center; justify-content:space-between; }
    .modal-title { font-size:17px; font-weight:800; color:var(--neutral-900); }
    .modal-close { background:var(--neutral-100); border:none; border-radius:8px; width:30px; height:30px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--neutral-500); }
    .modal-body { padding:20px 24px; }
    .modal-ft { padding:16px 24px; border-top:1px solid var(--neutral-100); display:flex; gap:10px; justify-content:flex-end; }
    .mg { margin-bottom:14px; }
    .mg label { display:block; font-size:12px; font-weight:700; color:var(--neutral-600); text-transform:uppercase; letter-spacing:0.4px; margin-bottom:6px; }
    .mg input, .mg select { width:100%; height:44px; padding:0 14px; border:1.5px solid var(--neutral-200); border-radius:8px; font-size:14px; font-family:var(--font-sans); color:var(--neutral-900); background:var(--neutral-50); }
    .mg input:focus, .mg select:focus { outline:none; border-color:var(--primary-500); background:white; }
    .mg-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .form-error { background:#FEE2E2; color:#991B1B; padding:9px 12px; border-radius:7px; font-size:12px; font-weight:600; margin-bottom:14px; }

    /* ── EMPTY ── */
    .empty { padding:56px 24px; text-align:center; color:var(--neutral-400); }
    .empty-text { font-size:14px; font-weight:500; margin-top:12px; }

    /* ── LOG ── */
    .mono { font-family:var(--font-mono); font-size:12px; color:var(--neutral-500); }
    .log-item { display:flex; align-items:flex-start; gap:12px; padding:12px 20px; border-bottom:1px solid var(--neutral-100); }
    .log-icon { width:34px; height:34px; border-radius:99px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .log-text { flex:1; }
    .log-name { font-size:13px; font-weight:600; color:var(--neutral-900); margin-bottom:2px; }
    .log-detail { font-size:12px; color:var(--neutral-500); }
    .log-time { font-size:11px; color:var(--neutral-400); font-family:var(--font-mono); white-space:nowrap; }

    /* ── SUMMARY TABLE inline progress ── */
    .inline-prog { display:flex; align-items:center; gap:8px; min-width:110px; }
    .inline-prog-bar { flex:1; height:5px; background:var(--neutral-100); border-radius:3px; overflow:hidden; }
    .inline-prog-fill { height:100%; border-radius:3px; }
    .inline-prog-pct { font-size:12px; font-weight:700; color:var(--neutral-600); min-width:30px; text-align:right; }

    /* ── SECTOR GAP CARDS ── */
    .gap-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:10px; padding:16px 20px; }
    .gap-item { background:var(--neutral-50); border:1px solid var(--neutral-200); border-radius:8px; padding:10px 12px; display:flex; align-items:center; gap:10px; }
    .gap-dot { width:8px; height:8px; border-radius:99px; background:#EF4444; flex-shrink:0; }
    .gap-sector { font-size:12px; font-weight:600; color:var(--neutral-800); }
    .gap-ville { font-size:11px; color:var(--neutral-500); margin-top:1px; }

    /* ── ALERT BANNER ── */
    .alert-banner { border-radius:10px; padding:12px 16px; display:flex; align-items:center; gap:10px; margin-bottom:16px; font-size:13px; font-weight:600; }
    .alert-warning { background:#FEF3C7; color:#B45309; border:1px solid #FDE68A; }
    .alert-info    { background:#EFF6FF;  color:#1D4ED8; border:1px solid #BFDBFE; }

    /* ── MAP PAGE ── */
    .map-page { display:flex; flex-direction:column; height:calc(100vh - 60px); }
    .map-topbar { display:flex; align-items:center; gap:12px; padding:14px 0 16px; flex-wrap:wrap; flex-shrink:0; }
    .map-legend { display:flex; align-items:center; gap:16px; padding:8px 14px; background:white; border:1px solid var(--neutral-100); border-radius:10px; font-size:12px; font-weight:600; }
    .map-legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .map-wrap { flex:1; min-height:360px; border-radius:12px; overflow:hidden; border:1px solid var(--neutral-200); box-shadow:0 2px 8px rgba(0,0,0,0.07); }
    #mgr-map { width:100%; height:100%; }
    .map-ctrl-row { display:flex; align-items:center; gap:10px; flex-shrink:0; margin-bottom:10px; flex-wrap:wrap; }
    .map-stat { background:white; border:1px solid var(--neutral-100); border-radius:10px; padding:8px 14px; display:flex; align-items:center; gap:8px; font-size:12px; font-weight:600; color:var(--neutral-700); white-space:nowrap; }
    .map-stat-val { font-size:20px; font-weight:800; font-family:var(--font-mono); }
    .map-vdivider { width:1px; height:36px; background:var(--neutral-200); flex-shrink:0; }
    .map-table-wrap { margin-top:10px; background:white; border:1px solid var(--neutral-100); border-radius:12px; overflow:hidden; flex-shrink:0; max-height:240px; overflow-y:auto; }
    /* pulsing dot for live markers */
    @keyframes map-pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.4);opacity:0.7} }
    .live-marker-ring { animation:map-pulse 1.5s infinite; }

    /* ── SCROLLABLE TABLE WRAPPER ── */
    .tbl-scroll { overflow-x:auto; -webkit-overflow-scrolling:touch; }
    .tbl-scroll .tbl { min-width:560px; }

    /* ── DATE PICKER ── */
    .date-input { height:36px; padding:0 12px; border:1.5px solid var(--neutral-200); border-radius:8px; font-size:13px; font-family:var(--font-sans); color:var(--neutral-800); background:white; cursor:pointer; }
    .date-input:focus { outline:none; border-color:var(--primary-500); }
    .date-today-btn { height:36px; padding:0 14px; border:1.5px solid var(--primary-200); border-radius:8px; font-size:13px; font-weight:600; color:var(--primary-700); background:var(--primary-50); cursor:pointer; font-family:var(--font-sans); }
    .date-today-btn:hover { background:var(--primary-100); }

    /* ── WEEKLY PRESENCE ── */
    .week-nav { display:flex; align-items:center; gap:12px; margin-bottom:20px; background:white; border:1px solid var(--neutral-100); border-radius:12px; padding:14px 20px; box-shadow:0 1px 4px rgba(0,0,0,0.04); }
    .week-nav-btn { width:34px; height:34px; border:1.5px solid var(--neutral-200); border-radius:8px; background:white; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--neutral-600); transition:all 150ms; }
    .week-nav-btn:hover { border-color:var(--primary-400); color:var(--primary-600); }
    .week-nav-label { font-size:15px; font-weight:700; color:var(--neutral-900); flex:1; text-align:center; }
    .week-nav-sub { font-size:12px; color:var(--neutral-500); font-weight:400; }

    .weekly-table-wrap { overflow-x:auto; }
    .weekly-tbl { min-width:900px; }
    .weekly-tbl th.day-col { text-align:center; min-width:72px; }
    .weekly-tbl td.day-cell { text-align:center; padding:8px 6px; }
    .day-chip { display:inline-flex; align-items:center; justify-content:center; padding:3px 10px; border-radius:99px; font-size:11px; font-weight:700; white-space:nowrap; }

function avatarColor(str) { let h=0; for(let c of str) h=(h*31+c.charCodeAt(0))&0xFFFFFF; return AVATAR_PALETTE[Math.abs(h)%AVATAR_PALETTE.length]; }
function initials(name) { const p=name.trim().split(/\s+/); return p.length>=2?(p[0][0]+p[1][0]).toUpperCase():name.substring(0,2).toUpperCase(); }

function parseKML(kmlText) {
  try {
    const doc = new DOMParser().parseFromString(kmlText, 'text/xml');
    const result = [];
    const parsePoints = (cn) => {
      const points = [];
      cn.textContent.trim().split(/\s+/).forEach(token => {
        const [lng, lat] = token.split(',').map(Number);
        if (!isNaN(lat) && !isNaN(lng)) points.push([lat, lng]);
      });
      return points;
    };
    // Placemarks inside Folder (Google My Maps layers = villes)
    doc.querySelectorAll('Folder').forEach(folder => {
      const folderName = folder.querySelector(':scope > name')?.textContent?.trim() || '';
      folder.querySelectorAll('Placemark').forEach(pm => {
        const name = pm.querySelector('name')?.textContent?.trim() || '';
        pm.querySelectorAll('coordinates').forEach(cn => {
          const points = parsePoints(cn);
          if (points.length >= 3) result.push({ name, folder: folderName, coordinates: points });
        });
      });
    });
    // Placemarks directly under Document (no folder)
    doc.querySelectorAll('Document > Placemark').forEach(pm => {
      const name = pm.querySelector('name')?.textContent?.trim() || '';
      pm.querySelectorAll('coordinates').forEach(cn => {
        const points = parsePoints(cn);
        if (points.length >= 3) result.push({ name, folder: '', coordinates: points });
      });
    });
    return result;
  } catch(e) { return []; }
}
function timeAgo(iso) {
  if (!iso) return '—';
  const d = (Date.now() - new Date(iso)) / 1000;
  if (d < 60) return 'À l\'instant';
  if (d < 3600) return `il y a ${Math.floor(d/60)} min`;
  if (d < 86400) return `il y a ${Math.floor(d/3600)} h`;
  return new Date(iso).toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
}
function fmtDate(iso) { if(!iso) return '—'; return new Date(iso).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'}); }
function fmtTime(iso) { if(!iso) return '—'; return new Date(iso).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); }

/* ── ANALYTICS HELPERS ── */
function getPtgForAnim(anim, todayPtgs) {
  const matches = todayPtgs.filter(p => p.animateurId === anim.id || p.animateurName === anim.name);
  return matches.length ? matches[matches.length - 1] : null;
}

function computeStats(animList, todayPtgs) {
  const s = { total:animList.length, present:0, absent:0, malade:0, demission:0, nonPointe:0, pointed:0, recupe:0, conge:0, renfort:0 };
  const allSectors = new Set(animList.map(a => a.sector));
  const coveredSectors = new Set();
  animList.forEach(a => {
    const ptg = getPtgForAnim(a, todayPtgs);
    if (!ptg) { s.nonPointe++; }
    else {
      s.pointed++;
      if (ptg.status === 'present')    { s.present++;    coveredSectors.add(a.sector); }
      else if (ptg.status === 'absent')    s.absent++;
      else if (ptg.status === 'malade')    s.malade++;
      else if (ptg.status === 'demission') s.demission++;
      else if (ptg.status === 'recupe')    s.recupe++;
      else if (ptg.status === 'conge')     s.conge++;
      else if (ptg.status === 'renfort')   { s.renfort++; coveredSectors.add(a.sector); }
    }
  });
  s.tauxPresence   = s.total > 0 ? Math.round(s.present   / s.total * 100) : 0;
  s.tauxAbsence    = s.total > 0 ? Math.round((s.absent + s.malade) / s.total * 100) : 0;
  s.totalSectors   = allSectors.size;
  s.coveredSectors = coveredSectors.size;
  s.gapSectors     = s.totalSectors - s.coveredSectors;
  s.sectorCovPct   = s.totalSectors > 0 ? Math.round(s.coveredSectors / s.totalSectors * 100) : 0;
  return s;
}

/* ── DASHBOARD XLSX EXPORT ── */
function exportDashboardXLSX(animList, todayPtgs, filterVille, filterTLName) {
  const now     = new Date();
  const dateStr = now.toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  const fileDate = now.toLocaleDateString('fr-FR').replace(/\//g, '-');
  const scope   = [
    filterVille   !== 'Toutes' ? `Ville : ${filterVille}`     : null,
    filterTLName  !== 'Tous'   ? `Team Lead : ${filterTLName}` : null,
  ].filter(Boolean).join('  |  ') || 'Toutes les villes — Tous les Team Leads';

  const HEADERS = ['N°','Ville','Secteur / Magasin','Animateur','Téléphone','Team Lead','Statut','Heure','Note'];
  const NCOLS   = HEADERS.length;

  // ── Styles ──
  const titleS = {
    font: { bold:true, sz:14, color:{ rgb:'FFFFFF' } },
    fill: { fgColor:{ rgb:'003580' } },
    alignment: { horizontal:'center', vertical:'center' },
  };
  const subtitleS = {
    font: { sz:11, color:{ rgb:'FFFFFF' } },
    fill: { fgColor:{ rgb:'003580' } },
    alignment: { horizontal:'center', vertical:'center' },
  };
  const dateS = {
    font: { italic:true, sz:10, color:{ rgb:'FFFFFF' } },
    fill: { fgColor:{ rgb:'003580' } },
    alignment: { horizontal:'center', vertical:'center' },
  };
  const headerS = {
    font: { bold:true, sz:11, color:{ rgb:'FFFFFF' } },
    fill: { fgColor:{ rgb:'0052CC' } },
    alignment: { horizontal:'center', vertical:'center', wrapText:true },
    border: { bottom:{ style:'thin', color:{ rgb:'BFDBFE' } } },
  };
  const STATUS_BG = {
    present:   { font:{ color:{ rgb:'14532D' } }, fill:{ fgColor:{ rgb:'DCFCE7' } } },
    absent:    { font:{ color:{ rgb:'7F1D1D' } }, fill:{ fgColor:{ rgb:'FEE2E2' } } },
    malade:    { font:{ color:{ rgb:'78350F' } }, fill:{ fgColor:{ rgb:'FEF3C7' } } },
    demission: { font:{ color:{ rgb:'4C1D95' } }, fill:{ fgColor:{ rgb:'F3E8FF' } } },
    nonpointe: { font:{ color:{ rgb:'475569' } }, fill:{ fgColor:{ rgb:'F1F5F9' } } },
  };
  const centerS  = { alignment:{ horizontal:'center', vertical:'center' } };
  const wrapS    = { alignment:{ horizontal:'left',   vertical:'center', wrapText:true } };

  // ── Data rows ──
  const sorted = [...animList].sort((a,b) =>
    a.ville.localeCompare(b.ville) || a.sector.localeCompare(b.sector) || a.name.localeCompare(b.name)
  );

  // ── Build sheet data (AOA) ──
  // Row 0 : title (merged)
  // Row 1 : date (merged)
  // Row 2 : scope/filters (merged)
  // Row 3 : empty spacer
  // Row 4 : column headers
  // Row 5+ : data
  const aoa = [
    ['RAPPORT DE POINTAGE — OUTILS ATC2', ...Array(NCOLS-1).fill('')],
    [dateStr,                              ...Array(NCOLS-1).fill('')],
    [scope,                                ...Array(NCOLS-1).fill('')],
    Array(NCOLS).fill(''),
    HEADERS,
    ...sorted.map((a, i) => {
      const ptg    = getPtgForAnim(a, todayPtgs);
      const status = ptg ? ptg.status : 'nonpointe';
      return [
        i + 1,
        a.ville,
        a.sector,
        a.name,
        a.phone || '—',
        a.teamLead,
        STATUS_FR[status] || 'Non pointé',
        ptg?.time || '—',
        ptg?.note || '',
      ];
    }),
  ];

  const ws = XLSX.utils.aoa_to_sheet(aoa);

  // Column widths
  ws['!cols'] = [
    { wch:5  },  // N°
    { wch:14 },  // Ville
    { wch:22 },  // Secteur
    { wch:26 },  // Animateur
    { wch:18 },  // Téléphone
    { wch:22 },  // Team Lead
    { wch:13 },  // Statut
    { wch:8  },  // Heure
    { wch:32 },  // Note
  ];

  // Row heights
  ws['!rows'] = [
    { hpt:30 }, // title
    { hpt:18 }, // date
    { hpt:18 }, // scope
    { hpt:8  }, // spacer
    { hpt:22 }, // headers
  ];

  // Merges : title / date / scope across all columns
  ws['!merges'] = [
    { s:{ r:0, c:0 }, e:{ r:0, c:NCOLS-1 } },
    { s:{ r:1, c:0 }, e:{ r:1, c:NCOLS-1 } },
    { s:{ r:2, c:0 }, e:{ r:2, c:NCOLS-1 } },
  ];

  // Freeze header row (row index 4)
  ws['!freeze'] = { xSplit:0, ySplit:5 };

  // Apply styles to title / date / scope
  for (let c = 0; c < NCOLS; c++) {
    const r0 = XLSX.utils.encode_cell({ r:0, c });
    const r1 = XLSX.utils.encode_cell({ r:1, c });
    const r2 = XLSX.utils.encode_cell({ r:2, c });
    if (ws[r0]) ws[r0].s = titleS;
    if (ws[r1]) ws[r1].s = subtitleS;
    if (ws[r2]) ws[r2].s = dateS;
  }

  // Header row styles
  HEADERS.forEach((_, ci) => {
    const cell = XLSX.utils.encode_cell({ r:4, c:ci });
    if (ws[cell]) ws[cell].s = headerS;
  });

  // Data row styles
  sorted.forEach((a, ri) => {
    const ptg    = getPtgForAnim(a, todayPtgs);
    const status = ptg ? ptg.status : 'nonpointe';
    const bg     = STATUS_BG[status] || STATUS_BG.nonpointe;
    const rowIdx = ri + 5; // offset: 3 header rows + 1 spacer + 1 header = 5

    HEADERS.forEach((h, ci) => {
      const cell = XLSX.utils.encode_cell({ r:rowIdx, c:ci });
      if (!ws[cell]) return;
      const extra = (ci === 0 || ci === 6 || ci === 7) ? centerS : wrapS;
      ws[cell].s = { ...bg, ...extra };
    });
  });

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Pointage du jour');
  XLSX.writeFile(wb, `pointage_${fileDate}.xlsx`);
}

let _accounts    = [];
let _sessions    = {};
let _pointages   = [];
let _animateurs  = [];
const encodeKey = (email) => email.replace(/\./g, '_').replace(/@/g, '__at__');

const LS = {
  getAccounts()  { return _accounts; },
  getSessions()  {
    const result = {};
    Object.values(_sessions).forEach(s => { if (s && s.email) result[s.email] = s; });
    return result;
  },
  getPointages() { return _pointages; },

  isLive(email) {
    const s = _sessions[encodeKey(email)];
    if (!s || !s.isActive) return false;
    return (Date.now() - new Date(s.lastPing)) < 120000;
  },

  async addAccount(form) {
    if (_accounts.find(a => a.email.toLowerCase() === form.email.toLowerCase()))
      return { error: 'Cet email est déjà enregistré.' };
    const acc = {
      id: Date.now(), name: form.name.trim(),
      email: form.email.toLowerCase().trim(), password: form.password,
      ville: form.ville, phone: form.phone || '',
      initials: initials(form.name.trim()),
      createdAt: new Date().toISOString(), createdBy: 'manager'
    };
    await db.ref(`ptg/accounts/${acc.id}`).set(acc);
    return { account: acc };
  },

  async deleteAccount(id) {
    const acc = _accounts.find(a => a.id === id);
    await db.ref(`ptg/accounts/${id}`).remove();
    if (acc) await db.ref(`ptg/sessions/${encodeKey(acc.email)}`).remove();
  },

  async resetPassword(id, newPwd) {
    await db.ref(`ptg/accounts/${id}/password`).set(newPwd);
  },

  async updateAccount(id, data) {
    const acc = _accounts.find(a => a.id === id);
    if (!acc) return;
    const oldName = acc.name;
    const newName = (data.name || oldName).trim();
    await db.ref(`ptg/accounts/${id}`).update({
      ...data,
      initials: initials(newName)
    });
    // Cascade: si le nom du TL change, mettre à jour tous ses animateurs
    if (data.name && newName !== oldName) {
      const snap = await db.ref('ptg/animateurs').once('value');
      if (snap.exists()) {
        const updates = {};
        Object.entries(snap.val()).forEach(([key, anim]) => {
          if (anim && anim.teamLead === oldName) updates[`${key}/teamLead`] = newName;
        });
        if (Object.keys(updates).length) await db.ref('ptg/animateurs').update(updates);
      }
    }
    // Cascade: si la ville du TL change, mettre à jour tous ses animateurs
    if (data.ville && data.ville !== acc.ville) {
      const snap2 = await db.ref('ptg/animateurs').once('value');
      if (snap2.exists()) {
        const updates2 = {};
        Object.entries(snap2.val()).forEach(([key, anim]) => {
          if (anim && anim.teamLead === newName) updates2[`${key}/ville`] = data.ville;
        });
        if (Object.keys(updates2).length) await db.ref('ptg/animateurs').update(updates2);
      }
    }
  },

  async seedAccounts() {
    const snap = await db.ref('ptg/accounts').once('value');
    const existing = snap.exists()
      ? Object.values(snap.val()).map(a => (a.email || '').toLowerCase())
      : [];
    let nextId = Date.now();
    for (const [name, email] of Object.entries(TL_NAME_TO_EMAIL)) {
      if (existing.includes(email.toLowerCase())) continue;
      const ville = (_animateurs.length ? _animateurs : ANIMATEURS_DB).find(a => a.teamLead === name)?.ville || 'Casablanca';
      const acc = {
        id: nextId++,
        name, email, password: '1234',
        ville, initials: initials(name),
        createdAt: new Date().toISOString(), createdBy: 'system'
      };
      await db.ref(`ptg/accounts/${acc.id}`).set(acc);
    }
  },

  async seedAnimateurs() {
    const snap = await db.ref('ptg/animateurs').once('value');
    if (snap.exists()) return;
    const updates = {};
    ANIMATEURS_DB.forEach(a => { updates[String(a.id)] = a; });
    await db.ref('ptg/animateurs').set(updates);
  },

  async updateAnimateur(id, data) {
    await db.ref(`ptg/animateurs/${id}`).update(data);
  },

  async addAnimateur(anim) {
    await db.ref(`ptg/animateurs/${anim.id}`).set(anim);
  },

  async deactivateAnimateur(id) {
    await db.ref(`ptg/animateurs/${id}`).update({ actif: false });
  },

  async reactivateAnimateur(id) {
    await db.ref(`ptg/animateurs/${id}`).update({ actif: true });
  },

  async deleteAnimateur(id) {
    await db.ref(`ptg/animateurs/${id}`).remove();
  }
};

function LoginPage({ onLogin }) {
  const [email,    setEmail]    = useState('');

  const [error,    setError]    = useState('');
  const [loading,  setLoading]  = useState(false);
  const [remember, setRemember] = useState(true);

  const handleSubmit = async (e) => {
    e.preventDefault(); setError(''); setLoading(true);
    const emailLow = email.toLowerCase().trim();

    // Manager account
    if (emailLow === MANAGER_EMAIL && pwd === MANAGER_PASSWORD) {
      onLogin({ role:'manager', email:MANAGER_EMAIL, name:'Manager', initials:'MG', ville:null }, remember);
      return;
    }

    // Team Lead account via Firebase
    try {
      const snap = await db.ref('ptg/accounts').once('value');
      if (snap.exists()) {
        const tl = Object.values(snap.val()).find(a => a.email.toLowerCase() === emailLow && a.password === pwd);
        if (tl) {
          onLogin({ role:'teamlead', email:tl.email, name:tl.name, initials:tl.initials||initials(tl.name), ville:tl.ville }, remember);
          return;
        }
      }
    } catch(err) {}

    setError('Identifiants incorrects.');
    setLoading(false);
  };

  return (
    <div className="login-page">
      <div className="login-box">
        <div className="login-brand">
          <div className="login-brand-icon">
            <i data-lucide="shield-check" style={{width:28,height:28,color:'white'}}></i>
          </div>
          <div className="login-brand-title">ESPACE MANAGER</div>
          <div className="login-brand-sub">Outils Pointage</div>
        </div>
        <form onSubmit={handleSubmit}>
          {error && <div className="login-error">{error}</div>}

          <input type="email" className="login-input" placeholder="votre@email.ma"
            value={email} onChange={e => setEmail(e.target.value)} required />
          <label className="login-label">Mot de passe</label>
          <input type="password" className="login-input" placeholder="••••••••"

            <input type="checkbox" id="mgr-remember" checked={remember} onChange={e => setRemember(e.target.checked)} />

/* ── ANALYTICS KPI CARDS ── */
function KpiDelta({ today, yesterday, unit='', higherIsBad=false }) {
  if (yesterday === null || yesterday === undefined) return null;
  const diff = today - yesterday;
  if (diff === 0) return (
    <span style={{fontSize:11,color:'#94A3B8',fontWeight:600,display:'inline-flex',alignItems:'center',gap:3,marginTop:4}}>
      = vs hier
    </span>
  );
  const isGood = higherIsBad ? diff < 0 : diff > 0;
  const color  = isGood ? '#16A34A' : '#DC2626';
  const arrow  = diff > 0 ? '▲' : '▼';
  const label  = `${diff > 0 ? '+' : ''}${diff}${unit} vs hier`;
  return (
    <span style={{fontSize:11,color,fontWeight:700,display:'inline-flex',alignItems:'center',gap:3,marginTop:4}}>
      {arrow} {label}
    </span>
  );
}

function AnalyticsKpis({ stats, yesterdayStats }) {
  const y = yesterdayStats || {};
  const cards = [
    { label:'Total animateurs',   val:stats.total,       sub:`${stats.pointed} pointés aujourd'hui`,        icon:'users',          bg:'#EFF6FF', ic:'#1D4ED8', prog:null, delta:null },
    { label:'Non pointés',        val:stats.nonPointe,   sub:`${stats.total - stats.nonPointe} / ${stats.total} ont été pointés`, icon:'clock', bg:'#F8FAFC', ic:'#64748B', prog:null, delta:<KpiDelta today={stats.nonPointe} yesterday={y.nonPointe} higherIsBad={true} /> },
    { label:'Taux de présence',   val:`${stats.tauxPresence}%`, sub:`${stats.present} animateurs présents`,icon:'check-circle',   bg:'#DCFCE7', ic:'#15803D', prog:{val:stats.tauxPresence,  color:'#22C55E'}, delta:<KpiDelta today={stats.tauxPresence} yesterday={y.tauxPresence} unit="pp" higherIsBad={false} /> },
    { label:"Taux d'absence",     val:`${stats.tauxAbsence}%`,  sub:`${stats.absent} absents · ${stats.malade} malades`, icon:'alert-circle',bg:'#FEF2F2', ic:'#DC2626', prog:{val:stats.tauxAbsence,   color:'#EF4444'}, delta:<KpiDelta today={stats.tauxAbsence} yesterday={y.tauxAbsence} unit="pp" higherIsBad={true} /> },
    { label:'Secteurs couverts',  val:`${stats.coveredSectors}/${stats.totalSectors}`, sub:`${stats.gapSectors} secteur${stats.gapSectors!==1?'s':''} sans présence`, icon:'store', bg:'#F3E8FF', ic:'#7C3AED', prog:{val:stats.sectorCovPct, color:'#A855F7'}, delta:null },
    { label:'Démissions',         val:stats.demission,   sub:`Signalées aujourd'hui`,                       icon:'user-minus',     bg:'#FFF7ED', ic:'#C2410C', prog:null, delta:<KpiDelta today={stats.demission} yesterday={y.demission} higherIsBad={true} /> },
  ];

  return (
    <div className="kpi-grid">
      {cards.map(c => (
        <div key={c.label} className="kpi-card">
          <div className="kpi-top">
            <div className="kpi-label">{c.label}</div>
            <div className="kpi-icon" style={{background:c.bg, color:c.ic}}>
              <i data-lucide={c.icon} style={{width:18,height:18}}></i>
            </div>
          </div>
          <div className="kpi-val">{c.val}</div>
          <div className="kpi-sub">{c.sub}</div>
          {c.delta}
          {c.prog && (
            <div className="prog-bar">
              <div className="prog-fill" style={{width:`${c.prog.val}%`, background:c.prog.color}}></div>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

/* ── SECTOR GAP PANEL ── */
function SectorGapPanel({ animateurs, todayPtgs }) {
  const [open, setOpen] = useState(false);

  const gaps = useMemo(() => {
    const map = {};
    animateurs.forEach(a => {
      if (!map[a.sector]) map[a.sector] = { sector: a.sector, ville: a.ville, anims: [] };
      const ptg = getPtgForAnim(a, todayPtgs);
      const status = ptg?.status || 'nonpointe';
      map[a.sector].anims.push({ name: a.name, status });
    });
    return Object.values(map)
      .filter(s => !s.anims.some(a => a.status === 'present' || a.status === 'renfort'))
      .sort((a,b) => a.ville.localeCompare(b.ville) || a.sector.localeCompare(b.sector));
  }, [animateurs, todayPtgs]);

  if (gaps.length === 0) return (
    <div className="alert-banner alert-info" style={{marginBottom:20}}>
      <i data-lucide="check-circle" style={{width:16,height:16,flexShrink:0}}></i>
      Tous les secteurs ont au moins un animateur présent aujourd'hui.
    </div>
  );

  return (
    <div className="table-card" style={{marginBottom:20}}>
      <div className="table-toolbar" style={{cursor:'pointer',userSelect:'none'}} onClick={() => setOpen(o => !o)}>
        <div>
          <div className="table-toolbar-title" style={{display:'flex',alignItems:'center',gap:8}}>
            <i data-lucide="alert-triangle" style={{width:15,height:15,color:'#EF4444'}}></i>
            Secteurs sans présence aujourd'hui
            <span style={{marginLeft:4,padding:'1px 8px',borderRadius:99,fontSize:11,fontWeight:700,background:'#FEE2E2',color:'#B91C1C'}}>{gaps.length}</span>
          </div>
          <div className="table-toolbar-sub" style={{color:'#DC2626'}}>
            {open ? 'Cliquez pour réduire' : 'Cliquez pour afficher les secteurs'}
          </div>
        </div>
        <i data-lucide={open ? 'chevron-up' : 'chevron-down'} style={{width:18,height:18,color:'var(--neutral-400)',flexShrink:0}}></i>
      </div>
      {open && (
        <div className="gap-grid">
          {gaps.map(g => (
            <div key={g.sector+g.ville} className="gap-item">
              <span className="gap-dot"></span>
              <div>
                <div className="gap-sector">{g.sector}</div>
                <div className="gap-ville">{g.ville} · {g.anims.length} animateur{g.anims.length!==1?'s':''}</div>
                <div style={{marginTop:4,display:'flex',gap:4,flexWrap:'wrap'}}>
                  {g.anims.map((a,i) => (
                    <span key={i} style={{fontSize:10,padding:'1px 7px',borderRadius:99,background:(STATUS_COLOR[a.status]||'#64748B')+'22',color:STATUS_COLOR[a.status]||'#64748B',fontWeight:700}}>
                      {STATUS_FR[a.status]||a.status}
                    </span>
                  ))}
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function DashboardView({ accounts, sessions, pointages, onRefresh, animateurs }) {
  const [filterVille, setFilterVille]   = useState('Toutes');
  const [filterTL,    setFilterTL]      = useState('Tous');

  const todayPtgs = useMemo(() =>
    pointages.filter(p => p.date === new Date().toDateString()),
    [pointages]
  );

  // Unique TL names for the current ville filter
  const teamLeadsForVille = useMemo(() => {
    const src = filterVille === 'Toutes' ? animateurs : animateurs.filter(a => a.ville === filterVille);
    const map = {};
    src.forEach(a => { if (!map[a.teamLead]) map[a.teamLead] = a.ville; });
    return Object.entries(map).map(([name, ville]) => ({ name, ville })).sort((a, b) => a.name.localeCompare(b.name));
  }, [filterVille, animateurs]);

  // Filtered animateurs
  const filteredAnims = useMemo(() => {
    let list = animateurs;
    if (filterVille !== 'Toutes') list = list.filter(a => a.ville === filterVille);
    if (filterTL !== 'Tous')     list = list.filter(a => a.teamLead === filterTL);
    return list;
  }, [filterVille, filterTL, animateurs]);

  // Filtered pointages
  const filteredPtgs = useMemo(() => {
    let list = todayPtgs;
    if (filterVille !== 'Toutes') list = list.filter(p => p.ville === filterVille);
    if (filterTL !== 'Tous') {
      const tlEmail = accounts.find(a => a.name === filterTL)?.email;
      if (tlEmail) list = list.filter(p => p.teamLeadEmail === tlEmail);
    }
    return list;
  }, [todayPtgs, filterVille, filterTL, accounts]);

  const stats = useMemo(() => computeStats(filteredAnims, filteredPtgs), [filteredAnims, filteredPtgs]);

  const yesterdayStr = useMemo(() => { const d = new Date(); d.setDate(d.getDate()-1); return d.toDateString(); }, []);
  const yesterdayPtgs = useMemo(() => {
    let list = pointages.filter(p => p.date === yesterdayStr);
    if (filterVille !== 'Toutes') list = list.filter(p => p.ville === filterVille);
    if (filterTL !== 'Tous') { const tlEmail = accounts.find(a => a.name === filterTL)?.email; if (tlEmail) list = list.filter(p => p.teamLeadEmail === tlEmail); }
    return list;
  }, [pointages, yesterdayStr, filterVille, filterTL, accounts]);
  const yesterdayStats = useMemo(() => computeStats(filteredAnims, yesterdayPtgs), [filteredAnims, yesterdayPtgs]);

  const handleExport = () => exportDashboardXLSX(filteredAnims, filteredPtgs, filterVille, filterTL !== 'Tous' ? filterTL : 'Tous');

  return (
    <>
      {/* ── FILTER BAR ── */}
      <div className="analytics-filters">
        <i data-lucide="sliders-horizontal" style={{width:16,height:16,color:'var(--neutral-400)',flexShrink:0}}></i>
        <span className="af-label">Filtrer par</span>
        <div className="af-divider"></div>

        <select className={`af-select ${filterVille !== 'Toutes' ? 'active-filter' : ''}`}
          value={filterVille} onChange={e => { setFilterVille(e.target.value); setFilterTL('Tous'); }}>
          <option value="Toutes">Toutes les villes</option>
          {VILLES.map(v => (
            <option key={v} value={v}>{v} ({animateurs.filter(a=>a.ville===v).length} animateurs)</option>
          ))}
        </select>

        <select className={`af-select ${filterTL !== 'Tous' ? 'active-filter' : ''}`}
          value={filterTL} onChange={e => setFilterTL(e.target.value)}>
          <option value="Tous">Tous les Team Leads</option>
          {teamLeadsForVille.map(tl => (
            <option key={tl.name} value={tl.name}>{tl.name} — {tl.ville}</option>
          ))}
        </select>

        <div className="af-spacer"></div>

        <button className="btn btn-success" onClick={handleExport}>
          <i data-lucide="download" style={{width:15,height:15}}></i>
          Exporter Excel
        </button>
      </div>

      {/* ── KPIs ── */}
      <AnalyticsKpis stats={stats} yesterdayStats={yesterdayStats} />

      {/* ── RÉSUMÉ PAR VILLE / SECTEUR ── */}
      <SummaryTable animateurs={filteredAnims} todayPtgs={filteredPtgs} filterVille={filterVille} />

      {/* ── SECTEURS SANS PRÉSENCE ── */}
      <SectorGapPanel animateurs={filteredAnims} todayPtgs={filteredPtgs} />

      {/* ── SESSIONS ACTIVES ── */}
      <div className="section-hd">
        <div>
          <div className="section-title">Sessions actives</div>
          <div className="section-sub">Team Leads connectés en ce moment</div>
        </div>
      </div>
      <div className="table-card" style={{marginBottom:20}}>
        {accounts.filter(a => LS.isLive(a.email)).length === 0 ? (
          <div className="empty" style={{padding:'28px'}}>
            <div style={{fontSize:13,color:'var(--neutral-400)'}}>Aucun Team Lead connecté en ce moment</div>

            </thead>
            <tbody>
              {accounts.filter(a => LS.isLive(a.email)).map(acc => {
                const s = LS.getSessions()[acc.email];

                      {ptgToday > 0 && <span style={{marginLeft:6,fontSize:11,color:'#7C3AED',fontWeight:600}}>{ptgToday} ptg.</span>}
                    </td>

                    </td>
                    <td><span className="mono">{fmtDate(acc.createdAt)}</span></td>
                    <td>
                      <span className={`badge ${acc.createdBy==='manager'||acc.createdBy==='system'?'badge-system':'badge-self'}`}>
                        {acc.createdBy === 'manager' || acc.createdBy === 'system' ? 'Pré-chargé' : 'Auto-inscription'}
                      </span>
                    </td>
                    <td>
                      <div style={{display:'flex',gap:6}}>
                        <button className="btn btn-ghost btn-sm" onClick={() => setEditTarget(acc)} title="Modifier le compte">
                          <i data-lucide="pencil" style={{width:13,height:13}}></i>
                        </button>
                        <button className="btn btn-danger btn-sm" onClick={() => handleDelete(acc)} title="Supprimer">
                          <i data-lucide="trash-2" style={{width:13,height:13}}></i>

                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table></div>
        )}
      </div>
    </>
  );
}

/* ── XLSX EXPORT HELPERS ── */
function toISODate(d) {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function exportJournalXLSX(rows, dateLabel) {
  const STATUS_COLORS = { present:'DCFCE7', absent:'FEE2E2', malade:'FEF3C7', demission:'F3E8FF', recupe:'CFFAFE', conge:'E0E7FF', renfort:'FFEDD5' };
  const hStyle = { font:{bold:true,color:{rgb:'FFFFFF'},sz:12}, fill:{fgColor:{rgb:'0052CC'}}, alignment:{horizontal:'center',vertical:'center'} };
  const headers = ['Date','Animateur','Ville','Team Lead','Statut','Heure','Note'];
  const ws_data = [headers, ...rows.map(p => [
    p.date ? (() => { const d = new Date(p.date); return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`; })() : '—',
    p.animateurName, p.ville, p.teamLeadEmail?.split('@')[0]||'—',
    STATUS_FR[p.status]||p.status, p.time||'—', p.note||''
  ])];
  const ws = XLSX.utils.aoa_to_sheet(ws_data);
  ws['!cols'] = [{wch:18},{wch:28},{wch:14},{wch:20},{wch:12},{wch:8},{wch:34}];
  ws['!freeze'] = {xSplit:0, ySplit:1};
  headers.forEach((_,i) => {
    const cell = XLSX.utils.encode_cell({r:0,c:i});
    if (ws[cell]) ws[cell].s = hStyle;
  });
  rows.forEach((p,ri) => {
    const bg = STATUS_COLORS[p.status];
    if (!bg) return;
    headers.forEach((_,ci) => {
      const cell = XLSX.utils.encode_cell({r:ri+1,c:ci});
      if (ws[cell]) ws[cell].s = { fill:{fgColor:{rgb:bg}} };
    });
  });
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Journal');
  XLSX.writeFile(wb, `journal_${dateLabel}.xlsx`);
}

function exportWeeklyXLSX(rows, weekDays) {
  const DAY_FR = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
  const STATUS_COLORS = { present:'DCFCE7', absent:'FEE2E2', malade:'FEF3C7', demission:'F3E8FF', recupe:'CFFAFE', conge:'E0E7FF', renfort:'FFEDD5' };
  const hStyle = { font:{bold:true,color:{rgb:'FFFFFF'},sz:11}, fill:{fgColor:{rgb:'0052CC'}}, alignment:{horizontal:'center'} };
  const dayHeaders = weekDays.map((d,i) => `${DAY_FR[i]} ${d.getDate()}/${d.getMonth()+1}`);
  const headers = ['Animateur','Ville','Team Lead',...dayHeaders,'Total sem.'];
  const ws_data = [headers, ...rows.map(r => [
    r.name, r.ville, r.teamLead,
    ...weekDays.map(d => {
      const ptg = r.days[d.toDateString()];
      return ptg ? (STATUS_FR[ptg]||ptg) : '—';
    }),
    `${r.totalPresent}/7`
  ])];
  const ws = XLSX.utils.aoa_to_sheet(ws_data);
  ws['!cols'] = [{wch:26},{wch:14},{wch:20},...weekDays.map(()=>({wch:10})),{wch:10}];
  ws['!freeze'] = {xSplit:3, ySplit:1};
  headers.forEach((_,i) => { const c = XLSX.utils.encode_cell({r:0,c:i}); if(ws[c]) ws[c].s=hStyle; });
  rows.forEach((r,ri) => {
    weekDays.forEach((d,ci) => {
      const ptg = r.days[d.toDateString()];
      const bg = ptg ? STATUS_COLORS[ptg] : null;
      if (bg) {
        const c = XLSX.utils.encode_cell({r:ri+1,c:3+ci});
        if (ws[c]) ws[c].s = { fill:{fgColor:{rgb:bg}}, alignment:{horizontal:'center'} };
      }
    });
  });
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Présence hebdo');
  XLSX.writeFile(wb, `presence_semaine_${toISODate(weekDays[0])}.xlsx`);
}

function dateToISO(dateStr) {
  const d = new Date(dateStr);
  if (isNaN(d)) return null;
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function exportRangeXLSX(allPointages, accounts, fromStr, toStr) {
  const inRange  = allPointages.filter(p => {
    if (!p.date) return false;
    const iso = dateToISO(p.date);
    return iso && iso >= fromStr && iso <= toStr;
  });
  inRange.sort((a,b) => new Date(a.date)-new Date(b.date) || (a.animateurName||'').localeCompare(b.animateurName||''));
  const tlMap = {};
  accounts.forEach(a => { tlMap[a.email] = a.name; });
  const STATUS_COLORS = { present:'DCFCE7', absent:'FEE2E2', malade:'FEF3C7', demission:'F3E8FF', recupe:'CFFAFE', conge:'E0E7FF', renfort:'FFEDD5' };
  const hStyle = { font:{bold:true,color:{rgb:'FFFFFF'},sz:11}, fill:{fgColor:{rgb:'0052CC'}}, alignment:{horizontal:'center'} };
  const DAY_FR = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  const headers = ['Date','Jour','Animateur','Ville','Team Lead','Statut','Heure','Note'];
  const dataRows = inRange.length > 0
    ? inRange.map(p => {
        const d = new Date(p.date);
        return [
          `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`,
          DAY_FR[d.getDay()],
          p.animateurName||'—',
          p.ville||'—',
          tlMap[p.teamLeadEmail] || p.teamLeadEmail?.split('@')[0] || '—',
          STATUS_FR[p.status]||p.status||'—',
          p.time||'—',
          p.note||'',
        ];
      })
    : [['Aucun pointage enregistré pour cette période','','','','','','','']];
  const ws_data = [headers, ...dataRows];
  const ws = XLSX.utils.aoa_to_sheet(ws_data);
  ws['!cols'] = [{wch:12},{wch:6},{wch:26},{wch:14},{wch:20},{wch:12},{wch:8},{wch:20}];
  headers.forEach((_,i) => { const c = XLSX.utils.encode_cell({r:0,c:i}); if(ws[c]) ws[c].s=hStyle; });
  inRange.forEach((p,ri) => {
    const bg = STATUS_COLORS[p.status];
    if (bg) {
      const c = XLSX.utils.encode_cell({r:ri+1,c:5});
      if(ws[c]) ws[c].s = { fill:{fgColor:{rgb:bg}}, alignment:{horizontal:'center'} };
    }
  });
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Présence');
  XLSX.writeFile(wb, `presence_${fromStr}_au_${toStr}.xlsx`);
}
