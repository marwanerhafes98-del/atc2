/* ── UNASSIGNED MATRIX ── */
function UnassignedMatrix({ polygons, animateurs }) {
  const [expanded, setExpanded] = React.useState(new Set());
  const toggle = (city) => setExpanded(prev => {
    const next = new Set(prev);
    next.has(city) ? next.delete(city) : next.add(city);
    return next;
  });

  // Groupe les polygones sans animateur par dossier KML (= ville dans Google My Maps)
  const byCity = React.useMemo(() => {
    const map = {};
    polygons.forEach(poly => {
      const hasAnim = animateurs.find(a =>
        (a.sector||'').toLowerCase().trim() === poly.name.toLowerCase().trim()
      );
      if (!hasAnim) {
        const city = poly.folder || 'Non rattaché';
        if (!map[city]) map[city] = [];
        map[city].push(poly.name);
      }
    });
    return Object.entries(map).sort((a,b) => b[1].length - a[1].length);
  }, [polygons, animateurs]);

  const total = byCity.reduce((s,[,v]) => s + v.length, 0);

  if (!total) return (
    <div style={{marginTop:16,background:'#DCFCE7',border:'1px solid #BBF7D0',borderRadius:10,padding:'12px 18px',display:'flex',alignItems:'center',gap:10}}>
      <i data-lucide="check-circle-2" style={{width:18,height:18,color:'#16A34A',flexShrink:0}}></i>
      <span style={{fontSize:13,fontWeight:700,color:'#15803D'}}>Tous les secteurs ont un animateur affecté</span>
    </div>
  );

  return (
    <div style={{marginTop:20}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
        <div style={{width:10,height:10,borderRadius:99,background:'#EC4899',flexShrink:0}}></div>
        <span style={{fontSize:14,fontWeight:700,color:'var(--neutral-900)'}}>Secteurs sans animateur affecté</span>
        <span style={{background:'#FCE7F3',color:'#BE185D',fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:99}}>{total} secteur{total!==1?'s':''}</span>
      </div>
      <div className="table-card">
        <table className="data-table" style={{width:'100%'}}>
          <thead>
            <tr>
              <th style={{width:36}}></th>
              <th>Ville / Zone</th>
              <th style={{width:220,textAlign:'center'}}>Secteurs sans animateur</th>
            </tr>
          </thead>
          <tbody>
            {byCity.map(([city, sectors]) => (
              <React.Fragment key={city}>
                <tr style={{cursor:'pointer',background:expanded.has(city)?'var(--primary-50)':'white'}} onClick={() => toggle(city)}>
                  <td style={{textAlign:'center'}}>
                    <div style={{width:24,height:24,borderRadius:6,background:expanded.has(city)?'var(--primary-600)':'var(--neutral-100)',display:'inline-flex',alignItems:'center',justifyContent:'center',transition:'all 150ms'}}>
                      <i data-lucide={expanded.has(city)?'minus':'plus'} style={{width:13,height:13,color:expanded.has(city)?'white':'var(--neutral-600)'}}></i>
                    </div>
                  </td>
                  <td style={{fontWeight:700,color:'var(--neutral-900)'}}>{city}</td>
                  <td style={{textAlign:'center'}}>
                    <span style={{background:'#FCE7F3',color:'#BE185D',fontSize:13,fontWeight:800,padding:'4px 14px',borderRadius:99,display:'inline-flex',alignItems:'center',gap:6}}>
                      <span style={{width:7,height:7,borderRadius:99,background:'#EC4899',display:'inline-block'}}></span>
                      {sectors.length}
                    </span>
                  </td>
                </tr>
                {expanded.has(city) && sectors.map((name, i) => (
                  <tr key={i} style={{background:'#FDF4FF'}}>
                    <td></td>
                    <td colSpan={2} style={{paddingLeft:32}}>
                      <div style={{display:'flex',alignItems:'center',gap:8,paddingTop:4,paddingBottom:4}}>
                        <div style={{width:6,height:6,borderRadius:99,background:'#EC4899',flexShrink:0}}></div>
                        <span style={{fontSize:13,color:'var(--neutral-700)',fontWeight:500}}>{name || '—'}</span>
                      </div>
                    </td>
                  </tr>
                ))}
              </React.Fragment>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ── KML MAP VIEW ── */
const POLY_COLORS = {
  present:'#16A34A', absent:'#DC2626', malade:'#D97706', demission:'#7C3AED',
  nonpointe:'#64748B', recupe:'#0E7490', conge:'#4338CA', renfort:'#C2410C',
  noanimateur:'#EC4899'
};
const POLY_LEGEND = [
  { status:'present',     label:'Présent' },
  { status:'absent',      label:'Absent' },
  { status:'malade',      label:'Malade' },
  { status:'recupe',      label:'Récupe' },
  { status:'conge',       label:'Congé' },
  { status:'renfort',     label:'Renfort' },
  { status:'demission',   label:'Démission' },
  { status:'nonpointe',   label:'Non pointé' },
  { status:'noanimateur', label:'Sans animateur' },
];

function KmlMapView({ animateurs, pointages, accounts, isTL }) {
  const [kmlMeta,      setKmlMeta]      = useState(null);
  const [polygons,     setPolygons]     = useState([]);
  const [uploading,    setUploading]    = useState(false);
  const [toast,        setToast]        = useState('');
  const [filterVille,  setFilterVille]  = useState('Toutes');
  const [filterTL,     setFilterTL]     = useState('Tous');
  const [filterStatus, setFilterStatus] = useState('Tous');
  const containerRef = useRef(null);
  const mapRef       = useRef(null);
  const layersRef    = useRef([]);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 3500); };

  // Load KML from Firebase
  useEffect(() => {
    const ref = db.ref('ptg/kml');
    ref.on('value', snap => {
      if (!snap.exists()) return;
      const val = snap.val();
      setKmlMeta({ filename: val.filename, uploadedAt: val.uploadedAt, count: val.polygonCount || 0 });
      if (val.data) setPolygons(parseKML(val.data));
    });
    return () => ref.off('value');
  }, []);

  // Callback ref — initialise Leaflet dès que le div est dans le DOM
  const mapCallbackRef = useCallback(node => {
    if (!node || mapRef.current) return;
    containerRef.current = node;
    mapRef.current = L.map(node, { zoomControl: true }).setView([31.7, -7.1], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors', maxZoom: 19
    }).addTo(mapRef.current);
    setTimeout(() => mapRef.current && mapRef.current.invalidateSize(), 250);
  }, []);

  // Render/refresh polygon layers
  useEffect(() => {
    if (!mapRef.current) return;
    layersRef.current.forEach(l => mapRef.current.removeLayer(l));
    layersRef.current = [];
    if (!polygons.length) return;

    const today = new Date().toDateString();
    const todayPtgs = pointages.filter(p => p.date === today);
    const newLayers = [];

    polygons.forEach(poly => {
      const anim = animateurs.find(a =>
        (a.sector || '').toLowerCase().trim() === poly.name.toLowerCase().trim()
      );

      let status = 'noanimateur';
      let tlName = '—';

      if (anim) {
        const ptg = todayPtgs.find(p => p.animateurId === anim.id || p.animateurName === anim.name);
        status = ptg ? ptg.status : 'nonpointe';
        const tlAcc = accounts.find(a => a.email === ptg?.teamLeadEmail);
        tlName = tlAcc ? tlAcc.name : accounts.find(a => a.ville === anim.ville)?.name || '—';
      }

      // En mode TL : masquer les polygones sans animateur (ville inconnue)
      if (isTL && status === 'noanimateur') return;
      // Filters
      if (filterVille !== 'Toutes' && (!anim || anim.ville !== filterVille)) return;
      if (filterStatus !== 'Tous' && status !== filterStatus) return;
      if (filterTL !== 'Tous') {
        const tlAcc = accounts.find(a => a.name === filterTL);
        const ptg = tlAcc && anim ? todayPtgs.find(p => (p.animateurId===anim.id||p.animateurName===anim.name) && p.teamLeadEmail===tlAcc.email) : null;
        if (!ptg) return;
      }

      const color = POLY_COLORS[status] || '#6B7280';
      const layer = L.polygon(poly.coordinates, {
        color, fillColor: color, fillOpacity: 0.45, weight: 2, opacity: 0.9
      });

      const statusLabel = STATUS_FR[status] || 'Sans animateur';
      const html = anim
        ? `<div style="font-size:12px;line-height:1.7;min-width:190px">
            <div style="font-weight:700;font-size:13px;color:#0f172a;margin-bottom:3px">${anim.name}</div>
            <div><span style="color:#94a3b8">Matricule :</span> ${anim.matricule||'—'}</div>
            <div><span style="color:#94a3b8">Tél :</span> ${anim.phone||anim.telephone||'—'}</div>
            <div><span style="color:#94a3b8">Team Lead :</span> ${tlName}</div>
            <div><span style="color:#94a3b8">Ville :</span> ${anim.ville}</div>
            <div><span style="color:#94a3b8">Statut :</span> <span style="font-weight:700;color:${color}">${statusLabel}</span></div>
           </div>`
        : `<div style="font-size:12px;line-height:1.7">
            <div style="font-weight:700;font-size:13px;color:#0f172a;margin-bottom:3px">${poly.name||'Zone'}</div>
            <div style="color:#94a3b8">Sans animateur affecté</div>
           </div>`;

      layer.bindTooltip(html, { sticky: true, opacity: 1 });
      layer.addTo(mapRef.current);
      newLayers.push(layer);
    });

    layersRef.current = newLayers;

    if (newLayers.length > 0 && filterVille === 'Toutes' && filterTL === 'Tous' && filterStatus === 'Tous') {
      try { mapRef.current.fitBounds(L.featureGroup(newLayers).getBounds(), { padding: [30, 30] }); } catch(e) {}
    }
  }, [polygons, animateurs, pointages, accounts, filterVille, filterTL, filterStatus]);

  const handleUpload = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (!file.name.toLowerCase().endsWith('.kml')) { showToast('Veuillez sélectionner un fichier .kml'); return; }
    setUploading(true);
    try {
      const text = await file.text();
      const parsed = parseKML(text);
      if (!parsed.length) { showToast('Aucun polygone trouvé dans ce fichier KML'); setUploading(false); return; }
      await db.ref('ptg/kml').set({
        data: text, filename: file.name, polygonCount: parsed.length,
        uploadedAt: new Date().toISOString(), uploadedBy: 'Manager'
      });
      showToast(`✓ ${parsed.length} polygone(s) importé(s) avec succès`);
    } catch(err) { showToast('Erreur lors de l\'import KML'); }
    setUploading(false);
    e.target.value = '';
  };

  const VILLES_LIST = [...new Set(animateurs.map(a => a.ville).filter(Boolean))].sort();

  return (
    <div>
      {/* Toast */}
      {toast && (
        <div style={{position:'fixed',top:20,right:20,zIndex:9999,background:'#0f172a',color:'white',padding:'10px 18px',borderRadius:10,fontSize:13,fontWeight:600,boxShadow:'0 4px 16px rgba(0,0,0,0.25)'}}>
          {toast}
        </div>
      )}

      {/* Header */}
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12,marginBottom:16,flexWrap:'wrap'}}>
        <div>
          <div style={{fontSize:15,fontWeight:700,color:'var(--neutral-900)'}}>Cartographie des Polygones</div>
          {kmlMeta
            ? <div style={{fontSize:11,color:'var(--neutral-500)',marginTop:2}}>{kmlMeta.filename} · {kmlMeta.count} polygone(s) · importé le {new Date(kmlMeta.uploadedAt).toLocaleDateString('fr-FR')}</div>
            : <div style={{fontSize:11,color:'var(--neutral-400)',marginTop:2}}>Aucun fichier KML chargé</div>
          }
        </div>
        {!isTL && (
          <label style={{display:'inline-flex',alignItems:'center',gap:8,height:38,padding:'0 16px',background:'var(--primary-600)',color:'white',borderRadius:8,fontSize:13,fontWeight:700,cursor: uploading?'wait':'pointer',whiteSpace:'nowrap',userSelect:'none',opacity:uploading?0.7:1}}>
            <i data-lucide="upload" style={{width:14,height:14}}></i>
            {uploading ? 'Import en cours…' : 'Importer KML'}
            <input type="file" accept=".kml" style={{display:'none'}} onChange={handleUpload} disabled={uploading} />
          </label>
        )}
      </div>

      {/* Filters */}
      <div className="analytics-filters" style={{marginBottom:16}}>
        <span className="af-label">Filtres</span>
        <div className="af-divider"></div>
        {!isTL && (
          <select className={`af-select ${filterVille!=='Toutes'?'active-filter':''}`} value={filterVille} onChange={e => setFilterVille(e.target.value)}>
            <option value="Toutes">Toutes les villes</option>
            {VILLES_LIST.map(v => <option key={v} value={v}>{v}</option>)}
          </select>
        )}
        <select className={`af-select ${filterTL!=='Tous'?'active-filter':''}`} value={filterTL} onChange={e => setFilterTL(e.target.value)}>
          <option value="Tous">Tous les TL</option>
          {accounts.map(a => <option key={a.id} value={a.name}>{a.name}</option>)}
        </select>
        <select className={`af-select ${filterStatus!=='Tous'?'active-filter':''}`} value={filterStatus} onChange={e => setFilterStatus(e.target.value)}>
          <option value="Tous">Tous les statuts</option>
          <option value="present">Présent</option>
          <option value="absent">Absent</option>
          <option value="malade">Malade</option>
          <option value="recupe">Récupe</option>
          <option value="conge">Congé</option>
          <option value="renfort">Renfort</option>
          <option value="demission">Démission</option>
          <option value="nonpointe">Non pointé</option>
          <option value="noanimateur">Sans animateur</option>
        </select>
        {(filterVille!=='Toutes'||filterTL!=='Tous'||filterStatus!=='Tous') && (
          <button style={{height:36,padding:'0 12px',border:'1.5px solid var(--neutral-200)',borderRadius:8,background:'white',color:'var(--neutral-600)',fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'var(--font-sans)'}}
            onClick={() => { setFilterVille('Toutes'); setFilterTL('Tous'); setFilterStatus('Tous'); }}>
            Réinitialiser
          </button>
        )}
        <div className="af-spacer"></div>
        <div style={{fontSize:12,color:'var(--neutral-500)',fontWeight:600}}>
          {layersRef.current.length} zone{layersRef.current.length!==1?'s':''} affichée{layersRef.current.length!==1?'s':''}
        </div>
      </div>

      {/* Map container — pas d'overflow:hidden pour que Leaflet fonctionne */}
      <div style={{position:'relative',borderRadius:12,border:'1px solid var(--neutral-200)',boxShadow:'0 1px 6px rgba(0,0,0,0.07)'}}>
        <div ref={mapCallbackRef} style={{height:'calc(100vh - 290px)',minHeight:500,borderRadius:12}}></div>
        {!polygons.length && (
          <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',zIndex:1000,background:'white',borderRadius:12,padding:'20px 28px',boxShadow:'0 4px 20px rgba(0,0,0,0.12)',textAlign:'center',pointerEvents:'none',whiteSpace:'nowrap'}}>
            <i data-lucide="upload-cloud" style={{width:36,height:36,color:'var(--neutral-300)',marginBottom:8}}></i>
            <div style={{fontSize:14,fontWeight:700,color:'var(--neutral-600)',marginBottom:2}}>Aucun fichier KML importé</div>
            {!isTL && <div style={{fontSize:12,color:'var(--neutral-400)'}}>Cliquez sur "Importer KML" ci-dessus</div>}
          </div>
        )}

        {/* Legend */}
        <div style={{position:'absolute',bottom:24,right:12,background:'white',borderRadius:10,padding:'10px 14px',boxShadow:'0 2px 16px rgba(0,0,0,0.15)',zIndex:1000,fontSize:11}}>
          <div style={{fontWeight:800,fontSize:10,color:'var(--neutral-500)',textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:8}}>Légende</div>
          {POLY_LEGEND.map(l => (
            <div key={l.status} style={{display:'flex',alignItems:'center',gap:7,marginBottom:5}}>
              <div style={{width:13,height:13,borderRadius:3,background:POLY_COLORS[l.status],flexShrink:0,border:'1px solid rgba(0,0,0,0.1)'}}></div>
              <span style={{color:'var(--neutral-700)',fontWeight:500}}>{l.label}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Matrice — secteurs sans animateur par ville */}
      {polygons.length > 0 && <UnassignedMatrix polygons={polygons} animateurs={animateurs} />}
    </div>
  );
}

  const [sessions,    setSessions]    = useState({});
  const [pointages,   setPointages]   = useState([]);
  const [animateurs,  setAnimateurs]  = useState(ANIMATEURS_DB);

  const loggedIn = !!session;

  useEffect(() => { lucide.createIcons(); });

  const refresh = useCallback(() => {}, []);

  useEffect(() => {
    if (!loggedIn) return;
    LS.seedAnimateurs().then(() => LS.seedAccounts());
    const refAcc  = db.ref('ptg/accounts');
    const refSes  = db.ref('ptg/sessions');
    const refPtg  = db.ref('ptg/pointages');
    const refAnim = db.ref('ptg/animateurs');
    refAcc.on('value',  snap => { _accounts   = snap.exists() ? Object.values(snap.val()) : [];                                      setAccounts([..._accounts]); });
    refSes.on('value',  snap => { _sessions   = snap.exists() ? snap.val() : {};                                                     setSessions({..._sessions}); });
    refPtg.on('value',  snap => { _pointages  = snap.exists() ? Object.entries(snap.val()).map(([k,v]) => ({...(v||{}), _key:k})) : []; setPointages([..._pointages]); });
    refAnim.on('value', snap => { _animateurs = snap.exists() ? Object.values(snap.val()).sort((a,b) => a.id - b.id) : [...ANIMATEURS_DB]; setAnimateurs([..._animateurs]); });
    return () => { refAcc.off('value'); refSes.off('value'); refPtg.off('value'); refAnim.off('value'); };
  }, [loggedIn]);

  if (!loggedIn) return <LoginPage onLogin={(sess, remember) => {
    if (remember) localStorage.setItem('ptg_manager_session', JSON.stringify(sess));
    setSession(sess);
  }} />;

  const isTL       = session.role === 'teamlead';
  const cityFilter = isTL ? session.ville : null;

  const activeAnims   = animateurs.filter(a => a.actif !== false && (!cityFilter || a.ville === cityFilter));
  const allAnims      = animateurs.filter(a => !cityFilter || a.ville === cityFilter);
  const filteredPtgs  = pointages.filter(p => !cityFilter || p.ville === cityFilter);

  const liveCount  = (isTL ? accounts.filter(a => a.email === session.email) : accounts).filter(a => LS.isLive(a.email)).length;
  const todayPtgN  = filteredPtgs.filter(p => p.date === new Date().toDateString()).length;
  const LIVE_LOC_THRESH = 120000;
  const PAGE_TITLES = { dashboard:'Dashboard', accounts:'Comptes Team Leads', animateurs:'Gestion des animateurs', carte:'Localisation en temps réel', activity:'Journal des pointages', weekly:'Présence hebdomadaire', geozone:'Geo Zoning', scores:'Scores & Performance', polygones:'Cartographie des Polygones' };
  const pageTitle  = PAGE_TITLES[view] || 'Dashboard';

  const navItems = [
    { key:'dashboard',  icon:'layout-dashboard', label:'Dashboard',        badge:0 },
    ...(!isTL ? [{ key:'accounts', icon:'users', label:'Team Lead',        badge:accounts.length }] : []),
    { key:'animateurs', icon:'user-cog',         label:'Animateurs',       badge:allAnims.length },
    { key:'carte',      icon:'map-pin',          label:'Carte temps réel', badge:liveCount },
    { key:'activity',   icon:'clipboard-list',   label:'Journal',          badge:todayPtgN },
    { key:'weekly',     icon:'calendar-days',    label:'Présence hebdo',   badge:0 },
    { key:'geozone',   icon:'map',              label:'Geo Zoning',       badge:0 },
    { key:'polygones', icon:'layers',           label:'Cartographie',     badge:0 },
    { key:'scores',    icon:'award',            label:'Scores',           badge:0 },
  ];

  const handleLogout = () => { localStorage.removeItem('ptg_manager_session'); setSession(null); setSidebarOpen(false); };

  return (
    <div className="app-layout">
      {sidebarOpen && <div className="mob-overlay" onClick={() => setSidebarOpen(false)}></div>}

      <div className={`sidebar${sidebarOpen ? ' open' : ''}`}>
        <div className="sidebar-brand">
          <div className="sidebar-brand-row">
            <div className="sidebar-brand-icon">
              <i data-lucide="clipboard-check" style={{width:18,height:18,color:'white'}}></i>
            </div>
            <div className="sidebar-brand-name">ESPACE MANAGER</div>
          </div>
          {isTL && (
            <div style={{marginTop:6,display:'flex',alignItems:'center',gap:6,marginLeft:44}}>
              <span style={{fontSize:10,fontWeight:700,color:'var(--primary-600)',background:'var(--primary-50)',padding:'2px 8px',borderRadius:99,border:'1px solid var(--primary-200)'}}>
                <i data-lucide="map-pin" style={{width:9,height:9,display:'inline',marginRight:3}}></i>
                {session.ville}
              </span>
            </div>
          )}
        </div>

        <nav className="sidebar-nav">
          <div className="nav-group-label">Navigation</div>
          {navItems.map(item => (
            <button key={item.key} className={`nav-btn ${view===item.key?'active':''}`} onClick={() => { setView(item.key); setSidebarOpen(false); }}>
              <i data-lucide={item.icon} style={{width:17,height:17}}></i>
              {item.label}
              {item.badge > 0 && (
                <span className={`nav-badge ${item.key==='activity'?'nav-badge-green':''}`}>{item.badge}</span>
              )}
            </button>
          ))}
        </nav>

        <div className="sidebar-footer">
          <div className="sidebar-user">
            <div className="sidebar-avatar">{session.initials || 'MG'}</div>
            <div className="sidebar-user-info">
              <div className="sidebar-user-name">{session.name}</div>
              <div className="sidebar-user-email">{session.email}</div>
            </div>
            <button className="sidebar-logout" onClick={handleLogout} title="Déconnexion">
              <i data-lucide="log-out" style={{width:16,height:16}}></i>
            </button>
          </div>
          <div style={{marginTop:10,textAlign:'center',fontSize:10,color:'var(--neutral-400)',letterSpacing:'0.3px'}}>
            Created by <span style={{fontWeight:700,color:'var(--primary-500)'}}>Marwane Rhafes</span>
          </div>
        </div>
      </div>

      <div className="main-area">
        <div className="topbar">
          <button className="hamburger" onClick={() => setSidebarOpen(true)}>
            <i data-lucide="menu" style={{width:20,height:20}}></i>
          </button>
          <div className="topbar-title">{pageTitle}</div>
          <div className="topbar-right">
            {isTL && (
              <div style={{display:'flex',alignItems:'center',gap:5,fontSize:12,fontWeight:700,color:'var(--primary-700)',background:'var(--primary-50)',padding:'5px 10px',borderRadius:99,border:'1px solid var(--primary-200)'}}>
                <i data-lucide="map-pin" style={{width:12,height:12}}></i>
                Vue : {session.ville}
              </div>
            )}
            {liveCount > 0 && (
              <div className="topbar-live">
                <span className="live-dot"></span>
                {liveCount} connecté{liveCount>1?'s':''} maintenant
              </div>
            )}
            <button className="topbar-refresh" onClick={refresh}>
              <i data-lucide="refresh-cw" style={{width:14,height:14}}></i><span className="refresh-label">Actualiser</span>
            </button>
          </div>
        </div>

        <div className="content">
          {view === 'dashboard'  && <DashboardView accounts={isTL ? accounts.filter(a=>a.email===session.email) : accounts} sessions={sessions} pointages={filteredPtgs} onRefresh={refresh} animateurs={activeAnims} />}
          {view === 'accounts'   && !isTL && <AccountsView accounts={accounts} sessions={sessions} onRefresh={refresh} />}
          {view === 'animateurs' && <AnimateursView animateurs={allAnims} accounts={isTL ? accounts.filter(a=>a.email===session.email) : accounts} />}
          {view === 'carte'      && <MapView accounts={isTL ? accounts.filter(a=>a.email===session.email) : accounts} />}
          {view === 'activity'   && <ActivityView pointages={filteredPtgs} accounts={isTL ? accounts.filter(a=>a.email===session.email) : accounts} />}
          {view === 'weekly'     && <WeeklyPresenceView pointages={filteredPtgs} accounts={isTL ? accounts.filter(a=>a.email===session.email) : accounts} animateurs={activeAnims} />}
          {view === 'geozone'    && <GeoZoningView />}
          {view === 'polygones'  && <KmlMapView pointages={filteredPtgs} animateurs={allAnims} accounts={isTL ? accounts.filter(a=>a.email===session.email) : accounts} isTL={isTL} />}
          {view === 'scores'     && <ScoresView pointages={filteredPtgs} animateurs={allAnims} accounts={isTL ? accounts.filter(a=>a.email===session.email) : accounts} />}
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
