  const PAGE_TITLES = { dashboard:'Dashboard', accounts:'Comptes Team Leads', tlaccess:'Accès des pages TL', animateurs:'Gestion des animateurs', secteurs:'Gestion des Secteurs', villes:'Gestion des Villes', carte:'Localisation en temps réel', activity:'Journal des pointages', weekly:'Présence hebdomadaire', analytics:'Analyses de pointage', geozone:'Geo Zoning', scores:'Scores & Performance', polygones:'Cartographie des Polygones', overlaps:'Correction des Overlaps', watchlist:'Animateurs à surveiller', sectscores:'Scoring par Ville & Secteur' };
  const pageTitle  = PAGE_TITLES[view] || 'Dashboard';

  // Permissions TL lues en temps réel depuis Firebase
  const tlAccess = useMemo(() => {
    if (!isTL) return null;
    const acc = accounts.find(a => a.email === session.email);
    return acc?.managerAccess || {};
  }, [isTL, accounts, session]);
  const tlHas = (key) => { const p = TL_PAGES.find(x=>x.key===key); if (p?.locked) return true; return tlAccess?.[key] ?? TL_DEFAULT_ACCESS[key] ?? false; };

  const navItems = isTL ? [
    ...TL_PAGES.filter(p => tlHas(p.key)).map(p => ({ key:p.key, icon:p.icon, label:p.label, badge:
      p.key==='animateurs' ? allAnims.length :
      p.key==='activity'   ? todayPtgN :
      p.key==='carte'      ? liveCount : 0
    })),
  ] : [
    { key:'dashboard',  icon:'layout-dashboard', label:'Dashboard',            badge:0 },
    { key:'accounts',   icon:'users',            label:'Team Lead',            badge:accounts.length },
    { key:'tlaccess',   icon:'shield-check',     label:'Accès pages TL',       badge:0 },
    { key:'animateurs', icon:'user-cog',         label:'Animateurs',           badge:allAnims.length },
    { key:'villes',     icon:'map-pin',           label:'Gestion des Villes',   badge:villes.length },
    { key:'secteurs',   icon:'grid-3x3',         label:'Gestion des Secteurs', badge:secteurs.length },
    { key:'carte',      icon:'map-pin',          label:'Carte temps réel',     badge:liveCount },
    { key:'activity',   icon:'clipboard-list',   label:'Journal',              badge:todayPtgN },
    { key:'weekly',     icon:'calendar-days',    label:'Présence hebdo',       badge:0 },
    { key:'analytics',  icon:'bar-chart-2',      label:'Analyses',             badge:0 },
    { key:'overlaps',   icon:'git-merge',        label:'Correction Overlaps',  badge:0 },
    { key:'geozone',    icon:'map',              label:'Geo Zoning',           badge:0 },
    { key:'polygones',  icon:'layers',           label:'Cartographie',         badge:0 },
    { key:'scores',     icon:'award',            label:'Scores',               badge:0 },
    { key:'watchlist',  icon:'alert-triangle',   label:'À surveiller',         badge:0 },
    { key:'sectscores', icon:'pie-chart',        label:'Scoring Secteurs',     badge:0 },
  ];

  const handleLogout = () => { localStorage.removeItem('ptg_manager_session'); setSession(null); setSidebarOpen(false); };

  return (
    <div className="app-layout">
      {sidebarOpen && <div className="mob-overlay" onClick={() => setSidebarOpen(false)}></div>}

      <div className={`sidebar${sidebarOpen ? ' open' : ''}`}>
        <div className="sidebar-brand">
          <div className="sidebar-brand-row">
            <div className="sidebar-brand-icon">
              <i data-lucide="clipboard-check" style={{width:18,height:18,color:'white'}}></i>
            </div>
            <div className="sidebar-brand-name">ESPACE MANAGER</div>
          </div>
          {isTL && (
            <div style={{marginTop:6,display:'flex',alignItems:'center',gap:6,marginLeft:44}}>
              <span style={{fontSize:10,fontWeight:700,color:'var(--primary-600)',background:'var(--primary-50)',padding:'2px 8px',borderRadius:99,border:'1px solid var(--primary-200)'}}>
                <i data-lucide="map-pin" style={{width:9,height:9,display:'inline',marginRight:3}}></i>
                {session.ville}
              </span>
            </div>
          )}
        </div>

        <nav className="sidebar-nav">
          <div className="nav-group-label">Navigation</div>
          {navItems.map(item => (
            <button key={item.key} className={`nav-btn ${view===item.key?'active':''}`} onClick={() => { setView(item.key); setSidebarOpen(false); }}>
              <i data-lucide={item.icon} style={{width:17,height:17}}></i>
              {item.label}
              {item.badge > 0 && (
                <span className={`nav-badge ${item.key==='activity'?'nav-badge-green':''}`}>{item.badge}</span>
              )}
            </button>
          ))}
        </nav>

        <div className="sidebar-footer">
          <div className="sidebar-user">
            <div className="sidebar-avatar">{session.initials || 'MG'}</div>
            <div className="sidebar-user-info">
              <div className="sidebar-user-name">{session.name}</div>
              <div className="sidebar-user-email">{session.email}</div>
            </div>
            <button className="sidebar-logout" onClick={handleLogout} title="Déconnexion">
              <i data-lucide="log-out" style={{width:16,height:16}}></i>
            </button>
          </div>
          <div style={{marginTop:10,textAlign:'center',fontSize:10,color:'var(--neutral-400)',letterSpacing:'0.3px'}}>
            Created by <span style={{fontWeight:700,color:'var(--primary-500)'}}>Marwane Rhafes</span>
          </div>
        </div>
      </div>

      <div className="main-area">
        <div className="topbar">
          <button className="hamburger" onClick={() => setSidebarOpen(true)}>
            <i data-lucide="menu" style={{width:20,height:20}}></i>
          </button>
          <div className="topbar-title">{pageTitle}</div>
          <div className="topbar-right">
            {isTL && (
              <div style={{display:'flex',alignItems:'center',gap:5,fontSize:12,fontWeight:700,color:'var(--primary-700)',background:'var(--primary-50)',padding:'5px 10px',borderRadius:99,border:'1px solid var(--primary-200)'}}>
                <i data-lucide="map-pin" style={{width:12,height:12}}></i>
                Vue : {session.ville}
              </div>
            )}
            {liveCount > 0 && (
              <div className="topbar-live">
                <span className="live-dot"></span>
                {liveCount} connecté{liveCount>1?'s':''} maintenant
              </div>
            )}
            <button className="topbar-refresh" onClick={refresh} disabled={refreshing}>
              <i data-lucide="refresh-cw" style={{width:14,height:14,transition:'transform 0.8s',transform:refreshing?'rotate(360deg)':'rotate(0deg)'}}></i><span className="refresh-label">{refreshing?'Actualisation…':'Actualiser'}</span>
            </button>
          </div>
        </div>

        <div className="content">
          {view === 'dashboard'  && <DashboardView accounts={isTL ? accounts.filter(a=>a.email===session.email) : accounts} sessions={sessions} pointages={filteredPtgs} onRefresh={refresh} animateurs={activeAnims} secteurs={isTL ? secteurs.filter(s=>s.ville===session.ville) : secteurs} />}
          {view === 'villes'     && !isTL && <VillesView villes={villes} />}
          {view === 'secteurs'   && (!isTL || tlHas('secteurs')) && <SectorsView secteurs={secteurs} villes={villes} readOnly={isTL} animateurs={allAnims} />}
          {view === 'accounts'   && !isTL && <AccountsView accounts={accounts} sessions={sessions} onRefresh={refresh} />}
          {view === 'tlaccess'   && !isTL && <TLAccessView accounts={accounts} />}
          {view === 'animateurs' && <AnimateursView animateurs={allAnims} accounts={isTL ? accounts.filter(a=>a.email===session.email) : accounts} pointages={filteredPtgs} />}
          {view === 'carte'      && <MapView accounts={isTL ? accounts.filter(a=>a.email===session.email) : accounts} />}
          {view === 'activity'   && <ActivityView pointages={filteredPtgs} accounts={isTL ? accounts.filter(a=>a.email===session.email) : accounts} />}
          {view === 'weekly'     && <WeeklyPresenceView pointages={filteredPtgs} accounts={isTL ? accounts.filter(a=>a.email===session.email) : accounts} animateurs={activeAnims} />}
          {view === 'analytics'  && <AnalyticsErrorBoundary><AnalyticsView pointages={filteredPtgs} animateurs={allAnims} accounts={isTL ? accounts.filter(a=>a.email===session.email) : accounts} secteurs={isTL ? secteurs.filter(s=>s.ville===session.ville) : secteurs} isTL={isTL} cityFilter={cityFilter} /></AnalyticsErrorBoundary>}
          {view === 'overlaps'   && (!isTL || tlHas('overlaps')) && <OverlapView />}
          {view === 'geozone'    && <GeoZoningView />}
          {view === 'polygones'  && <KmlMapView pointages={filteredPtgs} animateurs={allAnims} accounts={isTL ? accounts.filter(a=>a.email===session.email) : accounts} isTL={isTL} />}
          {view === 'scores'     && <ScoresView pointages={filteredPtgs} animateurs={allAnims} accounts={isTL ? accounts.filter(a=>a.email===session.email) : accounts} />}
          {view === 'watchlist'  && <WatchListView pointages={filteredPtgs} animateurs={allAnims} />}
          {view === 'sectscores' && <SectorScoresView pointages={filteredPtgs} animateurs={allAnims} secteurs={secteurs} />}
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
