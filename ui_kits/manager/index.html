/* ── IMPORT ANIMATEURS MODAL ── */
function ImportAnimateursModal({ animateurs, accounts, demissionDateMap = {}, onClose, onImported }) {
  const [file,      setFile]      = useState(null);
  const [preview,   setPreview]   = useState(null);
  const [importing, setImporting] = useState(false);
  const fileRef = useRef(null);

  const downloadTemplate = () => {
    const sorted = [...animateurs].sort((a,b) => a.ville.localeCompare(b.ville) || a.teamLead.localeCompare(b.teamLead) || a.name.localeCompare(b.name));
    const data = [
      ['TEAM LEAD','EMAIL','VILLE','NOM ANIMATEUR','SECTEUR','MATRICULE','TÉLÉPHONE','DÉMISSION','DATE DÉMISSION','MOTIF','MOTO','CONTRACT OP','DATE INTEGRATION'],
      ...sorted.map(a => {
        const acc = accounts.find(ac => ac.name === a.teamLead);
        const rawDem = a.dateDemission || demissionDateMap[a.id] || '';
        const dateDem = rawDem ? rawDem.split('-').reverse().join('/') : '';
        return [a.teamLead, acc?.email || '', a.ville, a.name, a.sector, a.matricule||'', a.phone||'', a.actif === false ? 'Oui' : 'Non', dateDem, a.motifDemission||'', a.moto ? 'Oui' : 'Non', a.contractOp||'', a.dateIntegration||''];
      }),
    ];
    const ws = XLSX.utils.aoa_to_sheet(data);
    ws['!cols'] = [{wch:24},{wch:28},{wch:14},{wch:26},{wch:26},{wch:14},{wch:16},{wch:12},{wch:14},{wch:28},{wch:10},{wch:14},{wch:16}];
    const hStyle = { font:{bold:true,color:{rgb:'FFFFFF'},sz:11}, fill:{fgColor:{rgb:'0052CC'}}, alignment:{horizontal:'center'} };
    ['A1','B1','C1','D1','E1','F1','G1','H1','I1','J1','K1','L1','M1'].forEach(c => { if (ws[c]) ws[c].s = hStyle; });
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Animateurs');
    XLSX.writeFile(wb, 'template_animateurs.xlsx');
  };

  const handleFile = (e) => {
    const f = e.target.files[0];
    if (!f) return;
    setFile(f);
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const wb   = XLSX.read(ev.target.result, { type:'array' });
        const ws   = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });
        if (rows.length < 2) { setPreview({ error:'Fichier vide ou sans données.' }); return; }
        const hdr    = rows[0].map(h => String(h||'').trim().toUpperCase());
        const colTL  = hdr.indexOf('TEAM LEAD');
        const colMail= hdr.indexOf('EMAIL');
        const colV   = hdr.indexOf('VILLE');
        const colN   = hdr.indexOf('NOM ANIMATEUR');
        const colS   = hdr.indexOf('SECTEUR');
        const colMat = hdr.indexOf('MATRICULE');
        const colPh  = hdr.indexOf('TÉLÉPHONE');
        const colDem = hdr.indexOf('DÉMISSION');
        const colMoto    = hdr.indexOf('MOTO');
        const colContract= hdr.indexOf('CONTRACT OP');
        const colDateInt = hdr.indexOf('DATE INTEGRATION');
        if ([colTL,colMail,colV,colN,colS].includes(-1)) {
          setPreview({ error:'Colonnes manquantes — utilisez le template fourni.' }); return;
        }
        const toUpdate=[], toCreate=[], errors=[];
        rows.slice(1).forEach((row, i) => {
          const teamLeadRaw = String(row[colTL]||'').trim();
          const teamLead    = accounts.find(a => a.name.toLowerCase() === teamLeadRaw.toLowerCase())?.name || teamLeadRaw;
          const tlEmail  = String(row[colMail]||'').trim().toLowerCase();
          const villeRaw = String(row[colV]||'').trim();
          const ville    = VILLES.find(v => v.toLowerCase() === villeRaw.toLowerCase()) || villeRaw;
          const name     = String(row[colN]||'').trim();
          const sector   = String(row[colS]||'').trim();
          const matricule= colMat >= 0 ? String(row[colMat]||'').trim() : '';
          const phone    = colPh  >= 0 ? String(row[colPh] ||'').trim() : '';
          const demRaw   = colDem >= 0 ? String(row[colDem]||'').trim().toLowerCase() : '';
          const actif    = (demRaw === 'oui') ? false : true;
          const motoRaw    = colMoto >= 0 ? String(row[colMoto]||'').trim().toLowerCase() : '';
          const moto       = motoRaw === 'oui';
          const contractRaw= colContract >= 0 ? String(row[colContract]||'').trim().toUpperCase() : '';
          const contractOp = contractRaw === 'ANAPEC' ? 'ANAPEC' : contractRaw === 'CDI' ? 'CDI' : contractRaw === 'CONTRAT OP' ? 'Contrat OP' : '';
          const dateIntegration = colDateInt >= 0 ? String(row[colDateInt]||'').trim() : '';
          if (!name) return;
          if (!teamLead || !ville || !sector) { errors.push({ row:i+2, name, reason:'Données incomplètes (TL, ville ou secteur manquant)' }); return; }
          const existing = animateurs.find(a => a.name.toLowerCase() === name.toLowerCase());
          if (existing) toUpdate.push({ ...existing, teamLead, ville, sector, matricule, phone, tlEmail, actif, moto, contractOp, dateIntegration });
          else          toCreate.push({ name, teamLead, ville, sector, matricule, phone, tlEmail, actif, moto, contractOp, dateIntegration });
        });
        setPreview({ toUpdate, toCreate, errors });
      } catch { setPreview({ error:'Impossible de lire le fichier.' }); }
    };
    reader.readAsArrayBuffer(f);
  };

  const handleImport = async () => {
    if (!preview || preview.error) return;
    setImporting(true);
    try {
      const updates = {};
      preview.toUpdate.forEach(a => {
        const { tlEmail: _, _t, ...animData } = a;
        updates[a.id] = animData;
      });
      const maxId = Math.max(...animateurs.map(a => a.id), 0);
      let next = maxId + 1;
      preview.toCreate.forEach(a => { updates[next] = { id:next, name:a.name, teamLead:a.teamLead, ville:a.ville, sector:a.sector, matricule:a.matricule||'', phone:a.phone||'', actif: a.actif !== false, moto: a.moto || false, contractOp: a.contractOp||'', dateIntegration: a.dateIntegration||'' }; next++; });
      await db.ref('ptg/animateurs').update(updates);

      // Update TL account emails where the Excel provides one
      const tlEmailMap = {};
      [...preview.toUpdate, ...preview.toCreate].forEach(a => {
        if (a.tlEmail && a.teamLead) tlEmailMap[a.teamLead] = a.tlEmail;
      });
      const accUpdates = {};
      for (const [tlName, email] of Object.entries(tlEmailMap)) {
        const acc = accounts.find(a => a.name === tlName);
        if (acc && email && acc.email !== email) accUpdates[`${acc.id}/email`] = email;
      }
      if (Object.keys(accUpdates).length) await db.ref('ptg/accounts').update(accUpdates);

      onImported(preview.toUpdate.length, preview.toCreate.length);
      onClose();
    } catch { alert('Erreur lors de l\'import Firebase.'); }
    finally { setImporting(false); }
  };

  const total = preview && !preview.error ? preview.toUpdate.length + preview.toCreate.length : 0;

  return (
    <div className="modal-overlay">
      <div className="modal" style={{maxWidth:640}}>
        <div className="modal-hd">
          <div className="modal-title">Import Excel — Animateurs</div>
          <button className="modal-close" onClick={onClose}><i data-lucide="x" style={{width:15,height:15}}></i></button>
        </div>
        <div className="modal-body">

          {/* Step 1 */}
          <div style={{background:'var(--neutral-50)',border:'1px solid var(--neutral-200)',borderRadius:10,padding:'12px 16px',marginBottom:14,display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,flexWrap:'wrap'}}>
            <div>
              <div style={{fontWeight:700,fontSize:13,color:'var(--neutral-900)'}}>1. Télécharger le template</div>
              <div style={{fontSize:12,color:'var(--neutral-500)',marginTop:2}}>Colonnes : TEAM LEAD · EMAIL · VILLE · NOM ANIMATEUR · SECTEUR</div>
            </div>
            <button className="btn btn-ghost" onClick={downloadTemplate}>
              <i data-lucide="download" style={{width:14,height:14}}></i>Template .xlsx
            </button>
          </div>

          {/* Step 2 */}
          <div style={{marginBottom:14}}>
            <div style={{fontWeight:700,fontSize:13,color:'var(--neutral-900)',marginBottom:8}}>2. Importer le fichier rempli</div>
            <label style={{display:'flex',alignItems:'center',gap:10,padding:'14px 16px',border:'2px dashed var(--neutral-300)',borderRadius:10,cursor:'pointer',background:'var(--neutral-50)',transition:'border-color 150ms'}}
              onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor='var(--primary-400)'}}
              onDragLeave={e=>{e.currentTarget.style.borderColor='var(--neutral-300)'}}
              onDrop={e=>{e.preventDefault();e.currentTarget.style.borderColor='var(--neutral-300)';const f=e.dataTransfer.files[0];if(f){handleFile({target:{files:[f]}})}}}>
              <i data-lucide="file-spreadsheet" style={{width:22,height:22,color:'var(--primary-600)',flexShrink:0}}></i>
              <span style={{fontSize:13,color:'var(--neutral-600)'}}>{file ? file.name : 'Cliquez ou glissez un fichier .xlsx / .xls'}</span>
              <input ref={fileRef} type="file" accept=".xlsx,.xls" style={{display:'none'}} onChange={handleFile} />
            </label>
          </div>

          {/* Error */}
          {preview?.error && <div className="form-error">{preview.error}</div>}

          {/* Preview */}
          {preview && !preview.error && (
            <div>
              <div style={{display:'flex',gap:8,marginBottom:10,flexWrap:'wrap'}}>
                <span style={{padding:'3px 11px',borderRadius:99,fontSize:12,fontWeight:700,background:'#DCFCE7',color:'#15803D'}}>{preview.toUpdate.length} mise{preview.toUpdate.length!==1?'s':''} à jour</span>
                <span style={{padding:'3px 11px',borderRadius:99,fontSize:12,fontWeight:700,background:'#EFF6FF',color:'#1D4ED8'}}>{preview.toCreate.length} nouveau{preview.toCreate.length!==1?'x':''}</span>
                {preview.errors.length>0 && <span style={{padding:'3px 11px',borderRadius:99,fontSize:12,fontWeight:700,background:'#FEE2E2',color:'#B91C1C'}}>{preview.errors.length} ignoré{preview.errors.length!==1?'s':''}</span>}
              </div>
              <div style={{maxHeight:220,overflowY:'auto',border:'1px solid var(--neutral-200)',borderRadius:8}}>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                  <thead style={{position:'sticky',top:0,background:'var(--neutral-50)'}}>
                    <tr>
                      {['','Animateur','Secteur','Ville','Team Lead'].map(h=>(
                        <th key={h} style={{padding:'6px 10px',textAlign:'left',fontWeight:700,color:'var(--neutral-500)',borderBottom:'1px solid var(--neutral-200)',whiteSpace:'nowrap'}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {[...preview.toUpdate.map(r=>({...r,_t:'update'})),...preview.toCreate.map(r=>({...r,_t:'create'}))].map((r,i)=>(
                      <tr key={i} style={{borderBottom:'1px solid var(--neutral-100)'}}>
                        <td style={{padding:'5px 10px'}}>
                          <span style={{padding:'2px 8px',borderRadius:99,fontSize:11,fontWeight:700,background:r._t==='update'?'#DCFCE7':'#EFF6FF',color:r._t==='update'?'#15803D':'#1D4ED8',whiteSpace:'nowrap'}}>
                            {r._t==='update'?'Màj':'Nouveau'}
                          </span>
                        </td>
                        <td style={{padding:'5px 10px',fontWeight:600,color:'var(--neutral-900)'}}>{r.name}</td>
                        <td style={{padding:'5px 10px',color:'var(--neutral-600)'}}>{r.sector}</td>
                        <td style={{padding:'5px 10px',color:'var(--neutral-600)'}}>{r.ville}</td>
                        <td style={{padding:'5px 10px',color:'var(--neutral-600)'}}>{r.teamLead}</td>
                      </tr>
                    ))}
                    {preview.errors.map((e,i)=>(
                      <tr key={`e${i}`} style={{background:'#FFF5F5',borderBottom:'1px solid var(--neutral-100)'}}>
                        <td style={{padding:'5px 10px'}}><span style={{padding:'2px 8px',borderRadius:99,fontSize:11,fontWeight:700,background:'#FEE2E2',color:'#B91C1C'}}>Ignoré</span></td>
                        <td style={{padding:'5px 10px',fontWeight:600,color:'#B91C1C'}}>{e.name||'—'}</td>
                        <td colSpan={3} style={{padding:'5px 10px',color:'#B91C1C',fontSize:11}}>{e.reason}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
        <div className="modal-ft">
          <button className="btn btn-ghost" onClick={onClose}>Annuler</button>
          {total > 0 && (
            <button className="btn btn-primary" onClick={handleImport} disabled={importing}>
              <i data-lucide="upload" style={{width:15,height:15}}></i>
              {importing ? 'Import en cours…' : `Importer ${total} animateur${total!==1?'s':''}`}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── ANIMATEURS VIEW ── */
function AnimateursView({ animateurs, accounts, pointages = [] }) {
  const [search,      setSearch]      = useState('');
  const [filterVille, setFilterVille] = useState('Toutes');
  const [filterTL,    setFilterTL]    = useState('Tous');
  const [editTarget,  setEditTarget]  = useState(null);
  const [showAdd,     setShowAdd]     = useState(false);
  const [showImport,  setShowImport]  = useState(false);
  const [toast,       setToast]       = useState('');

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 3000); };

  // Retrouve la date de démission depuis l'historique des pointages (fallback pour anciens animateurs)
  const demissionDateMap = useMemo(() => {
    const map = {};
    pointages.forEach(p => {
      if (p.status !== 'demission' || !p.animateurId) return;
      const iso = p.ts ? p.ts.split('T')[0] : (p.date ? dateToISO(p.date) : null);
      if (!iso) return;
      if (!map[p.animateurId] || iso > map[p.animateurId]) map[p.animateurId] = iso;
    });
    return map;
  }, [pointages]);

  const teamLeadsForVille = useMemo(() => {
    const src = filterVille === 'Toutes' ? animateurs : animateurs.filter(a => a.ville === filterVille);
    return [...new Set(src.map(a => a.teamLead))].sort();
  }, [animateurs, filterVille]);

  const activeAnims = useMemo(() => animateurs.filter(a => a.actif !== false), [animateurs]);
  const inactiveAnims = useMemo(() => animateurs.filter(a => a.actif === false), [animateurs]);

  const filtered = useMemo(() => {
    const q = search.toLowerCase();
    return activeAnims.filter(a => {
      const matchQ = !q || a.name.toLowerCase().includes(q) || a.sector.toLowerCase().includes(q);
      const matchV = filterVille === 'Toutes' || a.ville === filterVille;
      const matchT = filterTL === 'Tous' || a.teamLead === filterTL;
      return matchQ && matchV && matchT;
    });
  }, [activeAnims, search, filterVille, filterTL]);

  const filteredInactiveAnims = useMemo(() =>
    inactiveAnims.filter(a => {
      const matchV = filterVille === 'Toutes' || a.ville === filterVille;
      const matchT = filterTL === 'Tous' || a.teamLead === filterTL;
      return matchV && matchT;
    }),
  [inactiveAnims, filterVille, filterTL]);

  const handleDeactivate = async (anim) => {
    if (!window.confirm(`Désactiver ${anim.name} ? Il sera masqué des listes actives.`)) return;
    const today = new Date().toISOString().split('T')[0];
    await LS.deactivateAnimateur(anim.id, today);
    showToast(`${anim.name} désactivé`);
  };

  const handleReactivate = async (anim) => {
    await LS.reactivateAnimateur(anim.id);
    showToast(`${anim.name} réactivé`);
  };

  const handleDelete = async (anim) => {
    if (!window.confirm(`Supprimer définitivement ${anim.name} ? Cette action est irréversible.`)) return;
    await LS.deleteAnimateur(anim.id);
    showToast(`${anim.name} supprimé définitivement`);
  };

  const villeCount = [...new Set(animateurs.map(a => a.ville))].length;

  return (
    <>
      {editTarget && (
        <EditAnimateurMgrModal
          animateur={editTarget} animateurs={animateurs} accounts={accounts}
          onClose={() => setEditTarget(null)}
          onSaved={() => showToast(`${editTarget.name} mis à jour`)} />
      )}
      {showAdd && (
        <AddAnimateurMgrModal
          animateurs={animateurs} accounts={accounts}
          onClose={() => setShowAdd(false)}
          onCreated={() => showToast('Animateur ajouté avec succès')} />
      )}
      {showImport && (
        <ImportAnimateursModal
          animateurs={animateurs} accounts={accounts} demissionDateMap={demissionDateMap}
          onClose={() => setShowImport(false)}
          onImported={(upd, cre) => showToast(`Import réussi : ${upd} mis à jour · ${cre} créé${cre!==1?'s':''}`)} />
      )}
      {toast && (
        <div style={{position:'fixed',bottom:24,right:24,background:'#1E293B',color:'white',padding:'10px 18px',borderRadius:10,fontSize:13,fontWeight:600,zIndex:200,boxShadow:'0 8px 24px rgba(0,0,0,0.2)'}}>
          {toast}
        </div>
      )}

      <div className="section-hd">
        <div>
          <div className="section-title">Gestion des animateurs</div>
          <div className="section-sub">{activeAnims.length} actifs · {inactiveAnims.length} désactivé{inactiveAnims.length!==1?'s':''} · {villeCount} ville{villeCount!==1?'s':''}</div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <button className="btn btn-ghost" onClick={() => setShowImport(true)}>
            <i data-lucide="file-spreadsheet" style={{width:15,height:15}}></i>Import Excel
          </button>
          <button className="btn btn-primary" onClick={() => setShowAdd(true)}>
            <i data-lucide="user-plus" style={{width:15,height:15}}></i>Ajouter
          </button>
        </div>
      </div>

      <div className="table-card">
        <div className="table-toolbar">
          <div className="table-search">
            <i data-lucide="search" className="table-search-icon" style={{width:15,height:15}}></i>
            <input placeholder="Nom, secteur..." value={search} onChange={e => setSearch(e.target.value)} />
          </div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <select style={{height:36,padding:'0 10px',border:'1.5px solid var(--neutral-200)',borderRadius:8,fontSize:13,background:'white',fontFamily:'var(--font-sans)',cursor:'pointer'}}
              value={filterVille} onChange={e => { setFilterVille(e.target.value); setFilterTL('Tous'); }}>
              <option value="Toutes">Toutes les villes</option>
              {[...new Set(animateurs.map(a=>a.ville))].sort().map(v => (
                <option key={v} value={v}>{v} ({animateurs.filter(a=>a.ville===v).length})</option>
              ))}
            </select>
            <select style={{height:36,padding:'0 10px',border:'1.5px solid var(--neutral-200)',borderRadius:8,fontSize:13,background:'white',fontFamily:'var(--font-sans)',cursor:'pointer'}}
              value={filterTL} onChange={e => setFilterTL(e.target.value)}>
              <option value="Tous">Tous les Team Leads</option>
              {teamLeadsForVille.map(tl => <option key={tl} value={tl}>{tl}</option>)}
            </select>
          </div>
        </div>

        {filtered.length === 0 ? (
          <div className="empty">
            <i data-lucide="users" style={{width:48,height:48,opacity:0.25}}></i>
            <div className="empty-text">Aucun animateur trouvé</div>
          </div>
        ) : (
          <div className="tbl-scroll"><table className="tbl">
            <thead>
              <tr>
                <th>#</th><th>Animateur</th><th>Secteur</th><th>Ville</th><th>Team Lead</th><th>Moto</th><th>Type de contrat</th><th>Date intégration</th><th>Actions</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(anim => {
                const color = CITY_COLORS[anim.ville] || '#64748B';
                return (
                  <tr key={anim.id}>
                    <td><span className="mono">{anim.id}</span></td>
                    <td>
                      <div style={{display:'flex',alignItems:'center',gap:8}}>
                        <div className="av" style={{background:avatarColor(anim.name),width:28,height:28,fontSize:11}}>
                          {initials(anim.name)}
                        </div>
                        <span style={{fontWeight:600,color:'var(--neutral-900)'}}>{anim.name}</span>
                      </div>
                    </td>
                    <td style={{fontSize:12,color:'var(--neutral-600)',maxWidth:180}}>{anim.sector}</td>
                    <td>
                      <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'2px 8px',borderRadius:99,fontSize:11,fontWeight:700,background:color+'20',color}}>
                        {anim.ville}
                      </span>
                    </td>
                    <td style={{fontSize:12,color:'var(--neutral-700)',fontWeight:500}}>{anim.teamLead}</td>
                    <td>
                      {anim.moto
                        ? <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'2px 8px',borderRadius:99,fontSize:11,fontWeight:700,background:'#DCFCE7',color:'#16A34A'}}>🏍 Oui</span>
                        : <span style={{fontSize:11,color:'var(--neutral-400)',fontWeight:500}}>Non</span>
                      }
                    </td>
                    <td>
                      {anim.contractOp
                        ? <span style={{display:'inline-flex',padding:'2px 8px',borderRadius:99,fontSize:11,fontWeight:700,background:'#EDE9FE',color:'#6D28D9'}}>{anim.contractOp}</span>
                        : <span style={{fontSize:11,color:'var(--neutral-300)'}}>—</span>
                      }
                    </td>
                    <td style={{fontSize:12,color:'var(--neutral-600)',whiteSpace:'nowrap'}}>
                      {anim.dateIntegration ? anim.dateIntegration.split('-').reverse().join('/') : <span style={{color:'var(--neutral-300)'}}>—</span>}
                    </td>
                    <td>
                      <div style={{display:'flex',gap:6}}>
                        <button className="btn btn-ghost btn-sm" onClick={() => setEditTarget(anim)} title="Modifier">
                          <i data-lucide="pencil" style={{width:13,height:13}}></i>
                        </button>
                        <button className="btn btn-sm" onClick={() => handleDeactivate(anim)} title="Désactiver" style={{background:'#FFF7ED',color:'#C2410C',border:'1.5px solid #FED7AA'}}>
                          <i data-lucide="user-x" style={{width:13,height:13}}></i>
                        </button>
                        <button className="btn btn-sm" onClick={() => handleDelete(anim)} title="Supprimer définitivement" style={{background:'#FEE2E2',color:'#991B1B',border:'1.5px solid #FECACA'}}>
                          <i data-lucide="trash-2" style={{width:13,height:13}}></i>
                        </button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table></div>
        )}
      </div>

      {/* ── DÉSACTIVÉS / DÉMISSIONS ── */}
      {inactiveAnims.length > 0 && (
        <>
          <div className="section-hd" style={{marginTop:28}}>
            <div>
              <div className="section-title" style={{color:'#7C3AED'}}>Animateurs désactivés</div>
              <div className="section-sub">
                {filteredInactiveAnims.length}/{inactiveAnims.length} animateur{inactiveAnims.length!==1?'s':''} masqué{inactiveAnims.length!==1?'s':''} des listes actives
              </div>
            </div>
          </div>
          <div className="table-card">
            {filteredInactiveAnims.length === 0 ? (
              <div className="empty">
                <i data-lucide="user-x" style={{width:40,height:40,opacity:0.2}}></i>
                <div className="empty-text">Aucun animateur désactivé pour ce filtre</div>
              </div>
            ) : (
              <div className="tbl-scroll"><table className="tbl">
                <thead>
                  <tr>
                    <th>#</th><th>Animateur</th><th>Secteur</th><th>Ville</th><th>Team Lead</th><th>Date démission</th><th>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  {filteredInactiveAnims.map(anim => {
                    const color = CITY_COLORS[anim.ville] || '#64748B';
                    const rawDate = anim.dateDemission || demissionDateMap[anim.id] || null;
                    const dateDepart = rawDate ? rawDate.split('-').reverse().join('/') : null;
                    return (
                      <tr key={anim.id} style={{opacity:0.7}}>
                        <td><span className="mono">{anim.id}</span></td>
                        <td>
                          <div style={{display:'flex',alignItems:'center',gap:8}}>
                            <div className="av" style={{background:'#94A3B8',width:28,height:28,fontSize:11}}>{initials(anim.name)}</div>
                            <div>
                              <span style={{fontWeight:600,color:'var(--neutral-600)'}}>{anim.name}</span>
                              <span style={{marginLeft:8,fontSize:10,padding:'1px 7px',borderRadius:99,background:'#F3E8FF',color:'#7C3AED',fontWeight:700}}>Désactivé</span>
                            </div>
                          </div>
                        </td>
                        <td style={{fontSize:12,color:'var(--neutral-500)'}}>{anim.sector}</td>
                        <td>
                          <span style={{display:'inline-flex',padding:'2px 8px',borderRadius:99,fontSize:11,fontWeight:700,background:color+'20',color}}>
                            {anim.ville}
                          </span>
                        </td>
                        <td style={{fontSize:12,color:'var(--neutral-600)'}}>{anim.teamLead}</td>
                        <td style={{fontSize:12,whiteSpace:'nowrap'}}>
                          {dateDepart
                            ? <span style={{background:'#FEE2E2',color:'#B91C1C',padding:'2px 8px',borderRadius:99,fontSize:11,fontWeight:700}}>{dateDepart}</span>
                            : <span style={{color:'var(--neutral-300)'}}>—</span>
                          }
                        </td>
                        <td>
                          <div style={{display:'flex',gap:6}}>
                            <button className="btn btn-ghost btn-sm" onClick={() => handleReactivate(anim)} title="Réactiver" style={{color:'#16A34A',border:'1.5px solid #BBF7D0'}}>
                              <i data-lucide="user-check" style={{width:13,height:13}}></i>
                              Réactiver
                            </button>
                            <button className="btn btn-sm" onClick={() => handleDelete(anim)} title="Supprimer définitivement" style={{background:'#FEE2E2',color:'#991B1B',border:'1.5px solid #FECACA'}}>
                              <i data-lucide="trash-2" style={{width:13,height:13}}></i>
                            </button>
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table></div>
            )}
          </div>
        </>
      )}
    </>
  );
}

/* ── GEO ZONING HELPERS ── */
function gzParseWKT(wkt) {
  try {
    const m = wkt.match(/POLYGON\s*\(\((.*?)\)\)/i);
    if (!m) return null;
    const coords = m[1].split(',').map(pair => {
      const [lon, lat] = pair.trim().split(/\s+/).map(Number);
      return (isNaN(lat) || isNaN(lon)) ? null : [lat, lon];
    }).filter(Boolean);
    return coords.length > 0 ? coords : null;
  } catch { return null; }
}
function gzPointInPoly(point, polygon) {
  const [x, y] = point;
  let inside = false;
  for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
    const [xi, yi] = polygon[i], [xj, yj] = polygon[j];
    if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) inside = !inside;
  }
  return inside;
}
function gzColorByCount(n) {
  if (n === 0)      return '#e5e7eb';
  if (n <= 500)     return '#86efac';
  if (n <= 2000)    return '#fde047';
  if (n <= 5000)    return '#fdba74';
  if (n <= 10000)   return '#fb923c';
  return '#f87171';
}

/* ── GEO ZONING VIEW ── */
function GeoZoningView() {
  const mapDivRef   = useRef(null);
  const leafRef     = useRef(null);
  const markersRef  = useRef({});
  const chartRef    = useRef(null);
  const canvasRef   = useRef(null);
  const clientsRef  = useRef(null);
  const origRef     = useRef(null);
  const polygonsRef = useRef(null);
  const resultsRef  = useRef([]);
  const zCountsRef  = useRef({});

  const [clientsStatus,  setClientsStatus]  = useState('');
  const [polygonsStatus, setPolygonsStatus] = useState('');
  const [loading,        setLoading]        = useState(false);
  const [loadingText,    setLoadingText]    = useState('');
  const [progress,       setProgress]       = useState(0);
  const [showProgress,   setShowProgress]   = useState(false);
  const [msg,            setMsg]            = useState(null);
  const [stats,          setStats]          = useState(null);
  const [zoneItems,      setZoneItems]      = useState([]);
  const [showCards,      setShowCards]      = useState(false);
  const [showChart,      setShowChart]      = useState(false);
  const [showLegend,     setShowLegend]     = useState(false);
  const [canAnalyze,     setCanAnalyze]     = useState(false);
  const [fZone,          setFZone]          = useState('all');
  const [fStatuts,       setFStatuts]       = useState([]);
  const [fGroups,        setFGroups]        = useState([]);
  const [statutOpts,     setStatutOpts]     = useState([]);
  const [groupOpts,      setGroupOpts]      = useState([]);
  const [secteurItems,   setSecteurItems]   = useState([]);
  const [secteurOpen,    setSecteurOpen]    = useState(false);
  const [secteurSearch,  setSecteurSearch]  = useState('');
  const [zoneSearch,     setZoneSearch]     = useState('');
  const [searchCol,      setSearchCol]      = useState('coords');
  const [searchVal,      setSearchVal]      = useState('');
  const [searchResult,   setSearchResult]   = useState(null);
  const [searchCols,     setSearchCols]     = useState([]);

  useEffect(() => {
    if (!mapDivRef.current || leafRef.current) return;
    const map = L.map(mapDivRef.current).setView([33.5731, -7.6176], 6);
    const carto = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution:'© CartoDB © OpenStreetMap', maxZoom:19, subdomains:'abcd' });
    const osm   = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution:'© OpenStreetMap', maxZoom:19 });
    carto.addTo(map);
    L.control.layers({ 'CartoDB Voyager':carto, 'OpenStreetMap':osm }, null, { position:'topright' }).addTo(map);
    leafRef.current = map;
    return () => { if (leafRef.current) { leafRef.current.remove(); leafRef.current = null; } };
  }, []);

  useEffect(() => {
    if (!showChart || !canvasRef.current) return;
    if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
    const entries = Object.entries(zCountsRef.current).sort((a,b) => b[1]-a[1]);
    const colors  = entries.map(([z]) => z === 'Hors Zone' ? '#ef4444' : '#667eea');
    chartRef.current = new Chart(canvasRef.current, {
      type: 'bar',
      data: { labels: entries.map(([z]) => z), datasets: [{ label:'Nb clients', data: entries.map(([,c]) => c), backgroundColor:colors, borderColor:colors, borderWidth:2, borderRadius:8 }] },
      options: { indexAxis:'y', responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false } }, scales:{ x:{ beginAtZero:true, title:{ display:true, text:'Nombre de clients' } }, y:{ title:{ display:true, text:'Zones' } } } }
    });
  }, [showChart]);

  const showMsg = (type, text) => setMsg({ type, text });
  const checkReady = (c, p) => setCanAnalyze(!!(c && p && c.length > 0 && p.length > 0));

  const handleClientFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    showMsg('info', 'Chargement des clients...');
    setClientsStatus('Chargement...');
    const isExcel = /\.(xlsx|xls)$/i.test(file.name);
    if (isExcel) {
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = new Uint8Array(ev.target.result);
          const wb = XLSX.read(data, { type:'array' });
          const ws = wb.Sheets[wb.SheetNames[0]];
          let rows = XLSX.utils.sheet_to_json(ws, { defval:'' });
          if (rows.length > 0) {
            const k = Object.keys(rows[0]);
            if (k.some(x => x.startsWith('__EMPTY') || x.includes('Filtres'))) rows = XLSX.utils.sheet_to_json(ws, { range:1, defval:'' });
          }
          processClients(rows, Object.keys(rows[0] || {}));
        } catch (err) { showMsg('error', 'Erreur Excel: ' + err.message); setClientsStatus(''); }
      };
      reader.readAsArrayBuffer(file);
    } else {
      Papa.parse(file, {
        header:true, skipEmptyLines:true,
        complete: (r) => processClients(r.data, r.meta.fields),
        error:    (err) => { showMsg('error', 'Erreur CSV: ' + err.message); setClientsStatus(''); }
      });
    }
  };

  const processClients = (data, headers) => {
    const latP = ['custom.fields.latitude','latitude','Latitude','lat','Lat','LAT'];
    const lonP = ['custom.fields.longitude','longitude','Longitude','lon','Lon','lng','Lng','LON','LNG'];
    let latCol = latP.find(p => headers.includes(p));
    let lonCol = lonP.find(p => headers.includes(p));
    if (!latCol || !lonCol) { showMsg('error', 'Colonnes latitude/longitude non trouvées !'); setClientsStatus(''); return; }
    const clients = data.filter(row => {
      const la = parseFloat(row[latCol]), lo = parseFloat(row[lonCol]);
      return !isNaN(la) && !isNaN(lo) && la >= -90 && la <= 90 && lo >= -180 && lo <= 180;
    }).map(row => ({
      firstName: row.firstName || row.prenom || '',
      lastName:  row.lastName  || row.nom    || '',
      email:     row.email || '',
      city:      row['addresses.city'] || row.city || row.ville || '',
      latitude:  parseFloat(row[latCol]),
      longitude: parseFloat(row[lonCol]),
      statutActivation: row['custom.fields.statutActivationATCPlus'] || '',
      customerGroup:    row['customerGroup.key'] || '',
      originalData:     row,
    }));
    clientsRef.current = clients;
    origRef.current    = JSON.parse(JSON.stringify(clients));
    setClientsStatus(`${clients.length.toLocaleString('fr-FR')} clients valides`);
    showMsg('success', `${clients.length.toLocaleString('fr-FR')} clients chargés`);
    checkReady(clients, polygonsRef.current);
    const statuts = [...new Set(clients.map(c => c.statutActivation || ''))].sort();
    const groups  = [...new Set(clients.map(c => c.customerGroup   || ''))].sort();
    setStatutOpts(statuts);
    setGroupOpts(groups);
    setFStatuts(statuts.includes('activated') ? ['activated'] : statuts.slice(0,1));
    setFGroups(groups.includes('shop-owners') ? ['shop-owners'] : []);
  };

  const handlePolygonFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    showMsg('info', 'Chargement des polygones...');
    Papa.parse(file, {
      header:true, skipEmptyLines:true,
      complete: (r) => {
        const polys = r.data.filter(row => row.nom || row.name).map(poly => {
          if (poly.WKT) poly.coordinates = gzParseWKT(poly.WKT);
          poly.nom = poly.nom || poly.name || 'Zone sans nom';
          return poly;
        }).filter(p => p.coordinates);
        polygonsRef.current = polys;
        setPolygonsStatus(`${polys.length} zones`);
        showMsg('success', `${polys.length} zones chargées`);
        checkReady(clientsRef.current, polys);
        setSecteurItems(polys.map(p => ({ name: p.nom, checked: true })));
      },
      error: (err) => showMsg('error', 'Erreur: ' + err.message)
    });
  };

  const analyzeData = async () => {
    const clients = clientsRef.current, polygons = polygonsRef.current;
    if (!clients || !polygons) return;
    setLoading(true); setShowProgress(true); setProgress(0); setShowChart(false);
    showMsg('info', 'Analyse en cours...');
    await new Promise(r => setTimeout(r, 80));
    try {
      if (leafRef.current) {
        leafRef.current.eachLayer(l => { if (l instanceof L.Polygon || l instanceof L.CircleMarker) leafRef.current.removeLayer(l); });
      }
      markersRef.current = {};
      setProgress(10);
      const zoneCounts = {}, zoneClients = {};
      polygons.forEach(z => { zoneCounts[z.nom] = 0; zoneClients[z.nom] = []; });
      zoneCounts['Hors Zone'] = 0;
      setProgress(20);
      setLoadingText(`Assignation de ${clients.length.toLocaleString('fr-FR')} clients...`);
      const batchSize = 1000;
      for (let i = 0; i < clients.length; i += batchSize) {
        clients.slice(i, i + batchSize).forEach(c => {
          let found = false;
          for (const z of polygons) {
            if (z.coordinates && gzPointInPoly([c.latitude, c.longitude], z.coordinates)) {
              zoneCounts[z.nom]++; c.zone = z.nom; found = true; break;
            }
          }
          if (!found) { zoneCounts['Hors Zone']++; c.zone = 'Hors Zone'; }
        });
        setProgress(20 + Math.min((i + batchSize) / clients.length, 1) * 35);
        await new Promise(r => setTimeout(r, 0));
      }
      setProgress(55);
      setLoadingText('Dessin des polygones...');
      polygons.forEach(z => {
        if (!z.coordinates || !leafRef.current) return;
        L.polygon(z.coordinates, { color:'#333', weight:2, fillColor:gzColorByCount(zoneCounts[z.nom]), fillOpacity:0.4 })
          .bindPopup(`<b>${z.nom}</b><br>${(zoneCounts[z.nom]||0).toLocaleString('fr-FR')} clients`)
          .addTo(leafRef.current);
      });
      setProgress(65);
      setLoadingText('Ajout des points clients...');
      const step = Math.max(1, Math.floor(clients.length / 30000));
      let added = 0;
      for (let i = 0; i < clients.length; i += step) {
        const c = clients[i];
        if (!leafRef.current) break;
        const m = L.circleMarker([c.latitude, c.longitude], { radius:5, fillColor:c.zone==='Hors Zone'?'#ef4444':'#10b981', color:'#fff', weight:1.5, opacity:1, fillOpacity:0.8 });
        const nm = `${c.firstName} ${c.lastName}`.trim() || 'Client';
        m.bindPopup(`<b>${nm}</b><br>Zone: <b style="color:${c.zone==='Hors Zone'?'#ef4444':'#10b981'}">${c.zone}</b>${c.city?'<br>📍'+c.city:''}`);
        m.addTo(leafRef.current);
        markersRef.current[`${c.latitude.toFixed(6)}_${c.longitude.toFixed(6)}`] = m;
        added++;
      }
      setProgress(85);
      if (clients.length > 0 && leafRef.current) {
        const pts = clients.filter((_,i) => i % Math.max(1,Math.floor(clients.length/100))===0).map(c => [c.latitude,c.longitude]);
        if (pts.length > 1) leafRef.current.fitBounds(L.latLngBounds(pts), { padding:[50,50] });
      }
      const assigned = clients.length - zoneCounts['Hors Zone'];
      setStats({ total:clients.length, zones:polygons.length, assigned, horsZone:zoneCounts['Hors Zone'] });
      setZoneItems(Object.entries(zoneCounts).sort((a,b)=>b[1]-a[1]).map(([name,count])=>({name,count})));
      if (origRef.current?.length > 0) setSearchCols(Object.keys(origRef.current[0].originalData||{}));
      resultsRef.current = clients;
      zCountsRef.current = zoneCounts;
      setProgress(100);
      setLoading(false); setShowProgress(false);
      setShowCards(true); setShowLegend(true);
      setShowChart(true);
      showMsg('success', `✓ Analyse terminée ! ${added.toLocaleString('fr-FR')} points affichés`);
    } catch (err) {
      setLoading(false); setShowProgress(false);
      showMsg('error', 'Erreur: ' + err.message);
    }
  };

  const applyFilters = () => {
    const orig = origRef.current, polys = polygonsRef.current;
    if (!orig || !polys) { showMsg('error', "Chargez d'abord les fichiers"); return; }
    const checked = secteurItems.filter(s => s.checked).map(s => s.name);
    const filtered = orig.filter(c => {
      let zOk = true;
      if (c.zone) { if (fZone==='in') zOk = c.zone!=='Hors Zone'; else if (fZone==='out') zOk = c.zone==='Hors Zone'; }
      const sOk = checked.length===0 || !c.zone || checked.includes(c.zone);
      const stOk = fStatuts.length===0 || fStatuts.includes(c.statutActivation||'');
      const gOk  = fGroups.length===0  || fGroups.includes(c.customerGroup||'');
      return zOk && sOk && stOk && gOk;
    });
    if (!filtered.length) { showMsg('error', 'Aucun client ne correspond aux filtres'); return; }
    clientsRef.current = filtered;
    showMsg('success', `${filtered.length.toLocaleString('fr-FR')} clients filtrés sur ${orig.length.toLocaleString('fr-FR')}`);
    analyzeData();
  };

  const downloadCSV = () => {
    const data = resultsRef.current;
    if (!data.length) return;
    const rows = data.map(c => ({ ...c.originalData, Latitude:c.latitude, Longitude:c.longitude, ZONE:c.zone||'Hors Zone' }));
    const csv = Papa.unparse(rows, { delimiter:',', header:true });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob(['﻿'+csv], { type:'text/csv;charset=utf-8;' }));
    a.download = `clients_zones_${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
    showMsg('success', '✓ CSV téléchargé');
  };

  const downloadExcelGZ = () => {
    const data = resultsRef.current;
    if (!data.length) return;
    const rows = data.map(c => ({ ...c.originalData, Latitude:c.latitude, Longitude:c.longitude, ZONE:c.zone||'Hors Zone' }));
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Clients avec Zones');
    XLSX.writeFile(wb, `clients_zones_${new Date().toISOString().split('T')[0]}.xlsx`);
    showMsg('success', '✓ Excel téléchargé');
  };

  const searchClient = () => {
    const results = resultsRef.current;
    if (!results.length || !searchVal.trim()) { setSearchResult(null); return; }
    let found = null;
    if (searchCol === 'coords') {
      const parts = searchVal.split(';');
      if (parts.length === 2) {
        const sLa = parseFloat(parts[0].trim()), sLo = parseFloat(parts[1].trim());
        if (!isNaN(sLa) && !isNaN(sLo)) {
          let minD = Infinity;
          results.forEach(c => { const d = Math.sqrt((c.latitude-sLa)**2+(c.longitude-sLo)**2); if (d < minD && d < 0.01) { minD = d; found = c; } });
        }
      }
    } else {
      found = results.find(c => { const v = c.originalData?.[searchCol]; return v && v.toString().toLowerCase().includes(searchVal.toLowerCase()); });
    }
    setSearchResult(found ? { ok:true, client:found } : { ok:false });
    if (found) {
      const key = `${found.latitude.toFixed(6)}_${found.longitude.toFixed(6)}`;
      const m = markersRef.current[key];
      if (m && leafRef.current) {
        m.setStyle({ fillColor:'#000', radius:10, weight:2 });
        leafRef.current.setView([found.latitude, found.longitude], 17);
        setTimeout(() => m.openPopup(), 300);
      }
    }
  };

  const filteredZones    = zoneSearch    ? zoneItems.filter(z => z.name.toLowerCase().includes(zoneSearch.toLowerCase()))    : zoneItems;
  const filteredSecteurs = secteurSearch ? secteurItems.filter(s => s.name.toLowerCase().includes(secteurSearch.toLowerCase())) : secteurItems;

  const GZ_BTN = { border:'none', borderRadius:10, color:'white', fontWeight:600, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:8 };
  const GZ_CARD = { background:'white', padding:24, borderRadius:16, boxShadow:'0 4px 20px rgba(0,0,0,0.08)', border:'1px solid rgba(0,0,0,0.05)' };
  const GZ_INPUT = { width:'100%', padding:'8px 10px', border:'2px solid #e5e7eb', borderRadius:8, fontSize:'0.9rem', fontFamily:'inherit' };

  return (
    <div style={{fontFamily:'Segoe UI,Tahoma,Geneva,Verdana,sans-serif', color:'#333'}}>
      {msg && (
        <div style={{padding:'12px 16px', borderRadius:8, marginBottom:16, fontSize:13, fontWeight:600,
          background:msg.type==='error'?'#fee2e2':msg.type==='success'?'#d1fae5':'#dbeafe',
          color:msg.type==='error'?'#991b1b':msg.type==='success'?'#065f46':'#1e40af',
          borderLeft:`4px solid ${msg.type==='error'?'#ef4444':msg.type==='success'?'#10b981':'#3b82f6'}`}}>
          {msg.text}
        </div>
      )}

      <div style={{display:'grid', gridTemplateColumns:'360px 1fr', gap:20, alignItems:'start'}}>

        {/* ── Left column ── */}
        <div style={{display:'flex', flexDirection:'column', gap:16}}>

          {/* Upload */}
          <div style={GZ_CARD}>
            <h3 style={{marginBottom:14, fontSize:'1rem', display:'flex', alignItems:'center', gap:8}}>
              <i className="fas fa-upload" style={{color:'#667eea'}}></i> Upload des fichiers
            </h3>

            {['client','polygon'].map(type => {
              const isClient = type === 'client';
              const status   = isClient ? clientsStatus : polygonsStatus;
              return (
                <label key={type} style={{display:'block', position:'relative', border:'2px dashed #667eea', borderRadius:10, padding:16, textAlign:'center', cursor:'pointer', marginBottom:12, background:status&&!status.includes('Charg')?'#f0fff4':'white', transition:'all 0.2s'}}>
                  <input type="file" accept={isClient?'.csv,.xlsx,.xls':'.csv'} onChange={isClient?handleClientFile:handlePolygonFile} style={{position:'absolute',inset:0,opacity:0,cursor:'pointer'}} />
                  <div style={{fontSize:'1.8rem',color:'#667eea',marginBottom:6}}><i className={`fas ${isClient?'fa-users':'fa-draw-polygon'}`}></i></div>
                  <div style={{color:'#667eea',fontWeight:600}}>{isClient ? 'Fichier Clients' : 'Fichier Polygones (CSV)'}</div>
                  <div style={{color:'#999',fontSize:'0.82rem',marginTop:4}}>{isClient ? 'CSV ou Excel (.xlsx, .xls)' : 'Format : nom, WKT'}</div>
                  {status && <div style={{color:'#10b981',fontSize:'0.82rem',marginTop:6,fontWeight:600}}>{status}</div>}
                </label>
              );
            })}

            <button onClick={analyzeData} disabled={!canAnalyze}
              style={{...GZ_BTN, width:'100%', padding:'12px', background:canAnalyze?'linear-gradient(135deg,#667eea,#764ba2)':'#e5e7eb', color:canAnalyze?'white':'#999', cursor:canAnalyze?'pointer':'not-allowed', fontSize:'1rem'}}>
              <i className="fas fa-rocket"></i> Analyser
            </button>

            {showProgress && (
              <div style={{marginTop:12, height:8, background:'#f3f4f6', borderRadius:10, overflow:'hidden'}}>
                <div style={{height:'100%', background:'linear-gradient(90deg,#667eea,#764ba2)', width:progress+'%', transition:'width 0.3s'}}></div>
              </div>
            )}
          </div>

          {/* Stats */}
          {showCards && stats && (
            <div style={GZ_CARD}>
              <h3 style={{marginBottom:14, fontSize:'1rem', display:'flex', alignItems:'center', gap:8}}>
                <i className="fas fa-chart-bar" style={{color:'#667eea'}}></i> Statistiques
              </h3>
              <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:14}}>
                {[
                  {val:stats.total.toLocaleString('fr-FR'),    label:'Clients',   bg:'linear-gradient(135deg,#3b82f6,#2563eb)'},
                  {val:stats.zones,                            label:'Zones',     bg:'linear-gradient(135deg,#f59e0b,#d97706)'},
                  {val:stats.assigned.toLocaleString('fr-FR'), label:'Assignés',  bg:'linear-gradient(135deg,#10b981,#059669)'},
                  {val:stats.horsZone.toLocaleString('fr-FR'), label:'Hors Zone', bg:'linear-gradient(135deg,#ef4444,#dc2626)'},
                ].map(s => (
                  <div key={s.label} style={{background:s.bg, color:'white', padding:'16px', borderRadius:12, textAlign:'center'}}>
                    <div style={{fontSize:'1.7rem', fontWeight:'bold', marginBottom:4}}>{s.val}</div>
                    <div style={{fontSize:'0.85rem', opacity:0.95}}>{s.label}</div>
                  </div>
                ))}
              </div>
              <button onClick={downloadCSV} style={{...GZ_BTN, width:'100%', padding:11, background:'linear-gradient(135deg,#3b82f6,#2563eb)', marginBottom:8}}>
                <i className="fas fa-download"></i> Télécharger CSV
              </button>
              <button onClick={downloadExcelGZ} style={{...GZ_BTN, width:'100%', padding:11, background:'linear-gradient(135deg,#10b981,#059669)'}}>
                <i className="fas fa-file-excel"></i> Télécharger Excel
              </button>
            </div>
          )}

          {/* Client search */}
          {showCards && (
            <div style={GZ_CARD}>
              <h3 style={{marginBottom:14, fontSize:'1rem', display:'flex', alignItems:'center', gap:8}}>
                <i className="fas fa-search" style={{color:'#667eea'}}></i> Rechercher un client
              </h3>
              <select value={searchCol} onChange={e => { setSearchCol(e.target.value); setSearchVal(''); setSearchResult(null); }} style={{...GZ_INPUT, marginBottom:10}}>
                <option value="coords">Coordonnées (Lat;Lon)</option>
                {searchCols.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
              <input type="text" value={searchVal} onChange={e => setSearchVal(e.target.value)} onKeyDown={e => e.key==='Enter' && searchClient()}
                placeholder={searchCol==='coords' ? 'Ex: 33.9148;-5.549' : `Rechercher par ${searchCol}...`}
                style={{...GZ_INPUT, marginBottom:10}} />
              <button onClick={searchClient} style={{...GZ_BTN, width:'100%', padding:10, background:'linear-gradient(135deg,#667eea,#764ba2)'}}>
                <i className="fas fa-search"></i> Rechercher

/* ── SCORES EXPORT ── */
function exportScoresXLSX(animateurs, pointages, filterVille, filterTL) {
  const now      = new Date();
  const fileDate = now.toLocaleDateString('fr-FR').replace(/\//g,'-');
  const dateLabel= now.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const scope    = [filterVille!=='Toutes'?filterVille:null, filterTL!=='Tous'?filterTL:null].filter(Boolean).join(' · ') || 'Toutes villes — Tous TL';

  const activeAnims = animateurs.filter(a => a.actif !== false && (filterVille==='Toutes'||a.ville===filterVille) && (filterTL==='Tous'||a.teamLead===filterTL));

  const getCutoff = days => {
    if (days === 0) return '2000-01-01';
    const d = new Date(); d.setDate(d.getDate()-days);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  };

  const PERIODS = [{label:'7 jours',sheet:'Semaine (7j)',days:7},{label:'30 jours',sheet:'Mois (30j)',days:30},{label:'90 jours',sheet:'3 Mois (90j)',days:90}];

  const GRADE_FILL = {
    'Elite':       {font:{bold:true,sz:11,color:{rgb:'14532D'}},fill:{fgColor:{rgb:'DCFCE7'}},alignment:{horizontal:'center'}},
    'Excellent':   {font:{bold:true,sz:11,color:{rgb:'1E3A8A'}},fill:{fgColor:{rgb:'DBEAFE'}},alignment:{horizontal:'center'}},
    'Bien':        {font:{bold:true,sz:11,color:{rgb:'78350F'}},fill:{fgColor:{rgb:'FEF3C7'}},alignment:{horizontal:'center'}},
    'Passable':    {font:{bold:true,sz:11,color:{rgb:'7C2D12'}},fill:{fgColor:{rgb:'FFEDD5'}},alignment:{horizontal:'center'}},
    'Insuffisant': {font:{bold:true,sz:11,color:{rgb:'7F1D1D'}},fill:{fgColor:{rgb:'FEE2E2'}},alignment:{horizontal:'center'}},
    'N/A':         {font:{sz:11,color:{rgb:'94A3B8'}},          fill:{fgColor:{rgb:'F1F5F9'}},alignment:{horizontal:'center'}},
  };
  const hStyle  = {font:{bold:true,color:{rgb:'FFFFFF'},sz:11},fill:{fgColor:{rgb:'0052CC'}},alignment:{horizontal:'center',vertical:'center'}};
  const tStyle  = {font:{bold:true,color:{rgb:'FFFFFF'},sz:12},fill:{fgColor:{rgb:'003380'}},alignment:{horizontal:'center'}};
  const avgStyle = {font:{bold:true,sz:11,color:{rgb:'1E3A8A'}},fill:{fgColor:{rgb:'EFF6FF'}},alignment:{horizontal:'center'}};
  const ctr     = {alignment:{horizontal:'center'}};

  const wb = XLSX.utils.book_new();
  const COLS = ['Rang','Animateur','Ville','Secteur','Team Lead','Présents','Absents','Malades','Récupe','Congé','Renfort','Non pointé','Jours évalués','Score /100','Grade'];
  const WIDTHS = [{wch:6},{wch:26},{wch:14},{wch:26},{wch:22},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:12},{wch:14},{wch:12},{wch:14}];

  // ── Sheets per period ──
  PERIODS.forEach(({label, sheet, days}) => {
    const cutoff = getCutoff(days);
    const scores = activeAnims.map(a => computeAnimScore(a, pointages, cutoff)).sort((a,b)=>b.score-a.score||b.total-a.total);
    const withData = scores.filter(a=>a.total>0);
    const avg = withData.length>0 ? Math.round(withData.reduce((s,a)=>s+a.score,0)/withData.length) : 0;

    const titleRow  = [`Scores & Performance — ${label} — ${scope} — ${dateLabel}`,...Array(COLS.length-1).fill('')];
    const blankRow  = Array(COLS.length).fill('');
    const dataRows  = scores.map((a,i) => {
      const g = getGrade(a.score, a.total);
      return [i+1, a.name, a.ville, a.sector, a.teamLead, a.present+a.renfort, a.absent, a.malade, a.recupe||0, a.conge||0, a.renfort||0, a.nonpointe||0, a.total, a.total>0?a.score:'—', g.label];
    });
    const avgRow = ['','SCORE MOYEN','','','','','','','','','','','',avg,''];

    const wsData = [titleRow, blankRow, COLS, ...dataRows, blankRow, avgRow];
    const ws = XLSX.utils.aoa_to_sheet(wsData);
    ws['!cols'] = WIDTHS;
    ws['!merges'] = [{s:{r:0,c:0},e:{r:0,c:COLS.length-1}}];

    // Title row style
    const titleCell = XLSX.utils.encode_cell({r:0,c:0});
    if (ws[titleCell]) ws[titleCell].s = tStyle;

    // Header row style (row index 2)
    COLS.forEach((_,ci) => { const c=XLSX.utils.encode_cell({r:2,c:ci}); if(ws[c]) ws[c].s=hStyle; });

    // Data rows
    dataRows.forEach((row,ri) => {
      const g = getGrade(scores[ri].score, scores[ri].total);
      // Grade cell
      const gc = XLSX.utils.encode_cell({r:ri+3,c:14});
      if (ws[gc]) ws[gc].s = GRADE_FILL[g.label]||{};
      // Score cell
      const sc = XLSX.utils.encode_cell({r:ri+3,c:13});
      if (ws[sc]) ws[sc].s = scores[ri].total>0 ? {font:{bold:true,sz:11,color:{rgb:g.color.replace('#','')}},alignment:{horizontal:'center'}} : {alignment:{horizontal:'center'},font:{color:{rgb:'94A3B8'}}};
      // Rang cell center
      const rc = XLSX.utils.encode_cell({r:ri+3,c:0});
      if (ws[rc]) ws[rc].s = {font:{color:{rgb:'94A3B8'}},alignment:{horizontal:'center'}};
      // Présents green
      const pc = XLSX.utils.encode_cell({r:ri+3,c:5});
      if (ws[pc]) ws[pc].s = {font:{bold:true,color:{rgb:'15803D'}},alignment:{horizontal:'center'}};
      // Absents red
      const ac = XLSX.utils.encode_cell({r:ri+3,c:6});
      if (ws[ac]) ws[ac].s = {font:{color:{rgb:'DC2626'}},alignment:{horizontal:'center'}};
      // Other stat cols center
      [7,8,9,10,11,12].forEach(ci => {
        const cc = XLSX.utils.encode_cell({r:ri+3,c:ci});
        if (ws[cc]) ws[cc].s = ctr;
      });
    });

    // Avg row style
    const avgRowIdx = 3 + dataRows.length + 1;
    COLS.forEach((_,ci) => { const c=XLSX.utils.encode_cell({r:avgRowIdx,c:ci}); if(ws[c]) ws[c].s=avgStyle; });

    XLSX.utils.book_append_sheet(wb, ws, sheet);
  });

  // ── Résumé (comparaison 3 périodes) ──
  const scores7  = activeAnims.map(a=>computeAnimScore(a,pointages,getCutoff(7)));
  const scores30 = activeAnims.map(a=>computeAnimScore(a,pointages,getCutoff(30)));
  const scores90 = activeAnims.map(a=>computeAnimScore(a,pointages,getCutoff(0)));

  const resumeTitle = [`Résumé Comparatif — ${scope} — ${dateLabel}`,...Array(11).fill('')];
  const resumeHdr   = ['Animateur','Ville','Secteur','Team Lead','Score 7j','Grade 7j','Score 30j','Grade 30j','Score 90j','Grade 90j','Évolution (7j vs 30j)','Jours total (30j)'];
  const resumeRows  = activeAnims.map((a,i) => {
    const s7  = scores7.find(x=>x.id===a.id)  || {score:0,total:0};
    const s30 = scores30.find(x=>x.id===a.id) || {score:0,total:0};
    const s90 = scores90.find(x=>x.id===a.id) || {score:0,total:0};
    const evol = s7.total>0&&s30.total>0 ? (s7.score-s30.score>0?`+${s7.score-s30.score}`:String(s7.score-s30.score)) : '—';
    return [a.name,a.ville,a.sector,a.teamLead,s7.total>0?s7.score:'—',getGrade(s7.score,s7.total).label,s30.total>0?s30.score:'—',getGrade(s30.score,s30.total).label,s90.total>0?s90.score:'—',getGrade(s90.score,s90.total).label,evol,s30.total];
  }).sort((a,b)=>(typeof b[6]==='number'?b[6]:0)-(typeof a[6]==='number'?a[6]:0));

  const wsR = XLSX.utils.aoa_to_sheet([resumeTitle,[],resumeHdr,...resumeRows]);
  wsR['!cols']   = [{wch:26},{wch:14},{wch:26},{wch:22},{wch:10},{wch:13},{wch:10},{wch:13},{wch:10},{wch:13},{wch:20},{wch:14}];
  wsR['!merges'] = [{s:{r:0,c:0},e:{r:0,c:11}}];
  const rTitle = XLSX.utils.encode_cell({r:0,c:0});
  if (wsR[rTitle]) wsR[rTitle].s = tStyle;
  resumeHdr.forEach((_,ci) => { const c=XLSX.utils.encode_cell({r:2,c:ci}); if(wsR[c]) wsR[c].s=hStyle; });
  resumeRows.forEach((row,ri) => {
    [4,6,8].forEach((ci,pi) => {
      const periods=[scores7,scores30,scores90];
      const anim = activeAnims.find(a=>a.name===row[0]);
      if (!anim) return;
      const s = periods[pi].find(x=>x.id===anim.id)||{score:0,total:0};
      const g = getGrade(s.score,s.total);
      const sc = XLSX.utils.encode_cell({r:ri+3,c:ci});
      if (wsR[sc]) wsR[sc].s={font:{bold:true,color:{rgb:g.color.replace('#','')}},alignment:{horizontal:'center'}};
      const gc = XLSX.utils.encode_cell({r:ri+3,c:ci+1});
      if (wsR[gc]) wsR[gc].s=GRADE_FILL[g.label]||{};
    });
    // Évolution coloring
    const evolVal = row[10];
    const ec = XLSX.utils.encode_cell({r:ri+3,c:10});
    if (wsR[ec] && typeof evolVal==='string' && evolVal!=='—') {
      wsR[ec].s = {font:{bold:true,color:{rgb:evolVal.startsWith('+')?'15803D':'DC2626'}},alignment:{horizontal:'center'}};
    }
  });
  XLSX.utils.book_append_sheet(wb, wsR, 'Résumé Comparatif');

  XLSX.writeFile(wb, `scores_performance_${fileDate}.xlsx`);
}

/* ── WATCH LIST VIEW ── */
function getAlerts(a) {
  if (a.total === 0) return [{ label:'Aucun pointage', color:'#64748B', bg:'#F1F5F9' }];
  const alerts = [];
  if (a.score < 40) alerts.push({ label:'Score critique', color:'#B91C1C', bg:'#FEE2E2' });
  else if (a.score < 60) alerts.push({ label:'Score faible', color:'#C2410C', bg:'#FFEDD5' });
  const totPtr = a.present + a.absent + a.malade + (a.recupe||0) + (a.conge||0) + (a.renfort||0);
  if (totPtr > 0 && a.absent / totPtr > 0.4) alerts.push({ label:'Absences élevées', color:'#7C3AED', bg:'#F3E8FF' });
  if ((a.nonpointe||0) > 2) alerts.push({ label:'Non pointé fréquent', color:'#475569', bg:'#F1F5F9' });
  return alerts;
}

function exportWatchListXLSX(rows, periodLabel, scope) {

  const headers = ['Rang','Animateur','Ville','Secteur','Team Lead','Présents','Absents','Malades','Récupe','Congé','Non pointé','Jours évalués','Score /100','Grade','Alertes'];
  const data = [
    [`Animateurs à surveiller — ${periodLabel} — ${scope} — ${new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}`, ...Array(headers.length-1).fill('')],
    Array(headers.length).fill(''),
    headers,
    ...rows.map((a,i) => {
      const g = getGrade(a.score, a.total);
      const alerts = getAlerts(a).map(al=>al.label).join(', ');
      return [i+1,a.name,a.ville,a.sector,a.teamLead,a.present+(a.renfort||0),a.absent,a.malade,a.recupe||0,a.conge||0,a.nonpointe||0,a.total,a.total>0?a.score:'—',g.label,alerts];
    }),
  ];
  const ws = XLSX.utils.aoa_to_sheet(data);
  ws['!cols'] = [{wch:5},{wch:26},{wch:14},{wch:26},{wch:22},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:12},{wch:14},{wch:12},{wch:14},{wch:30}];
  ws['!merges'] = [{s:{r:0,c:0},e:{r:0,c:headers.length-1}}];
  const tc = XLSX.utils.encode_cell({r:0,c:0});
  if(ws[tc]) ws[tc].s={font:{bold:true,color:{rgb:'FFFFFF'},sz:12},fill:{fgColor:{rgb:'991B1B'}},alignment:{horizontal:'center'}};
  headers.forEach((_,ci)=>{ const c=XLSX.utils.encode_cell({r:2,c:ci}); if(ws[c]) ws[c].s=hStyle; });
  const GRADE_FILL={'Elite':{font:{bold:true,color:{rgb:'14532D'}},fill:{fgColor:{rgb:'DCFCE7'}},alignment:{horizontal:'center'}},'Excellent':{font:{bold:true,color:{rgb:'1E3A8A'}},fill:{fgColor:{rgb:'DBEAFE'}},alignment:{horizontal:'center'}},'Bien':{font:{bold:true,color:{rgb:'78350F'}},fill:{fgColor:{rgb:'FEF3C7'}},alignment:{horizontal:'center'}},'Passable':{font:{bold:true,color:{rgb:'7C2D12'}},fill:{fgColor:{rgb:'FFEDD5'}},alignment:{horizontal:'center'}},'Insuffisant':{font:{bold:true,color:{rgb:'7F1D1D'}},fill:{fgColor:{rgb:'FEE2E2'}},alignment:{horizontal:'center'}},'N/A':{font:{color:{rgb:'94A3B8'}},fill:{fgColor:{rgb:'F1F5F9'}},alignment:{horizontal:'center'}}};
  rows.forEach((_,ri)=>{ const gc=XLSX.utils.encode_cell({r:ri+3,c:13}); const g=getGrade(rows[ri].score,rows[ri].total); if(ws[gc]) ws[gc].s=GRADE_FILL[g.label]||{}; });
  const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'Surveiller'); XLSX.writeFile(wb,`watch_list_${fileDate}.xlsx`);
}

function WatchListView({ pointages, animateurs }) {
  const [period,      setPeriod]      = useState(30);
  const [threshold,   setThreshold]   = useState(60);
  const [filterVille, setFilterVille] = useState('Toutes');
  const [filterTL,    setFilterTL]    = useState('Tous');
  const [sortBy,      setSortBy]      = useState('score');

  const cutoff = useMemo(() => {
    const d = new Date(); d.setDate(d.getDate()-period);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }, [period]);

  const teamLeadsForVille = useMemo(() => {
    const src = filterVille==='Toutes' ? animateurs : animateurs.filter(a=>a.ville===filterVille);
    return [...new Set(src.filter(a=>a.actif!==false).map(a=>a.teamLead))].sort();
  }, [animateurs, filterVille]);

/* ── SECTOR SCORES VIEW ── */
function computeGroupScore(anims, pointages, cutoff) {
  const scores = anims.map(a => computeAnimScore(a, pointages, cutoff));
  const withData = scores.filter(s => s.total > 0);
  const avgScore = withData.length > 0 ? Math.round(withData.reduce((s,a) => s+a.score, 0) / withData.length) : 0;
  const totPresent = scores.reduce((s,a)=>s+(a.present||0)+(a.renfort||0),0);
  const totAbsent  = scores.reduce((s,a)=>s+(a.absent||0),0);
  const totMalade  = scores.reduce((s,a)=>s+(a.malade||0),0);
  const totJours   = scores.reduce((s,a)=>s+a.total,0);
  const atRisk     = withData.filter(s=>s.score<60).length;
  const tauxPres   = totJours>0 ? Math.round(totPresent/totJours*100) : 0;
  return { total:anims.length, withData:withData.length, avgScore, totPresent, totAbsent, totMalade, totJours, atRisk, tauxPres };
}

function exportSectorScoresXLSX(villeRows, secteurRows, periodLabel) {
  const fileDate = new Date().toLocaleDateString('fr-FR').replace(/\//g,'-');
  const hStyle = {font:{bold:true,color:{rgb:'FFFFFF'},sz:11},fill:{fgColor:{rgb:'0052CC'}},alignment:{horizontal:'center'}};
  const tStyle = {font:{bold:true,color:{rgb:'FFFFFF'},sz:12},fill:{fgColor:{rgb:'003380'}},alignment:{horizontal:'center'}};
  const wb = XLSX.utils.book_new();

  const makeSheet = (title, headers, rows, widths) => {
    const data = [[title,...Array(headers.length-1).fill('')],Array(headers.length).fill(''),headers,...rows];
    const ws = XLSX.utils.aoa_to_sheet(data);
    ws['!cols'] = widths;
    ws['!merges'] = [{s:{r:0,c:0},e:{r:0,c:headers.length-1}}];
    const tc=XLSX.utils.encode_cell({r:0,c:0}); if(ws[tc]) ws[tc].s=tStyle;
    headers.forEach((_,ci)=>{ const c=XLSX.utils.encode_cell({r:2,c:ci}); if(ws[c]) ws[c].s=hStyle; });
    rows.forEach((row,ri)=>{
      const scoreIdx = headers.indexOf('Score moyen /100');
      if(scoreIdx>=0){ const g=getGrade(row[scoreIdx],1); const c=XLSX.utils.encode_cell({r:ri+3,c:scoreIdx}); if(ws[c]) ws[c].s={font:{bold:true,color:{rgb:g.color.replace('#','')}},alignment:{horizontal:'center'}}; }
      const riskIdx = headers.indexOf('À risque (< 60)');
      if(riskIdx>=0 && row[riskIdx]>0){ const c=XLSX.utils.encode_cell({r:ri+3,c:riskIdx}); if(ws[c]) ws[c].s={font:{bold:true,color:{rgb:'DC2626'}},alignment:{horizontal:'center'}}; }
      [headers.indexOf('Taux présence %')].filter(i=>i>=0).forEach(ci=>{ const c=XLSX.utils.encode_cell({r:ri+3,c:ci}); const val=row[ci]; if(ws[c]) ws[c].s={font:{bold:true,color:{rgb:val>=70?'15803D':val>=50?'B45309':'DC2626'}},alignment:{horizontal:'center'}}; });
    });
    return ws;
  };

  const vHdr = ['Ville','Nb animateurs','Avec pointage','Score moyen /100','Taux présence %','Présents','Absents','Malades','Jours évalués','À risque (< 60)'];
  const vRows = villeRows.map(r=>[r.key,r.total,r.withData,r.avgScore,r.tauxPres,r.totPresent,r.totAbsent,r.totMalade,r.totJours,r.atRisk]);
  const wsV = makeSheet(`Scoring par Ville — ${periodLabel}`, vHdr, vRows, [{wch:16},{wch:16},{wch:16},{wch:16},{wch:16},{wch:12},{wch:12},{wch:12},{wch:14},{wch:14}]);
  XLSX.utils.book_append_sheet(wb, wsV, 'Par Ville');

  const sHdr = ['Secteur','Ville','Nb animateurs','Avec pointage','Score moyen /100','Taux présence %','Présents','Absents','Malades','Jours évalués','À risque (< 60)'];
  const sRows = secteurRows.map(r=>[r.sector,r.ville,r.total,r.withData,r.avgScore,r.tauxPres,r.totPresent,r.totAbsent,r.totMalade,r.totJours,r.atRisk]);
  const wsS = makeSheet(`Scoring par Secteur — ${periodLabel}`, sHdr, sRows, [{wch:26},{wch:14},{wch:14},{wch:16},{wch:16},{wch:16},{wch:12},{wch:12},{wch:12},{wch:14},{wch:14}]);
  XLSX.utils.book_append_sheet(wb, wsS, 'Par Secteur');

  XLSX.writeFile(wb, `scoring_secteurs_${fileDate}.xlsx`);
}

/* ── SCORES VIEW ── */
const SCORE_POINTS = { present:100, renfort:100, recupe:65, conge:75, malade:50, absent:0, demission:0, nonpointe:null };
const SCORE_GRADES = [
  { min:90, label:'Elite',       color:'#15803D', bg:'#DCFCE7', icon:'award',       ring:'#22C55E' },
  { min:75, label:'Excellent',   color:'#1D4ED8', bg:'#DBEAFE', icon:'star',        ring:'#3B82F6' },
  { min:60, label:'Bien',        color:'#B45309', bg:'#FEF3C7', icon:'thumbs-up',   ring:'#F59E0B' },
  { min:45, label:'Passable',    color:'#C2410C', bg:'#FFEDD5', icon:'alert-circle',ring:'#F97316' },
  { min:0,  label:'Insuffisant', color:'#B91C1C', bg:'#FEE2E2', icon:'x-circle',    ring:'#EF4444' },
];
function getGrade(score, total) {
  if (total === 0) return { label:'N/A', color:'#94A3B8', bg:'#F1F5F9', icon:'minus', ring:'#CBD5E1' };
  return SCORE_GRADES.find(g => score >= g.min) || SCORE_GRADES[SCORE_GRADES.length-1];
}
function computeAnimScore(anim, pointages, cutoff) {
  const ptgs = pointages.filter(p => {
    if (!(p.animateurId === anim.id || p.animateurName === anim.name)) return false;
    if (!p.date) return false;
    const iso = dateToISO(p.date);
    return iso && iso >= cutoff;
  });
  const byStatus = { present:0, renfort:0, recupe:0, conge:0, malade:0, absent:0, demission:0 };
  ptgs.forEach(p => { if (byStatus[p.status] !== undefined) byStatus[p.status]++; });
  const scored = ptgs.filter(p => SCORE_POINTS[p.status] !== null && SCORE_POINTS[p.status] !== undefined);
  const total  = scored.length;
  const rawScore = total > 0 ? scored.reduce((acc, p) => acc + (SCORE_POINTS[p.status]||0), 0) / total : 0;
  const score = Math.round(rawScore);
  return { ...anim, score, total, ...byStatus };
}

    const d = new Date(); d.setDate(d.getDate() - period);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }, [period]);

  const allScores = useMemo(() => {

function UnassignedMatrix({ polygons, animateurs }) {
  const [expanded, setExpanded] = React.useState(new Set());
  const toggle = (city) => setExpanded(prev => {
    const next = new Set(prev);
    next.has(city) ? next.delete(city) : next.add(city);
    return next;
  });

  // Groupe les polygones sans animateur par dossier KML (= ville dans Google My Maps)
  const byCity = React.useMemo(() => {
    const map = {};
    polygons.forEach(poly => {
      const hasAnim = animateurs.find(a =>
        (a.sector||'').toLowerCase().trim() === poly.name.toLowerCase().trim()
      );
      if (!hasAnim) {
        const city = poly.folder || 'Non rattaché';
        if (!map[city]) map[city] = [];
        map[city].push(poly.name);
      }
    });
    return Object.entries(map).sort((a,b) => b[1].length - a[1].length);
  }, [polygons, animateurs]);

  const total = byCity.reduce((s,[,v]) => s + v.length, 0);

  if (!total) return (
    <div style={{marginTop:16,background:'#DCFCE7',border:'1px solid #BBF7D0',borderRadius:10,padding:'12px 18px',display:'flex',alignItems:'center',gap:10}}>
      <i data-lucide="check-circle-2" style={{width:18,height:18,color:'#16A34A',flexShrink:0}}></i>
      <span style={{fontSize:13,fontWeight:700,color:'#15803D'}}>Tous les secteurs ont un animateur affecté</span>
    </div>
  );

  return (
    <div style={{marginTop:20}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
        <div style={{width:10,height:10,borderRadius:99,background:'#EC4899',flexShrink:0}}></div>
        <span style={{fontSize:14,fontWeight:700,color:'var(--neutral-900)'}}>Secteurs sans animateur affecté</span>
        <span style={{background:'#FCE7F3',color:'#BE185D',fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:99}}>{total} secteur{total!==1?'s':''}</span>
      </div>
      <div className="table-card">
        <table className="data-table" style={{width:'100%'}}>
          <thead>
            <tr>
              <th style={{width:36}}></th>
              <th>Ville / Zone</th>
              <th style={{width:220,textAlign:'center'}}>Secteurs sans animateur</th>
            </tr>
          </thead>
          <tbody>
            {byCity.map(([city, sectors]) => (
              <React.Fragment key={city}>
                <tr style={{cursor:'pointer',background:expanded.has(city)?'var(--primary-50)':'white'}} onClick={() => toggle(city)}>
                  <td style={{textAlign:'center'}}>
                    <div style={{width:24,height:24,borderRadius:6,background:expanded.has(city)?'var(--primary-600)':'var(--neutral-100)',display:'inline-flex',alignItems:'center',justifyContent:'center',transition:'all 150ms'}}>
                      <i data-lucide={expanded.has(city)?'minus':'plus'} style={{width:13,height:13,color:expanded.has(city)?'white':'var(--neutral-600)'}}></i>
                    </div>
                  </td>
                  <td style={{fontWeight:700,color:'var(--neutral-900)'}}>{city}</td>
                  <td style={{textAlign:'center'}}>
                    <span style={{background:'#FCE7F3',color:'#BE185D',fontSize:13,fontWeight:800,padding:'4px 14px',borderRadius:99,display:'inline-flex',alignItems:'center',gap:6}}>
                      <span style={{width:7,height:7,borderRadius:99,background:'#EC4899',display:'inline-block'}}></span>

/* ── IMPORT SECTEURS MODAL ── */
function ImportSecteursModal({ onClose, onImported }) {
  const [file,      setFile]      = useState(null);
  const [preview,   setPreview]   = useState(null);
  const [importing, setImporting] = useState(false);

  const handleFile = (e) => {
    const f = e.target.files[0];
    if (!f) return;
    setFile(f);
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const wb   = XLSX.read(ev.target.result, { type:'array' });
        const ws   = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });
        if (rows.length < 2) { setPreview({ error:'Fichier vide.' }); return; }
        const hdr   = rows[0].map(h => String(h||'').trim().toUpperCase());
        const colV  = hdr.indexOf('VILLE');
        const colS  = hdr.indexOf('SECTEUR');
        const colSt = hdr.indexOf('STATUT');
        const colDL = hdr.indexOf('DATE LANCEMENT');
        const colEC = hdr.indexOf('EFFECTIF CIBLE');
        if ([colV, colS].includes(-1)) { setPreview({ error:'Colonnes manquantes (VILLE, SECTEUR requis).' }); return; }
        const items = [];
        rows.slice(1).forEach(row => {
          const ville  = String(row[colV]||'').trim();
          const sector = String(row[colS]||'').trim();
          if (!ville || !sector) return;
          const statutRaw = colSt >= 0 ? String(row[colSt]||'').trim().toUpperCase() : 'VRAI';
          const actif = statutRaw !== 'FAUX' && statutRaw !== 'FALSE' && statutRaw !== '0';
          const dateLancement = colDL >= 0 ? (parseStoredDate(row[colDL]) || '') : '';
          const effectifCible = colEC >= 0 && row[colEC] !== '' ? Number(row[colEC]) : null;
          items.push({ ville, sector, actif, dateLancement, effectifCible });
        });
        setPreview({ items });
      } catch { setPreview({ error:'Impossible de lire le fichier.' }); }
    };
    reader.readAsArrayBuffer(f);
  };

  const handleImport = async () => {
    if (!preview?.items?.length) return;
    setImporting(true);
    await LS.bulkUpsertSecteurs(preview.items);
    setImporting(false);
    onImported(preview.items.length);
    onClose();
  };

  return (
    <div className="modal-overlay" onClick={e => e.target===e.currentTarget && onClose()}>

/* ── SECTORS VIEW ── */
function parseStoredDate(val) {
  if (!val && val !== 0) return null;
  if (typeof val === 'number' || (typeof val === 'string' && /^\d{5}$/.test(val.trim()))) {
    const n = Number(val);
    const d = new Date((n - 25569) * 86400000);
    const y = d.getUTCFullYear(), m = String(d.getUTCMonth()+1).padStart(2,'0'), day = String(d.getUTCDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
  }
  const s = String(val).trim();
  const dmy = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (dmy) return `${dmy[3]}-${dmy[2].padStart(2,'0')}-${dmy[1].padStart(2,'0')}`;
  return s;
}
function ancienneteMonths(dateLancement) {
  const iso = parseStoredDate(dateLancement);
  if (!iso) return null;
  const diff = (Date.now() - new Date(iso).getTime()) / 86400000;
  if (diff < 0) return 0;
  return Math.ceil(diff / 30);
}
function effectifTheorique(months) {
  if (months === null || months === undefined) return null;
  if (months <= 1) return 7;
  if (months === 2) return 2;
  return 1;
}

function SectorsView({ secteurs, villes = [], readOnly = false, animateurs = [] }) {
  const [search,      setSearch]      = useState('');
  const [filterVille, setFilterVille] = useState('Toutes');
  const [showImport,  setShowImport]  = useState(false);
  const [toast,       setToast]       = useState('');

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 3000); };

  const villeNames  = villes.length > 0 ? villes.map(v => v.name) : VILLES;
  const VILLES_LIST = [...new Set([...villeNames, ...secteurs.map(s => s.ville).filter(Boolean)])].sort();

  const filtered = useMemo(() => {
    const q = search.toLowerCase();
    return secteurs.filter(s => {
      const matchQ = !q || s.sector.toLowerCase().includes(q) || s.ville.toLowerCase().includes(q);
      const matchV = filterVille === 'Toutes' || s.ville === filterVille;
      return matchQ && matchV;
    }).sort((a,b) => a.ville.localeCompare(b.ville) || a.sector.localeCompare(b.sector));
  }, [secteurs, search, filterVille]);

  const handleToggle = async (s) => {
    await LS.updateSector(s.id, { actif: !s.actif });
    showToast(`${s.sector} — ${!s.actif ? 'activé' : 'désactivé'}`);
  };

  const handleDelete = async (s) => {
    if (!window.confirm(`Supprimer le secteur "${s.sector}" ?`)) return;
    await LS.deleteSector(s.id);
    showToast(`${s.sector} supprimé`);
  };

  const downloadTemplate = () => {
    const rows = secteurs
      .sort((a,b) => a.ville.localeCompare(b.ville)||a.sector.localeCompare(b.sector))
      .map(s => {
        const effActuel = animateurs.filter(a =>
          (a.sector||'').toLowerCase() === (s.sector||'').toLowerCase() &&
          (a.ville||'').toLowerCase()  === (s.ville||'').toLowerCase()
        ).length;
        const months  = ancienneteMonths(s.dateLancement);
        const effTheo = effectifTheorique(months);
        const gap     = effTheo !== null ? effActuel - effTheo : '';
        return [
          s.ville,
          s.sector,
          s.actif !== false ? 'VRAI' : 'FAUX',
          s.dateLancement ? (() => { const iso = parseStoredDate(s.dateLancement); return iso ? iso.split('-').reverse().join('/') : ''; })() : '',
          s.effectifCible != null ? s.effectifCible : '',
          months != null ? months : '',
          effActuel,
          effTheo != null ? effTheo : '',
          gap !== '' ? gap : '',
        ];
      });
    if (rows.length === 0) rows.push(['Casablanca', 'Exemple Secteur 1', 'VRAI', '2025-01-15', 10, '', '', '', '']);
    const data = [
      ['VILLE', 'SECTEUR', 'STATUT', 'DATE LANCEMENT', 'EFFECTIF CIBLE', 'ANCIENNETÉ (mois)', 'EFFECTIF ACTUEL', 'EFFECTIF THÉORIQUE', 'GAP EFFECTIF'],
      ...rows,
    ];
    const ws = XLSX.utils.aoa_to_sheet(data);
    ws['!cols'] = [{wch:20},{wch:32},{wch:10},{wch:18},{wch:16},{wch:18},{wch:16},{wch:19},{wch:14}];
    const hStyle    = { font:{bold:true,color:{rgb:'FFFFFF'},sz:11}, fill:{fgColor:{rgb:'0052CC'}}, alignment:{horizontal:'center'} };
    const calcStyle = { font:{bold:true,color:{rgb:'FFFFFF'},sz:11}, fill:{fgColor:{rgb:'374151'}}, alignment:{horizontal:'center'} };
    ['A1','B1','C1','D1','E1'].forEach(c => { if (ws[c]) ws[c].s = hStyle; });
    ['F1','G1','H1','I1'].forEach(c => { if (ws[c]) ws[c].s = calcStyle; });
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Secteurs');
    XLSX.writeFile(wb, 'secteurs_extraction.xlsx');
  };

  const actifCount   = secteurs.filter(s => s.actif !== false).length;
  const inactifCount = secteurs.filter(s => s.actif === false).length;

  return (
    <>
      {showImport && <ImportSecteursModal onClose={() => setShowImport(false)} onImported={n => { setShowImport(false); showToast(`${n} secteur(s) importé(s) / mis à jour`); }} />}
      {toast && <div style={{position:'fixed',bottom:24,right:24,background:'#1E293B',color:'white',padding:'10px 18px',borderRadius:10,fontSize:13,fontWeight:600,zIndex:200,boxShadow:'0 8px 24px rgba(0,0,0,0.2)'}}>{toast}</div>}

      <div className="section-hd">
        <div>
          <div className="section-title">Gestion des Secteurs</div>
          <div className="section-sub">{actifCount} actif{actifCount!==1?'s':''} · {inactifCount} inactif{inactifCount!==1?'s':''} · {secteurs.length} total</div>
        </div>
        {!readOnly && (
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <button className="btn btn-ghost" onClick={downloadTemplate}>
              <i data-lucide="file-spreadsheet" style={{width:15,height:15}}></i>Template / Extraction
            </button>
            <button className="btn btn-primary" onClick={() => setShowImport(true)}>
              <i data-lucide="upload" style={{width:15,height:15}}></i>Importer Excel
            </button>
          </div>
        )}
      </div>
