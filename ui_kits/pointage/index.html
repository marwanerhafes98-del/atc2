<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Outil Pointage — Team Lead</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin:0; padding:0; font-family:var(--font-sans); background:var(--neutral-100); overscroll-behavior:none; }
    #root { width:100%; min-height:100vh; display:flex; flex-direction:column; }

    .mobile-container {
      max-width:414px; margin:0 auto; width:100%; min-height:100vh;
      background:white; box-shadow:0 0 40px rgba(0,0,0,0.1);
      display:flex; flex-direction:column; position:relative;
    }

    /* STATUS BAR */
    .status-bar {
      height:52px; background:var(--primary-600);
      display:flex; align-items:center; justify-content:space-between;
      padding:0 16px; color:white; position:sticky; top:0; z-index:100;
    }
    .status-bar-title { font-weight:800; font-size:17px; letter-spacing:0.3px; position:absolute; left:50%; transform:translateX(-50%); white-space:nowrap; }
    .status-bar-btn { background:transparent; border:none; color:white; display:flex; align-items:center; gap:4px; font-size:15px; font-weight:600; cursor:pointer; padding:8px 0; opacity:0.92; }
    .status-bar-icon-btn { background:rgba(255,255,255,0.15); border:none; color:white; border-radius:var(--radius-full); width:34px; height:34px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
    .status-bar-spacer { width:70px; }

    /* MAIN CONTENT */
    .main-content { flex:1; overflow-y:auto; padding-bottom:80px; }

    /* BOTTOM NAV */
    .bottom-nav {
      position:fixed; bottom:0; left:50%; transform:translateX(-50%);
      width:100%; max-width:414px; height:68px; background:white;
      border-top:1px solid var(--neutral-200); display:flex; z-index:90;
      box-shadow:0 -4px 16px rgba(0,0,0,0.06);
    }
    .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; border:none; background:transparent; color:var(--neutral-400); font-size:10px; font-weight:600; cursor:pointer; transition:color 150ms; padding:8px 4px; letter-spacing:0.3px; }
    .nav-item.active { color:var(--primary-600); }
    .nav-item:active { background:var(--neutral-50); }
    .nav-badge { position:absolute; top:-2px; right:-4px; background:var(--error-500); color:white; font-size:9px; font-weight:700; min-width:16px; height:16px; border-radius:8px; display:flex; align-items:center; justify-content:center; padding:0 3px; }
    .nav-icon-wrap { position:relative; display:inline-flex; }

    /* LOGIN */
    .login-screen { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; background:linear-gradient(160deg, var(--primary-700) 0%, var(--primary-900) 100%); }
    .login-logo { text-align:center; margin-bottom:40px; }
    .login-logo-circle { width:88px; height:88px; background:white; border-radius:var(--radius-full); display:flex; align-items:center; justify-content:center; margin:0 auto 20px; box-shadow:0 8px 32px rgba(0,0,0,0.2); }
    .login-title { color:white; font-size:26px; font-weight:800; letter-spacing:1px; margin-bottom:6px; }
    .login-subtitle { color:rgba(255,255,255,0.65); font-size:13px; font-weight:500; letter-spacing:2px; text-transform:uppercase; }
    .login-form { width:100%; background:white; border-radius:var(--radius-xl); padding:28px 24px; box-shadow:0 16px 48px rgba(0,0,0,0.2); }
    .form-group { margin-bottom:16px; }
    .form-label { display:block; font-size:12px; font-weight:700; color:var(--neutral-600); margin-bottom:7px; text-transform:uppercase; letter-spacing:0.5px; }
    .form-input { width:100%; height:50px; padding:0 16px; border:1.5px solid var(--neutral-200); border-radius:var(--radius-md); font-size:16px; font-family:var(--font-sans); color:var(--neutral-900); background:var(--neutral-50); transition:all 150ms; }
    .form-input:focus { outline:none; border-color:var(--primary-600); background:white; box-shadow:0 0 0 3px var(--primary-100); }
    .form-select { width:100%; height:50px; padding:0 16px; border:1.5px solid var(--neutral-200); border-radius:var(--radius-md); font-size:15px; font-family:var(--font-sans); color:var(--neutral-900); background:var(--neutral-50); appearance:none; cursor:pointer; }
    .form-select:focus { outline:none; border-color:var(--primary-600); }
    .select-wrap { position:relative; }
    .select-wrap::after { content:''; position:absolute; right:14px; top:50%; transform:translateY(-50%); border:5px solid transparent; border-top-color:var(--neutral-400); pointer-events:none; margin-top:3px; }
    .btn-login { width:100%; height:52px; background:var(--primary-600); color:white; border:none; border-radius:var(--radius-md); font-size:15px; font-weight:700; cursor:pointer; margin-top:8px; letter-spacing:0.5px; box-shadow:0 4px 16px rgba(0,82,204,0.35); transition:all 150ms; }
    .btn-login:active { transform:scale(0.98); }
    .login-hint { font-size:12px; color:var(--neutral-400); text-align:center; margin-top:16px; }

    /* FILTER DROPDOWNS */
    .filter-dropdowns-row { display:flex; gap:10px; padding:8px 16px 12px; background:white; }
    .filter-dropdown-wrap { flex:1; position:relative; display:flex; align-items:center; }
    .dropdown-icon { position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--primary-600); pointer-events:none; z-index:1; }
    .dropdown-arrow { position:absolute; right:10px; top:50%; transform:translateY(-50%); color:var(--neutral-400); pointer-events:none; }
    .filter-select { width:100%; height:40px; padding:0 30px 0 32px; border:1.5px solid var(--neutral-200); border-radius:var(--radius-md); font-size:13px; font-weight:600; font-family:var(--font-sans); color:var(--neutral-800); background:var(--neutral-50); appearance:none; cursor:pointer; transition:all 150ms; }
    .filter-select:focus { outline:none; border-color:var(--primary-500); background:white; box-shadow:0 0 0 3px var(--primary-100); }
    .filter-select option { font-weight:500; }

    /* STATS */
    .stats-bar { display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; padding:10px 16px; background:var(--neutral-50); border-bottom:1px solid var(--neutral-100); }
    .stats-bar::-webkit-scrollbar { display:none; }
    .stat-chip { display:flex; align-items:center; gap:5px; padding:6px 11px; border-radius:var(--radius-lg); font-size:11px; font-weight:700; white-space:nowrap; flex-shrink:0; }
    .stat-chip-dot { width:7px; height:7px; border-radius:var(--radius-full); }
    .stat-present { background:#DCFCE7; color:#15803D; } .stat-present .stat-chip-dot { background:#22C55E; }
    .stat-absent  { background:#FEE2E2; color:#B91C1C; } .stat-absent  .stat-chip-dot { background:#EF4444; }
    .stat-malade  { background:#FEF3C7; color:#B45309; } .stat-malade  .stat-chip-dot { background:#F59E0B; }
    .stat-demission { background:#F3E8FF; color:#6B21A8; } .stat-demission .stat-chip-dot { background:#A855F7; }
    .stat-nonpointe { background:var(--neutral-100); color:var(--neutral-600); } .stat-nonpointe .stat-chip-dot { background:var(--neutral-400); }

    /* LIST HEADER */
    .list-header { padding:14px 16px 0; background:white; position:sticky; top:52px; z-index:50; border-bottom:1px solid var(--neutral-100); }
    .list-top-row { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:10px; }
    .list-title { font-size:22px; font-weight:800; color:var(--neutral-900); margin-bottom:2px; }
    .list-subtitle { font-size:12px; color:var(--neutral-500); }
    .date-chip { background:var(--primary-50); color:var(--primary-700); font-size:11px; font-weight:600; padding:5px 10px; border-radius:var(--radius-md); white-space:nowrap; }
    .search-row { display:flex; gap:8px; padding-bottom:10px; }
    .search-bar { flex:1; position:relative; }
    .search-input { width:100%; height:40px; padding:0 12px 0 38px; border:1.5px solid var(--neutral-200); border-radius:var(--radius-lg); font-size:15px; background:var(--neutral-50); color:var(--neutral-900); font-family:var(--font-sans); }
    .search-input:focus { outline:none; border-color:var(--primary-400); background:white; }
    .search-icon { position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--neutral-400); pointer-events:none; }

    /* FILTER CHIPS */
    .filter-scroll { display:flex; gap:7px; overflow-x:auto; scrollbar-width:none; padding:0 16px 10px; background:white; }
    .filter-scroll::-webkit-scrollbar { display:none; }
    .filter-chip { display:flex; align-items:center; gap:4px; padding:5px 11px; border-radius:var(--radius-full); font-size:11px; font-weight:600; border:1.5px solid var(--neutral-200); background:white; color:var(--neutral-500); cursor:pointer; white-space:nowrap; flex-shrink:0; transition:all 120ms; }
    .filter-chip.active { border-color:var(--primary-600); background:var(--primary-600); color:white; }

    /* SECTION DIVIDER */
    .section-label { padding:8px 16px 5px; font-size:10px; font-weight:700; color:var(--neutral-400); text-transform:uppercase; letter-spacing:0.8px; background:var(--neutral-50); border-bottom:1px solid var(--neutral-100); }

    /* ANIMATEUR ITEM */
    .animateur-item { padding:13px 16px; border-bottom:1px solid var(--neutral-100); display:flex; align-items:center; gap:11px; background:white; cursor:pointer; transition:background 120ms; }
    .animateur-item:active { background:var(--neutral-50); }
    .avatar { width:44px; height:44px; border-radius:var(--radius-full); color:white; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; flex-shrink:0; position:relative; }
    .avatar-status-dot { position:absolute; bottom:1px; right:1px; width:11px; height:11px; border-radius:var(--radius-full); border:2px solid white; }
    .animateur-info { flex:1; min-width:0; }
    .animateur-name { font-weight:600; font-size:14px; margin-bottom:2px; color:var(--neutral-900); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .animateur-meta { font-size:11px; color:var(--neutral-500); display:flex; align-items:center; gap:5px; }
    .animateur-time { font-size:10px; color:var(--neutral-400); margin-top:1px; }
    .animateur-phone { font-size:11px; color:var(--neutral-400); margin-top:1px; font-family:var(--font-mono); }

    .status-badge { display:flex; align-items:center; gap:5px; padding:4px 8px; border-radius:var(--radius-sm); font-size:10px; font-weight:700; flex-shrink:0; white-space:nowrap; }
    .status-dot { width:6px; height:6px; border-radius:var(--radius-full); }
    .s-present  { background:#DCFCE7; color:#15803D; } .s-present  .status-dot { background:#22C55E; }
    .s-absent   { background:#FEE2E2; color:#B91C1C; } .s-absent   .status-dot { background:#EF4444; }
    .s-malade   { background:#FEF3C7; color:#B45309; } .s-malade   .status-dot { background:#F59E0B; }
    .s-demission{ background:#F3E8FF; color:#7C3AED; } .s-demission .status-dot { background:#A855F7; }
    .s-nonpointe{ background:var(--neutral-100); color:var(--neutral-500); } .s-nonpointe .status-dot { background:var(--neutral-400); }

    .empty-state { padding:48px 24px; text-align:center; color:var(--neutral-400); }
    .empty-state-text { font-size:14px; font-weight:500; margin-top:12px; }

    /* POINTAGE FORM */
    .pointage-container { padding:0 0 20px; }
    .pointage-hero { background:linear-gradient(135deg, var(--primary-600), var(--primary-800)); padding:24px 20px 28px; display:flex; flex-direction:column; align-items:center; gap:10px; position:relative; }
    .hero-edit-btn { position:absolute; top:14px; right:14px; background:rgba(255,255,255,0.18); border:none; color:white; border-radius:var(--radius-full); width:36px; height:36px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:background 150ms; }
    .hero-edit-btn:active { background:rgba(255,255,255,0.3); }
    .btn-delete-outline { width:100%; height:48px; background:transparent; color:#EF4444; border:1.5px solid #FECACA; border-radius:var(--radius-md); font-size:14px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; margin-top:12px; transition:all 150ms; }
    .btn-delete-outline:active { background:#FEF2F2; }
    .btn-delete-solid { width:100%; height:48px; background:#EF4444; color:white; border:none; border-radius:var(--radius-md); font-size:14px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; margin-top:6px; }
    .btn-cancel-del { width:100%; height:40px; background:transparent; color:var(--neutral-500); border:1.5px solid var(--neutral-200); border-radius:var(--radius-md); font-size:13px; font-weight:600; cursor:pointer; margin-top:6px; }
    .pointage-avatar { width:68px; height:68px; border-radius:var(--radius-full); color:white; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:22px; border:3px solid rgba(255,255,255,0.4); }
    .pointage-name { font-size:20px; font-weight:800; color:white; text-align:center; }
    .pointage-sub { font-size:12px; color:rgba(255,255,255,0.7); display:flex; align-items:center; gap:5px; }
    .pointage-body { padding:16px; }
    .section-title { font-size:10px; font-weight:700; color:var(--neutral-400); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:10px; }
    .status-grid { display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-bottom:16px; }
    .status-btn { height:68px; border:2px solid transparent; border-radius:var(--radius-lg); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px; cursor:pointer; font-size:12px; font-weight:700; transition:all 150ms; background:var(--neutral-50); color:var(--neutral-600); }
    .status-btn:active { transform:scale(0.96); }
    .status-btn.selected { border-color:currentColor; }
    .status-btn.btn-present   { color:#15803D; } .status-btn.btn-present.selected   { background:#DCFCE7; }
    .status-btn.btn-absent    { color:#B91C1C; } .status-btn.btn-absent.selected    { background:#FEE2E2; }
    .status-btn.btn-malade    { color:#B45309; } .status-btn.btn-malade.selected    { background:#FEF3C7; }
    .status-btn.btn-demission { color:#7C3AED; } .status-btn.btn-demission.selected { background:#F3E8FF; }
    .note-area { width:100%; min-height:72px; padding:10px 12px; border:1.5px solid var(--neutral-200); border-radius:var(--radius-md); font-size:14px; font-family:var(--font-sans); resize:none; color:var(--neutral-800); background:var(--neutral-50); transition:all 150ms; margin-bottom:14px; }
    .note-area:focus { outline:none; border-color:var(--primary-400); background:white; }
    .gps-card { background:#EFF6FF; border:1px solid #BFDBFE; border-radius:var(--radius-md); padding:11px 13px; display:flex; align-items:center; gap:11px; margin-bottom:16px; }
    .gps-label { font-size:11px; font-weight:700; color:#1D4ED8; margin-bottom:1px; }
    .gps-coords { font-family:var(--font-mono); font-size:10px; color:#3B82F6; }
    .gps-dot { width:10px; height:10px; border-radius:var(--radius-full); background:#22C55E; box-shadow:0 0 0 3px rgba(34,197,94,0.2); flex-shrink:0; }
    .gps-dot.waiting { background:#F59E0B; box-shadow:0 0 0 3px rgba(245,158,11,0.2); }
    .btn-confirm { width:100%; height:52px; background:var(--primary-600); color:white; border:none; border-radius:var(--radius-md); font-size:15px; font-weight:700; cursor:pointer; box-shadow:0 4px 16px rgba(0,82,204,0.3); transition:all 150ms; display:flex; align-items:center; justify-content:center; gap:8px; }
    .btn-confirm:active { transform:scale(0.98); }
    .btn-confirm:disabled { background:var(--neutral-300); box-shadow:none; cursor:not-allowed; }

    /* ADD ANIMATEUR MODAL */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200; display:flex; align-items:flex-end; justify-content:center; }
    .modal-sheet { background:white; border-radius:var(--radius-xl) var(--radius-xl) 0 0; width:100%; max-width:414px; max-height:90vh; overflow-y:auto; padding:0 0 24px; animation:slideUp 0.25s ease; }
    @keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
    .modal-handle { width:36px; height:4px; background:var(--neutral-200); border-radius:2px; margin:12px auto 0; }
    .modal-header { padding:16px 20px 12px; border-bottom:1px solid var(--neutral-100); display:flex; align-items:center; justify-content:space-between; }
    .modal-title { font-size:18px; font-weight:800; color:var(--neutral-900); }
    .modal-close { background:var(--neutral-100); border:none; border-radius:var(--radius-full); width:32px; height:32px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--neutral-500); }
    .modal-body { padding:16px 20px; }
    .modal-footer { padding:0 20px; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

    /* TOAST */
    .toast { position:fixed; bottom:84px; left:50%; transform:translateX(-50%); color:white; font-size:13px; font-weight:600; padding:11px 18px; border-radius:var(--radius-lg); box-shadow:0 8px 24px rgba(0,0,0,0.2); z-index:300; white-space:nowrap; display:flex; align-items:center; gap:8px; animation:fadeInUp 0.2s ease; max-width:340px; }
    @keyframes fadeInUp { from { transform:translateX(-50%) translateY(10px); opacity:0; } to { transform:translateX(-50%) translateY(0); opacity:1; } }
    .toast.success { background:#166534; }
    .toast.error   { background:#991B1B; }
    .toast.warning { background:#92400E; }
    .toast.info    { background:#1E40AF; }
    .toast.neutral { background:var(--neutral-900); }

    /* MAP */
    .map-container { width:100%; height:calc(100vh - 52px - 68px); }
    #map { width:100%; height:100%; }

    /* HISTORY */
    .history-item { padding:13px 16px; border-bottom:1px solid var(--neutral-100); display:flex; align-items:center; gap:11px; background:white; }
    .history-icon { width:38px; height:38px; border-radius:var(--radius-full); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .history-info { flex:1; min-width:0; }
    .history-name { font-weight:600; font-size:14px; color:var(--neutral-900); }
    .history-detail { font-size:12px; color:var(--neutral-500); margin-top:1px; }
    .history-time { font-size:11px; color:var(--neutral-400); font-weight:500; flex-shrink:0; }

    /* PROFILE */
    .profile-header { background:linear-gradient(135deg, var(--primary-600), var(--primary-800)); padding:28px 20px 24px; text-align:center; }
    .profile-avatar { width:76px; height:76px; border-radius:var(--radius-full); background:rgba(255,255,255,0.2); border:3px solid rgba(255,255,255,0.5); display:flex; align-items:center; justify-content:center; margin:0 auto 14px; font-size:26px; font-weight:800; color:white; }
    .profile-name { color:white; font-size:19px; font-weight:800; margin-bottom:3px; }
    .profile-role { color:rgba(255,255,255,0.7); font-size:12px; font-weight:500; letter-spacing:1px; text-transform:uppercase; }
    .profile-card { margin:14px 16px; background:white; border-radius:var(--radius-xl); overflow:hidden; box-shadow:var(--shadow-sm); border:1px solid var(--neutral-100); }
    .profile-row { padding:14px 16px; border-bottom:1px solid var(--neutral-100); display:flex; align-items:center; gap:13px; }
    .profile-row:last-child { border-bottom:none; }
    .profile-row-icon { color:var(--neutral-400); flex-shrink:0; }
    .profile-row-label { font-size:10px; color:var(--neutral-400); font-weight:600; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:2px; }
    .profile-row-value { font-size:14px; font-weight:600; color:var(--neutral-800); }
    .btn-logout { margin:0 16px 16px; width:calc(100% - 32px); height:46px; background:white; border:1.5px solid var(--error-300); color:var(--error-600); border-radius:var(--radius-md); font-size:14px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:all 150ms; }
    .btn-logout:active { background:var(--error-50); }

    /* FAB */
    .fab { position:fixed; bottom:84px; right:calc(50% - 207px + 16px); width:52px; height:52px; background:var(--primary-600); border:none; border-radius:var(--radius-full); color:white; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 4px 16px rgba(0,82,204,0.4); z-index:80; transition:all 150ms; }
    .fab:active { transform:scale(0.94); }
    @media (max-width:414px) { .fab { right:16px; } }

    /* LOGIN TABS */
    .login-tabs { display:flex; margin-bottom:16px; background:rgba(255,255,255,0.15); border-radius:var(--radius-lg); padding:4px; gap:4px; }
    .login-tab { flex:1; height:40px; border:none; border-radius:var(--radius-md); font-size:14px; font-weight:700; cursor:pointer; background:transparent; color:rgba(255,255,255,0.7); transition:all 150ms; font-family:var(--font-sans); }
    .login-tab.active { background:white; color:var(--primary-700); box-shadow:0 2px 8px rgba(0,0,0,0.1); }

function getInitials(name) {
  const p = name.trim().split(/\s+/);
  return p.length >= 2 ? (p[0][0] + p[1][0]).toUpperCase() : name.substring(0,2).toUpperCase();
}

function getCoord(ville, id) {
  const c = CITY_CENTERS[ville] || CITY_CENTERS['Casablanca'];
  const seed = id * 0.00137;
  return {
    lat: c.lat + (Math.sin(seed * 7.3) * 0.025),
    lng: c.lng + (Math.cos(seed * 5.1) * 0.025),
  };
}

      name: d.name, ville: d.ville, initials: d.initials,
      createdAt: new Date().toISOString(), createdBy: 'system'
    }));
    const obj = {};
    defaults.forEach(a => { obj[a.id] = a; });
    await db.ref('ptg/accounts').set(obj);
  },

  async login(email, password) {
    const snap = await db.ref('ptg/accounts').once('value');
    const accounts = snap.exists() ? Object.values(snap.val()) : [];
    const acc = accounts.find(a => a.email.toLowerCase() === email.toLowerCase().trim());
    if (!acc) return { error: 'Email introuvable. Créez un compte.' };
    if (acc.password !== password) return { error: 'Mot de passe incorrect.' };
    return { account: acc };
  },

  async register(name, email, password, ville) {
    if (!name.trim()) return { error: 'Entrez votre nom complet.' };
    if (password.length < 4) return { error: 'Mot de passe trop court (min. 4 caractères).' };
    const snap = await db.ref('ptg/accounts').once('value');
    const accounts = snap.exists() ? Object.values(snap.val()) : [];
    if (accounts.find(a => a.email.toLowerCase() === email.toLowerCase().trim()))
      return { error: 'Cet email est déjà enregistré.' };
    const acc = {
      id: Date.now(), email: email.toLowerCase().trim(), password,
      name: name.trim(), ville, initials: getInitials(name.trim()),
      createdAt: new Date().toISOString(), createdBy: 'self'
    };
    await db.ref(`ptg/accounts/${acc.id}`).set(acc);
    return { account: acc };
  },

  startSession(user) {
    const key = encodeKey(user.email);
    db.ref(`ptg/sessions/${key}`).set({
      email: user.email,
      name: user.name, ville: user.ville,
      initials: user.initials || getInitials(user.name),
      loginAt: new Date().toISOString(),
      lastPing: new Date().toISOString(),
      isActive: true
    });
  },

  pingSession(email) {
    db.ref(`ptg/sessions/${encodeKey(email)}/lastPing`).set(new Date().toISOString());
  },

  endSession(email) {
    db.ref(`ptg/sessions/${encodeKey(email)}`).update({
      isActive: false, logoutAt: new Date().toISOString()
    });
  },

  writePointage(teamLeadEmail, entry) {
    db.ref('ptg/pointages').push({
      ...entry, teamLeadEmail,
      date: new Date().toDateString(),
      ts: new Date().toISOString()
    });
  }
};

/* ── TOAST ── */
function Toast({ message, type, onDone }) {

}

/* ── LOGIN ── */
function LoginScreen({ onLogin }) {
  const [mode, setMode]       = useState('login');
  const [email, setEmail]     = useState('');
  const [password, setPwd]    = useState('');
  const [name, setName]       = useState('');
  const [ville, setVille]     = useState('Casablanca');
  const [confirm, setConfirm] = useState('');
  const [error, setError]     = useState('');
  const [loading, setLoading] = useState(false);
  const [remember, setRemember] = useState(true);

  const VILLES = [...new Set(ANIMATEURS_DB.map(a => a.ville))].sort();
  const switchMode = (m) => { setMode(m); setError(''); };

  const handleLogin = async (e) => {
    e.preventDefault(); setError(''); setLoading(true);
    const res = await LS.login(email, password);
    setLoading(false);
    if (res.error) { setError(res.error); return; }
    onLogin(res.account, remember);
  };

  const handleRegister = async (e) => {
    e.preventDefault(); setError('');
    if (password !== confirm) { setError('Les mots de passe ne correspondent pas.'); return; }
    setLoading(true);
    const res = await LS.register(name, email, password, ville);
    setLoading(false);
    if (res.error) { setError(res.error); return; }
    onLogin(res.account, remember);
  };

  return (
    <div className="login-screen">
      <div className="login-logo">
        <div className="login-logo-circle">
          <i data-lucide="clipboard-check" style={{ width:44, height:44, color:'var(--primary-600)' }}></i>
        </div>
        <div className="login-title">OUTILS POINTAGE</div>
        <div className="login-subtitle">Team Lead</div>
      </div>

      <div className="login-tabs">
        <button type="button" className={`login-tab ${mode==='login'?'active':''}`} onClick={() => switchMode('login')}>Se connecter</button>
        <button type="button" className={`login-tab ${mode==='register'?'active':''}`} onClick={() => switchMode('register')}>Créer un compte</button>
      </div>

      {mode === 'login' ? (
        <form className="login-form" onSubmit={handleLogin}>
          {error && <div className="login-error"><i data-lucide="alert-circle" style={{ width:15, height:15 }}></i>{error}</div>}
          <div className="form-group">
            <label className="form-label">Email</label>
            <input type="email" className="form-input" placeholder="teamlead@labelvie.ma"
              value={email} onChange={e => setEmail(e.target.value)} required />
          </div>
          <div className="form-group">
            <label className="form-label">Mot de passe</label>
            <input type="password" className="form-input" placeholder="••••••••"
              value={password} onChange={e => setPwd(e.target.value)} required />
          </div>
          <div className="remember-row">
            <input type="checkbox" id="remember-me" checked={remember} onChange={e => setRemember(e.target.checked)} />
            <label htmlFor="remember-me">Se souvenir de moi sur cet appareil</label>
          </div>
          <button type="submit" className="btn-login" disabled={loading}>{loading ? 'Connexion...' : 'Se connecter'}</button>
        </form>
      ) : (
        <form className="login-form" onSubmit={handleRegister}>
          {error && <div className="login-error"><i data-lucide="alert-circle" style={{ width:15, height:15 }}></i>{error}</div>}
          <div className="form-group">
            <label className="form-label">Nom complet</label>
            <input type="text" className="form-input" placeholder="Prénom Nom"
              value={name} onChange={e => setName(e.target.value)} required />
          </div>
          <div className="form-group">
            <label className="form-label">Email professionnel</label>
            <input type="email" className="form-input" placeholder="teamlead@labelvie.ma"
              value={email} onChange={e => setEmail(e.target.value)} required />
          </div>
          <div className="form-group">
            <label className="form-label">Ville</label>
            <div className="select-wrap">
              <select className="form-select" value={ville} onChange={e => setVille(e.target.value)}>
                {VILLES.map(v => <option key={v} value={v}>{v}</option>)}
              </select>
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">Mot de passe</label>
            <input type="password" className="form-input" placeholder="Min. 4 caractères"
              value={password} onChange={e => setPwd(e.target.value)} required />

          <div className="form-group">

/* ── ANIMATEURS LIST ── */
function AnimateursList({ animateurs, onSelectAnimateur, defaultVille }) {
  const [search,         setSearch]         = useState('');
  const [statusFilter,   setStatusFilter]   = useState('tous');
  const [selectedCity,   setSelectedCity]   = useState(defaultVille || 'Toutes');
  const [selectedSector, setSelectedSector] = useState('Tous');

  // ── Filtre 1 : VILLE ──
  const cities = [...new Set(animateurs.map(a => a.ville))].sort();
  const byCity = selectedCity === 'Toutes'
    ? animateurs
    : animateurs.filter(a => a.ville === selectedCity);

  // ── Filtre 2 : SECTEUR / MAGASIN ──
  const sectors = ['Tous', ...new Set(byCity.map(a => a.sector))].sort((a,b) => a === 'Tous' ? -1 : b === 'Tous' ? 1 : a.localeCompare(b));
  const bySector = selectedSector === 'Tous'
    ? byCity
    : byCity.filter(a => a.sector === selectedSector);

  // ── Stats (sur le résultat des 2 filtres géographiques) ──
  const counts = {
    present:   bySector.filter(a => a.status === 'present').length,
    absent:    bySector.filter(a => a.status === 'absent').length,
    malade:    bySector.filter(a => a.status === 'malade').length,
    demission: bySector.filter(a => a.status === 'demission').length,
    nonpointe: bySector.filter(a => a.status === 'nonpointe').length,
  };

  // ── Filtre 3 : STATUT ──
  const statusFilters = [
    { key:'tous',      label:`Tous (${bySector.length})` },
    { key:'nonpointe', label:`Non pointés (${counts.nonpointe})` },
    { key:'present',   label:`Présents (${counts.present})` },
    { key:'absent',    label:`Absents (${counts.absent})` },
    { key:'malade',    label:`Malades (${counts.malade})` },
    { key:'demission', label:`Démissions (${counts.demission})` },
  ];

  const filtered = bySector.filter(a => {
    const q = search.toLowerCase();
    const matchSearch = a.name.toLowerCase().includes(q) || a.sector.toLowerCase().includes(q) || a.phone.includes(q);
    const matchStatus = statusFilter === 'tous' || a.status === statusFilter;
    return matchSearch && matchStatus;
  });

  const sorted = [...filtered].sort((a,b) => {
    if (a.status === 'nonpointe' && b.status !== 'nonpointe') return -1;
    if (b.status === 'nonpointe' && a.status !== 'nonpointe') return 1;
    return 0;
  });

  const nonPointes = sorted.filter(a => a.status === 'nonpointe');
  const pointes    = sorted.filter(a => a.status !== 'nonpointe');

  const handleCityChange = (v) => {
    setSelectedCity(v);
    setSelectedSector('Tous');
    setStatusFilter('tous');
  };

  const subtitle = [
    selectedCity !== 'Toutes' ? selectedCity : null,
    selectedSector !== 'Tous' ? selectedSector : null,
  ].filter(Boolean).join(' · ') || 'Toutes les villes';

  return (
    <>
      {/* ── HEADER STICKY ── */}
      <div className="list-header">
        <div className="list-top-row">
          <div>
            <div className="list-title">Animateurs</div>
            <div className="list-subtitle">{sorted.length} résultat{sorted.length>1?'s':''} · {subtitle}</div>
          </div>
          <div className="date-chip">{new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}</div>
        </div>

        {/* Recherche */}
        <div className="search-row">
          <div className="search-bar">
            <i data-lucide="search" className="search-icon" style={{ width:17, height:17 }}></i>
            <input type="text" className="search-input" placeholder="Nom, secteur, téléphone..."
              value={search} onChange={e => setSearch(e.target.value)} />
          </div>
        </div>

        {/* Filtres Ville + Secteur — listes déroulantes */}
        <div className="filter-dropdowns-row">
          <div className="filter-dropdown-wrap">
            <i data-lucide="map-pin" className="dropdown-icon" style={{ width:14, height:14 }}></i>
            <select className="filter-select" value={selectedCity} onChange={e => handleCityChange(e.target.value)}>
              <option value="Toutes">Toutes les villes</option>
              {cities.map(c => (
                <option key={c} value={c}>{c} ({animateurs.filter(a=>a.ville===c).length})</option>
              ))}
            </select>
            <i data-lucide="chevron-down" className="dropdown-arrow" style={{ width:14, height:14 }}></i>
          </div>

          <div className="filter-dropdown-wrap">
            <i data-lucide="store" className="dropdown-icon" style={{ width:14, height:14 }}></i>
            <select className="filter-select" value={selectedSector}
              onChange={e => { setSelectedSector(e.target.value); setStatusFilter('tous'); }}>
              <option value="Tous">Tous les secteurs</option>
              {sectors.filter(s => s !== 'Tous').map(s => (
                <option key={s} value={s}>{s} ({byCity.filter(a=>a.sector===s).length})</option>
              ))}
            </select>
            <i data-lucide="chevron-down" className="dropdown-arrow" style={{ width:14, height:14 }}></i>
          </div>
        </div>
      </div>

      {/* ── STATS ── */}
      <div className="stats-bar">
        <div className="stat-chip stat-present"><span className="stat-chip-dot"></span>{counts.present} Présents</div>
        <div className="stat-chip stat-absent"><span className="stat-chip-dot"></span>{counts.absent} Absents</div>
        <div className="stat-chip stat-malade"><span className="stat-chip-dot"></span>{counts.malade} Malades</div>
        <div className="stat-chip stat-demission"><span className="stat-chip-dot"></span>{counts.demission} Démissions</div>
        <div className="stat-chip stat-nonpointe"><span className="stat-chip-dot"></span>{counts.nonpointe} Non pointés</div>
      </div>

      {/* ── FILTRE STATUT ── */}
      <div className="filter-scroll">
        {statusFilters.map(f => (
          <button key={f.key} className={`filter-chip ${statusFilter === f.key ? 'active' : ''}`}
            onClick={() => setStatusFilter(f.key)}>
            {f.label}
          </button>
        ))}
      </div>

      {sorted.length === 0 && (
        <div className="empty-state">
          <i data-lucide="search-x" style={{ width:48, height:48, opacity:0.3 }}></i>
          <div className="empty-state-text">Aucun animateur trouvé</div>
        </div>
      )}

      {statusFilter === 'tous' && nonPointes.length > 0 && (
        <><div className="section-label">À pointer — {nonPointes.length}</div>
        {nonPointes.map(a => <AnimateurRow key={a.id} animateur={a} onSelect={onSelectAnimateur} />)}</>
      )}
      {statusFilter === 'tous' && pointes.length > 0 && (
        <><div className="section-label">Pointés — {pointes.length}</div>
        {pointes.map(a => <AnimateurRow key={a.id} animateur={a} onSelect={onSelectAnimateur} />)}</>
      )}
      {statusFilter !== 'tous' && sorted.map(a => <AnimateurRow key={a.id} animateur={a} onSelect={onSelectAnimateur} />)}
    </>
  );
}

    name: animateur.name, sector: animateur.sector,
    ville: animateur.ville, phone: animateur.phone || '',
    teamLead: animateur.teamLead || '',
  });

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>

/* ── POINTAGE FORM ── */
function PointageForm({ animateur, onBack, onConfirm, onEdit, onDelete }) {
  const [selected, setSelected] = useState(animateur.status !== 'nonpointe' ? animateur.status : null);
  const [note, setNote]         = useState(animateur.note || '');
  const [gpsReady, setGpsReady] = useState(false);

  const [confirmDel, setConfirmDel] = useState(false);

  useEffect(() => {
    const c = getCoord(animateur.ville, animateur.id);
    const t = setTimeout(() => { setCoords(c); setGpsReady(true); }, 900);
    return () => clearTimeout(t);
  }, []);

  const color     = AVATAR_COLORS[animateur.id % AVATAR_COLORS.length];
  const needsNote = ['absent','malade','demission'].includes(selected);

  return (

          <i data-lucide="pencil" style={{ width:16, height:16 }}></i>

          {statusBtns.map(btn => (
            <button key={btn.key} className={`status-btn ${btn.cls} ${selected === btn.key ? 'selected' : ''}`}

              <i data-lucide={btn.icon} style={{ width:22, height:22 }}></i>
              {btn.label}
            </button>
          ))}
        </div>

        {needsNote && (
          <>

              {selected === 'demission' ? 'Remarque (date effective...)' : selected === 'malade' ? 'Remarque (durée, certificat...)' : "Raison de l'absence"}
            </div>
            <textarea className="note-area" value={note} onChange={e => setNote(e.target.value)}
              placeholder={selected === 'demission' ? 'Démission effective le...' : selected === 'malade' ? 'Arrêt maladie jusqu\'au...' : 'Raison...'} />
          </>
        )}

        <div className="section-title">Localisation</div>
        <div className="gps-card">
          <span className={`gps-dot ${!gpsReady ? 'waiting' : ''}`}></span>
          <div style={{ flex:1 }}>
            <div className="gps-label">{gpsReady ? 'Position GPS détectée' : 'Recherche GPS...'}</div>
            {coords && <div className="gps-coords">{coords.lat.toFixed(4)}, {coords.lng.toFixed(4)}</div>}
          </div>
          <i data-lucide="navigation" style={{ width:16, height:16, color:'#3B82F6' }}></i>
        </div>

        <button className="btn-confirm" disabled={!selected}
          onClick={() => onConfirm(animateur.id, selected, note, coords)}>
          <i data-lucide="check" style={{ width:20, height:20 }}></i>
          {selected ? `Confirmer — ${STATUS_META[selected].label}` : 'Choisir un statut'}
        </button>

        {!confirmDel ? (
          <button className="btn-delete-outline" onClick={() => setConfirmDel(true)}>
            <i data-lucide="trash-2" style={{ width:16, height:16 }}></i>

          <>

              Confirmer la suppression de {animateur.name} ?
            </div>
            <button className="btn-delete-solid" onClick={() => onDelete(animateur.id)}>

          </>
        )}
      </div>

      {showEdit && (
        <EditAnimateurModal
          animateur={animateur}
          onClose={() => setShowEdit(false)}
          onSave={data => onEdit(animateur.id, data)}
        />
      )}
    </div>
  );
}

/* ── ADD ANIMATEUR MODAL ── */
function AddAnimateurModal({ onClose, onAdd, defaultVille }) {
  const cities = [...new Set(ANIMATEURS_DB.map(a => a.ville))].sort();
  const [form, setForm] = useState({
    name: '', sector: '', ville: defaultVille || 'Casablanca',
    phone: '', teamLead: ''
  });
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!form.name.trim() || !form.sector.trim()) return;
    onAdd(form);
    onClose();
  };

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-sheet">
        <div className="modal-handle"></div>
        <div className="modal-header">
          <div className="modal-title">Ajouter un animateur</div>
          <button className="modal-close" onClick={onClose}>
            <i data-lucide="x" style={{ width:16, height:16 }}></i>
          </button>
        </div>
        <form onSubmit={handleSubmit}>
          <div className="modal-body">
            <div className="form-group">
              <label className="form-label">Nom complet *</label>
              <input className="form-input" placeholder="Prénom Nom" value={form.name}
                onChange={e => set('name', e.target.value)} required />
            </div>
            <div className="form-row">
              <div className="form-group">
                <label className="form-label">Ville *</label>
                <div className="select-wrap">
                  <select className="form-select" value={form.ville} onChange={e => set('ville', e.target.value)}>
                    {cities.map(c => <option key={c} value={c}>{c}</option>)}
                  </select>
                </div>
              </div>
              <div className="form-group">
                <label className="form-label">Téléphone</label>
                <input className="form-input" placeholder="+212 6 XX XX XX XX"
                  value={form.phone} onChange={e => set('phone', e.target.value)} />
              </div>
            </div>
            <div className="form-group">
              <label className="form-label">Secteur *</label>
              <input className="form-input" placeholder="Ex: Hay Salam 1, Tassila 2..."
                value={form.sector} onChange={e => set('sector', e.target.value)} required />
            </div>
            <div className="form-group">
              <label className="form-label">Team Lead</label>
              <input className="form-input" placeholder="Nom du responsable"
                value={form.teamLead} onChange={e => set('teamLead', e.target.value)} />
            </div>
          </div>
          <div className="modal-footer">
            <button type="submit" className="btn-confirm">
              <i data-lucide="user-plus" style={{ width:18, height:18 }}></i>
              Ajouter l'animateur
            </button>
          </div>
        </form>
      </div>
    </div>
  );
}

/* ── MAP VIEW ── */
function MapView({ animateurs }) {
  useEffect(() => {
    const first = animateurs[0];
    const center = first ? getCoord(first.ville, first.id) : { lat:33.5731, lng:-7.5898 };
    const map = L.map('map').setView([center.lat, center.lng], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution:'© OpenStreetMap' }).addTo(map);
    animateurs.forEach(a => {
      const meta = STATUS_META[a.status] || STATUS_META.nonpointe;
      const c    = getCoord(a.ville, a.id);
      const m    = L.circleMarker([c.lat, c.lng], { radius:11, fillColor:meta.mapColor, color:'white', weight:3, fillOpacity:0.9 }).addTo(map);
      m.bindPopup(`<strong>${a.name}</strong><br><small>${a.sector} · ${a.ville}</small><br><span style="color:${meta.mapColor};font-weight:700">${meta.label}</span>`);
    });
    return () => map.remove();
  }, [animateurs]);
  return <div id="map"></div>;
}

/* ── HISTORY VIEW ── */
function HistoryView({ userEmail }) {
  const [allPtgs, setAllPtgs] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [error,   setError]   = React.useState(null);

  React.useEffect(() => {
    const ref = db.ref('ptg/pointages');
    const onSuccess = (snap) => {
      try {
        const raw = snap.exists() ? snap.val() : {};
        const all = Object.values(raw || {}).filter(p => p && typeof p === 'object');
        setAllPtgs(all.filter(p => p.teamLeadEmail === userEmail));
      } catch (e) {
        setAllPtgs([]);
      }
      setLoading(false);
    };
    const onError = (e) => {
      setError('Erreur de connexion Firebase. Vérifiez les règles de sécurité.');
      setLoading(false);
    };
    ref.on('value', onSuccess, onError);
    return () => ref.off('value', onSuccess);
  }, [userEmail]);

  if (loading) return (
    <div style={{ padding:'64px 24px', textAlign:'center', color:'#334155', background:'white', minHeight:'100vh' }}>
      <div style={{ fontSize:32, marginBottom:12 }}>⏳</div>
      <div style={{ fontSize:15, fontWeight:700, color:'#1E293B' }}>Chargement de l'historique...</div>
      <div style={{ fontSize:12, color:'#64748B', marginTop:6 }}>Connexion Firebase en cours</div>
    </div>
  );

  if (error) return (
    <div style={{ padding:'32px 20px', textAlign:'center', color:'#DC2626', background:'#FEE2E2', margin:16, borderRadius:12 }}>
      <div style={{ fontSize:13, fontWeight:600 }}>{error}</div>
    </div>
  );

  const byDate = {};
  try {
    [...allPtgs].reverse().forEach(p => {
      const key = p.date || '—';
      if (!byDate[key]) byDate[key] = [];
      byDate[key].push(p);
    });
  } catch (e) {}
  const dates = Object.keys(byDate);

  const fmtDate = (ds) => {
    try {
      const today = new Date().toDateString();
      if (ds === today) return "Aujourd'hui";
      const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
      if (ds === yesterday.toDateString()) return 'Hier';
      const d = new Date(ds);
      if (isNaN(d.getTime())) return ds;
      return d.toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long' });
    } catch { return ds; }
  };

  if (dates.length === 0) return (
    <div style={{ padding:'64px 24px', textAlign:'center', color:'#94A3B8' }}>
      <i data-lucide="clock" style={{ width:56, height:56, opacity:0.25 }}></i>
      <div style={{ fontSize:14, fontWeight:500, marginTop:12 }}>Aucun pointage enregistré</div>
      <div style={{ fontSize:13, color:'#94A3B8', marginTop:6 }}>Les pointages apparaîtront ici</div>
    </div>
  );

  return (
    <>
      <div style={{ padding:'14px 16px 10px', background:'white', borderBottom:'1px solid #E2E8F0' }}>
        <div style={{ fontSize:22, fontWeight:800, color:'#0F172A', marginBottom:2 }}>Historique</div>
        <div style={{ fontSize:12, color:'#64748B' }}>{allPtgs.length} pointage{allPtgs.length>1?'s':''} · {dates.length} jour{dates.length>1?'s':''}</div>
      </div>
      {dates.map(ds => (
        <React.Fragment key={ds}>
          <div style={{ padding:'8px 16px 5px', fontSize:11, fontWeight:700, color:'#64748B', textTransform:'uppercase', letterSpacing:'0.6px', background:'#F8FAFC', borderBottom:'1px solid #E2E8F0', display:'flex', justifyContent:'space-between' }}>
            <span>{fmtDate(ds)}</span>
            <span style={{ color:'#94A3B8', fontWeight:600 }}>{(byDate[ds]||[]).length} pointage{(byDate[ds]||[]).length>1?'s':''}</span>
          </div>
          {(byDate[ds]||[]).map((h,i) => {
            if (!h) return null;
            const meta = STATUS_META[h.status] || STATUS_META.nonpointe;
            return (
              <div key={i} className="history-item">
                <div className="history-icon" style={{ background:meta.mapColor+'25' }}>
                  <i data-lucide={meta.icon} style={{ width:18, height:18, color:meta.mapColor }}></i>
                </div>
                <div className="history-info">
                  <div className="history-name">{h.animateurName || '—'}</div>
                  <div className="history-detail">{h.sector || h.ville || '—'} · <span style={{ color:meta.mapColor, fontWeight:700 }}>{meta.label}</span>{h.note ? ` · ${h.note}` : ''}</div>
                </div>
                <div className="history-time">{h.time || '—'}</div>
              </div>
            );
          })}
        </React.Fragment>
      ))}
    </>
  );
}

/* ── PROFILE VIEW ── */

  const total   = animateurs.length;
  const pointed = animateurs.filter(a => a.status !== 'nonpointe').length;
  return (
    <>
      <div className="profile-header">
        <div className="profile-avatar">{user.initials || 'TL'}</div>
        <div className="profile-name">{user.name}</div>
        <div className="profile-role">Team Lead</div>
      </div>
      <div className="profile-card">
        <div className="profile-row">
          <i data-lucide="mail" className="profile-row-icon" style={{ width:18, height:18 }}></i>
          <div><div className="profile-row-label">Email</div><div className="profile-row-value">{user.email}</div></div>
        </div>
        <div className="profile-row">
          <i data-lucide="map-pin" className="profile-row-icon" style={{ width:18, height:18 }}></i>
          <div><div className="profile-row-label">Zone</div><div className="profile-row-value">{user.ville || 'Toutes les villes'}</div></div>
        </div>
        <div className="profile-row">
          <i data-lucide="users" className="profile-row-icon" style={{ width:18, height:18 }}></i>
          <div><div className="profile-row-label">Animateurs</div><div className="profile-row-value">{total} total · {pointed} pointés aujourd'hui</div></div>
        </div>
        <div className="profile-row">
          <i data-lucide="calendar" className="profile-row-icon" style={{ width:18, height:18 }}></i>

/* ── APP ── */
function App() {
  const [user, setUser] = useState(() => {
    try {
      const saved = localStorage.getItem('ptg_saved_user');
      return saved ? JSON.parse(saved) : null;
    } catch { return null; }
  });
  const [currentView, setCurrentView] = useState('list');
  const [animateurs, setAnimateurs]   = useState(
    ANIMATEURS_DB.map(a => ({ ...a, status:'nonpointe', pointedAt:null, note:undefined }))
  );
  const [selectedAnimateur, setSelectedAnimateur] = useState(null);
  const [history, setHistory]     = useState([]);
  const [toast,   setToast]       = useState(null);
  const [showAdd, setShowAdd]     = useState(false);
  const [todayCount, setTodayCount] = useState(0);
  const nextId = useRef(ANIMATEURS_DB.length + 1);
  const mainRef = useRef(null);

  useEffect(() => { lucide.createIcons(); });

  // Scroll to top whenever view or selected animateur changes
  useEffect(() => {
    if (mainRef.current) mainRef.current.scrollTop = 0;
  }, [currentView, selectedAnimateur]);

  // Session + restauration des pointages du jour à la connexion
  useEffect(() => {
    if (!user) return;
    LS.initAccounts();
    LS.startSession(user);

    // Écoute Firebase en temps réel pour restaurer/sync les pointages du jour
    const ref = db.ref('ptg/pointages');
    const handler = ref.on('value', snap => {
      try {
        const todayStr = new Date().toDateString(); // recalculated each time so overnight stays work
        const raw = snap.exists() ? snap.val() : {};
        const all = Object.values(raw || {}).filter(p => p && typeof p === 'object');
        const mine = all.filter(p => p.teamLeadEmail === user.email && p.date === todayStr);
        setTodayCount(mine.length);
        if (mine.length > 0) {
          setAnimateurs(prev => prev.map(a => {
            const matches = mine.filter(p => p.animateurId === a.id || p.animateurName === a.name);
            if (!matches.length) return a;
            const last = matches[matches.length - 1];
            return { ...a, status: last.status, note: last.note || undefined, pointedAt: last.time || '—' };
          }));
        }
      } catch (e) { /* ignore parse errors */ }
    });

    const ping = setInterval(() => LS.pingSession(user.email), 30000);
    const onUnload = () => LS.endSession(user.email);
    window.addEventListener('beforeunload', onUnload);
    return () => {
      ref.off('value', handler);
      clearInterval(ping);
      window.removeEventListener('beforeunload', onUnload);
    };
  }, [user]);

  const showToast = (msg, type='neutral') => setToast({ msg, type });

  const handleLogin = (account, remember) => {
    setUser(account);
    if (remember) localStorage.setItem('ptg_saved_user', JSON.stringify(account));
    else localStorage.removeItem('ptg_saved_user');
  };

  const handleLogout = () => {
    localStorage.removeItem('ptg_saved_user');
    setUser(null);
  };

  const handleConfirmPointage = (id, status, note, coords) => {
    const time = NOW_TIME();
    const a    = animateurs.find(a => a.id === id);
    setAnimateurs(prev => prev.map(x => x.id === id ? { ...x, status, note:note||undefined, pointedAt:time } : x));
    const entry = { animateurId:id, animateurName:a.name, ville:a.ville, sector:a.sector, status, note, time };
    setHistory(prev => [...prev, entry]);
    LS.writePointage(user.email, entry);
    const toastType = { present:'success', absent:'error', malade:'warning', demission:'info' };
    showToast(`${a.name} — ${STATUS_META[status].label}`, toastType[status]);
    setSelectedAnimateur(null);
  };

  const handleAddAnimateur = (form) => {
    const id = nextId.current++;
    const newAnim = {
      id, name: form.name.trim(), sector: form.sector.trim(),
      ville: form.ville, phone: form.phone || '—',
      teamLead: form.teamLead || '—',
      status: 'nonpointe', pointedAt: null,
    };
    setAnimateurs(prev => [...prev, newAnim]);
    showToast(`${form.name} ajouté`, 'success');
  };

  const handleEditAnimateur = (id, data) => {
    setAnimateurs(prev => prev.map(a => a.id === id ? { ...a, ...data } : a));
    setSelectedAnimateur(prev => prev && prev.id === id ? { ...prev, ...data } : prev);
    showToast('Informations mises à jour', 'success');
  };

  const handleDeleteAnimateur = (id) => {
    setAnimateurs(prev => prev.filter(a => a.id !== id));
    setSelectedAnimateur(null);
    showToast('Animateur supprimé', 'info');
  };

  if (!user) return <LoginScreen onLogin={handleLogin} />;

  const visibleAnimateurs = user.ville
    ? animateurs.filter(a => a.ville === user.ville)
    : animateurs;
  const unpointed = visibleAnimateurs.filter(a => a.status === 'nonpointe').length;
  const barTitle  = selectedAnimateur ? 'Pointage' :
    { list:'Animateurs', map:'Carte', history:'Historique', profile:'Profil' }[currentView];

  return (
    <div className="mobile-container">
      <div className="status-bar">
        {selectedAnimateur
          ? <button className="status-bar-btn" onClick={() => setSelectedAnimateur(null)}>
              <i data-lucide="chevron-left" style={{ width:20, height:20 }}></i>Retour
            </button>
          : <div className="status-bar-spacer"></div>
        }
        <div className="status-bar-title">{barTitle}</div>
        {!selectedAnimateur && currentView === 'list'
          ? <button className="status-bar-icon-btn" onClick={() => setShowAdd(true)} title="Ajouter animateur">
              <i data-lucide="user-plus" style={{ width:18, height:18 }}></i>
            </button>
          : <div className="status-bar-spacer"></div>
        }
      </div>

      <div className="main-content" ref={mainRef}>
        {currentView === 'list' && !selectedAnimateur && (
          <AnimateursList
            animateurs={visibleAnimateurs}
            onSelectAnimateur={setSelectedAnimateur}
            defaultVille={user.ville}
          />
        )}
        {currentView === 'list' && selectedAnimateur && (
          <PointageForm animateur={selectedAnimateur} onBack={() => setSelectedAnimateur(null)} onConfirm={handleConfirmPointage} onEdit={handleEditAnimateur} onDelete={handleDeleteAnimateur} />
        )}
        {currentView === 'map' && (
          <div className="map-container">
            <MapView animateurs={user.ville ? animateurs.filter(a=>a.ville===user.ville) : animateurs} />
          </div>
        )}
        {currentView === 'history' && <HistoryView userEmail={user.email} />}
        {currentView === 'profile' && <ProfileView user={user} animateurs={visibleAnimateurs} onLogout={handleLogout} />}
      </div>

      {!selectedAnimateur && (
        <div className="bottom-nav">
          {[
            { key:'list',    icon:'users',   label:'Animateurs', badge:unpointed },
            { key:'map',     icon:'map',     label:'Carte',      badge:0 },
            { key:'history', icon:'clock',   label:'Historique', badge:todayCount },
            { key:'profile', icon:'user',    label:'Profil',     badge:0 },
          ].map(item => (
            <button key={item.key} className={`nav-item ${currentView === item.key ? 'active' : ''}`}
              onClick={() => setCurrentView(item.key)}>
              <div className="nav-icon-wrap">
                <i data-lucide={item.icon} style={{ width:22, height:22 }}></i>
                {item.badge > 0 && <span className="nav-badge">{item.badge}</span>}
              </div>
              {item.label}
            </button>
          ))}
        </div>
      )}

      {!selectedAnimateur && currentView === 'list' && (
        <button className="fab" onClick={() => setShowAdd(true)} title="Ajouter animateur">
          <i data-lucide="plus" style={{ width:26, height:26 }}></i>
        </button>
      )}

      {showAdd && (
        <AddAnimateurModal
          onClose={() => setShowAdd(false)}
          onAdd={handleAddAnimateur}
          defaultVille={user.ville}
        />
      )}

      {toast && <Toast message={toast.msg} type={toast.type} onDone={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
